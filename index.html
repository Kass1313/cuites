<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maison Gourmet</title>
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg: #0a1628;
  --bg2: #0e1d36;
  --panel: #121f3a;
  --panel2: #182a4a;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --line: rgba(255,255,255,0.08);
  --line2: rgba(255,255,255,0.12);
  --text: #f0f4fc;
  --text2: #c8d4ea;
  --muted: #8899b8;
  --gold: #d4a843;
  --gold2: #f0d88a;
  --gold-bg: rgba(212,168,67,0.12);
  --gold-border: rgba(212,168,67,0.28);
  --blue: #6da0f0;
  --blue-bg: rgba(109,160,240,0.10);
  --blue-border: rgba(109,160,240,0.22);
  --green: #3ec97a;
  --green-bg: rgba(62,201,122,0.12);
  --green-border: rgba(62,201,122,0.28);
  --red: #e8616e;
  --red-bg: rgba(232,97,110,0.12);
  --red-border: rgba(232,97,110,0.28);
  --amber: #e8b33a;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.2);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.5; height: 100%; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; min-height: 100dvh; }
button, input, select, textarea { font: inherit; color: inherit; }
img { max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ===== APP SHELL ===== */
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; position: relative; padding-bottom: 80px; }
@media (min-width: 481px) { .app { border-left: 1px solid var(--line); border-right: 1px solid var(--line); } }

/* ===== TOPBAR ===== */
.topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(10,22,40,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); }
.brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.brandmark { width: 40px; height: 40px; border-radius: 13px; background: linear-gradient(135deg, var(--panel2), var(--panel)); border: 1px solid var(--gold-border); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
.brand-text h1 { margin: 0; font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-text p { margin: 2px 0 0; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-badge { padding: 6px 10px; border-radius: var(--radius-xs); border: 1px solid var(--gold-border); background: var(--gold-bg); color: var(--gold2); font-size: 11px; font-weight: 700; letter-spacing: 0.03em; white-space: nowrap; }

/* ===== BOTTOM NAV ===== */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 30; display: flex; justify-content: space-around; align-items: center; padding: 6px 4px calc(6px + var(--safe-bottom)); background: rgba(10,22,40,0.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid var(--line); }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); color: var(--muted); background: none; border: none; min-width: 52px; position: relative; }
.nav-item.active { color: var(--gold); }
.nav-item.active::before { content: ''; position: absolute; top: -6px; width: 20px; height: 3px; border-radius: 99px; background: var(--gold); animation: navDot 0.3s ease; }
.nav-ico { font-size: 22px; line-height: 1; transition: transform var(--transition); position: relative; }
.nav-item.active .nav-ico { transform: scale(1.12); }
.nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.02em; }
.nav-badge { position: absolute; top: -4px; right: -6px; min-width: 18px; height: 18px; border-radius: 99px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; animation: badgePop 0.3s ease; }
@keyframes navDot { from { width: 0; opacity: 0; } to { width: 20px; opacity: 1; } }
@keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

/* ===== SCREEN ===== */
.screen { padding: 16px; animation: pageIn 0.25s ease; }
@keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== PANELS & CARDS ===== */
.panel { background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); }
.hero { padding: 20px; border-radius: 24px; background: radial-gradient(ellipse at top left, rgba(212,168,67,0.15), transparent 40%), linear-gradient(180deg, #152b50, #0f1f3d); border: 1px solid var(--gold-border); box-shadow: var(--shadow); }
.hero h2 { margin: 0 0 6px; font-size: 26px; line-height: 1.1; }
.hero p { margin: 0; color: var(--text2); line-height: 1.45; font-size: 14px; }
.mini-card { padding: 14px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--line); transition: transform 0.15s; }
.mini-card:active { transform: scale(0.98); }
.card-list { display: grid; gap: 10px; }

/* ===== KPIS ===== */
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
.kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 12px; text-align: center; }
.kpi .n { font-size: 22px; font-weight: 800; }
.kpi .l { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ===== SHORTCUTS ===== */
.shortcuts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px; }
.shortcut { padding: 14px; border-radius: var(--radius); background: linear-gradient(180deg, var(--panel2), var(--panel)); border: 1px solid var(--line); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.shortcut:active { transform: scale(0.97); }
.shortcut .ico { width: 40px; height: 40px; border-radius: var(--radius-sm); display: grid; place-items: center; background: var(--gold-bg); border: 1px solid var(--gold-border); font-size: 18px; flex-shrink: 0; }
.shortcut b { font-size: 14px; }
.shortcut .small { font-size: 12px; color: var(--muted); }

/* ===== SECTION TITLES ===== */
.section-title { display: flex; justify-content: space-between; align-items: center; margin: 18px 2px 10px; }
.section-title h3 { margin: 0; font-size: 16px; font-weight: 700; }
.section-title span { font-size: 12px; color: var(--muted); }

/* ===== BUTTONS ===== */
.btn { height: 44px; border-radius: var(--radius-sm); padding: 0 16px; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: transform 0.12s, filter 0.12s; white-space: nowrap; }
.btn:active { transform: scale(0.96); }
.btn.primary { background: linear-gradient(180deg, #e8c56e, #c9a040); color: #0f1728; border: none; box-shadow: 0 4px 12px rgba(212,168,67,0.3); }
.btn.secondary { background: var(--surface2); border: 1px solid var(--line2); color: var(--text); }
.btn.danger { background: var(--red-bg); border: 1px solid var(--red-border); color: #ffd0d5; }
.btn.success { background: var(--green-bg); border: 1px solid var(--green-border); color: #b8f5d4; }
.btn.sm { height: 36px; font-size: 13px; padding: 0 12px; border-radius: var(--radius-xs); }
.btn.full { width: 100%; }
.icon-btn { width: 40px; height: 40px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--surface); color: var(--text); display: grid; place-items: center; cursor: pointer; transition: transform 0.12s; flex-shrink: 0; }
.icon-btn:active { transform: scale(0.9); }

/* ===== INPUTS ===== */
input[type=text], input[type=password], input[type=number], select, textarea { width: 100%; height: 44px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--surface); color: var(--text); padding: 0 14px; outline: none; font-size: 14px; transition: border-color var(--transition); }
input:focus, select:focus, textarea:focus { border-color: var(--gold-border); }
textarea { min-height: 80px; padding: 12px 14px; resize: vertical; }
label.lbl { display: block; margin-bottom: 5px; color: var(--text2); font-size: 13px; font-weight: 600; }
::placeholder { color: var(--muted); }

/* ===== LAYOUT HELPERS ===== */
.row { display: flex; gap: 10px; align-items: center; }
.row.wrap { flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flex1 { flex: 1; }
.small { font-size: 12px; color: var(--muted); }
.bold { font-weight: 700; }
.mt { margin-top: 14px; }
.gap-sm { gap: 6px; }

/* ===== CHIPS & TABS ===== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); font-size: 13px; cursor: pointer; transition: all 0.15s; user-select: none; }
.chip:active { transform: scale(0.95); }
.chip.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold2); }
.tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -ms-overflow-style: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); white-space: nowrap; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.tab:active { transform: scale(0.95); }
.tab.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold2); }

/* ===== SEARCH ===== */
.search { position: relative; }
.search input { padding-left: 40px; }
.search::before { content: '🔎'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.7; pointer-events: none; }

/* ===== PRODUCT/ITEM ROWS ===== */
.item-row { display: flex; gap: 10px; align-items: center; padding: 12px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--line); transition: transform 0.15s; }
.item-row:active { transform: scale(0.98); }
.item-meta { flex: 1; min-width: 0; }
.item-meta b { display: block; font-size: 14px; line-height: 1.3; }
.item-meta small { color: var(--muted); font-size: 12px; }
.item-emoji { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }

/* ===== QUANTITY CONTROLS ===== */
.qty { display: flex; align-items: center; gap: 5px; }
.qty button { width: 32px; height: 32px; border-radius: var(--radius-xs); border: 1px solid var(--line); background: var(--surface); color: var(--text); cursor: pointer; font-size: 16px; display: grid; place-items: center; transition: transform 0.1s; }
.qty button:active { transform: scale(0.88); }
.qty .val { min-width: 28px; text-align: center; font-weight: 700; font-size: 15px; }

/* ===== CHECKBOX ===== */
.check { width: 26px; height: 26px; border-radius: 8px; border: 1px solid var(--line); display: grid; place-items: center; background: var(--surface); cursor: pointer; flex-shrink: 0; transition: all 0.15s; font-size: 13px; }
.check:active { transform: scale(0.9); }
.check.checked { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

/* ===== PROGRESS BAR ===== */
.progress-bar { height: 6px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--green)); transition: width 0.4s ease; }

/* ===== BADGES ===== */
.badge { display: inline-flex; padding: 4px 8px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--line); font-size: 11px; font-weight: 600; }
.badge.gold { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold2); }
.badge.green { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.badge.red { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.badge.blue { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }

/* ===== SWIPE TO DELETE ===== */
.swipe-wrap { position: relative; overflow: hidden; border-radius: var(--radius); }
.swipe-inner { position: relative; transition: transform 0.25s ease; touch-action: pan-y; }
.swipe-inner.swiping { transition: none; }
.swipe-del { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; display: flex; align-items: center; justify-content: center; background: linear-gradient(90deg, transparent, rgba(232,97,110,0.85) 40%); border-radius: 0 var(--radius) var(--radius) 0; color: #fff; font-size: 20px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
.swipe-wrap.reveal .swipe-del { opacity: 1; }

/* ===== RAYON HEADER ===== */
.rayon-header { padding: 8px 12px; border-radius: var(--radius-xs); background: var(--gold-bg); border: 1px solid var(--gold-border); font-size: 12px; font-weight: 700; color: var(--gold2); margin-top: 8px; letter-spacing: 0.02em; }

/* ===== COACH BUBBLES ===== */
.coach-bubble { padding: 14px; border-radius: var(--radius); border: 1px solid var(--line); animation: pageIn 0.25s ease; }
.coach-bubble.user { background: var(--gold-bg); border-color: var(--gold-border); margin-left: 32px; }
.coach-bubble.assistant { background: var(--blue-bg); border-color: var(--blue-border); margin-right: 20px; }
.cb-role { font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.coach-bubble.user .cb-role { color: var(--gold); }
.coach-bubble.assistant .cb-role { color: var(--blue); }
.cb-text { font-size: 14px; color: var(--text2); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.cb-text b, .cb-text strong { color: var(--text); }
.coach-typing { display: inline-flex; gap: 4px; padding: 10px 16px; border-radius: var(--radius); background: var(--blue-bg); border: 1px solid var(--blue-border); }
.coach-typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); opacity: 0.4; animation: typeDot 1.2s infinite; }
.coach-typing span:nth-child(2) { animation-delay: 0.2s; }
.coach-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeDot { 0%, 80% { opacity: 0.4; transform: scale(1); } 40% { opacity: 1; transform: scale(1.3); } }

/* ===== RECIPE COVER ===== */
.recipe-cover { height: 140px; border-radius: var(--radius); background: linear-gradient(135deg, #1e3a68, #122342); border: 1px solid var(--line); display: grid; place-items: center; font-size: 56px; }

/* ===== SLIDE VISUAL ===== */
.slide-visual { height: 160px; border-radius: 22px; background: linear-gradient(135deg, #1c3460, #10203b); border: 1px solid var(--line); position: relative; overflow: hidden; display: grid; place-items: center; font-size: 64px; margin: 16px 0; }
.slide-visual::after { content: ''; position: absolute; inset: auto -40px -40px auto; width: 120px; height: 120px; background: rgba(212,168,67,0.14); border-radius: 999px; filter: blur(30px); }

/* ===== MODAL & SHEET ===== */
.modal-overlay, .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open, .sheet-overlay.open { opacity: 1; pointer-events: auto; }
.modal-panel { position: absolute; inset: 50% auto auto 50%; transform: translate(-50%, -50%); width: min(92vw, 440px); background: linear-gradient(180deg, #152a4e, #0d1b34); border: 1px solid var(--line); border-radius: 24px; padding: 20px; max-height: 88vh; overflow-y: auto; }
.sheet-panel { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, #152a4e, #0d1b34); border-top-left-radius: 24px; border-top-right-radius: 24px; border-top: 1px solid var(--line); padding: 16px 16px calc(16px + var(--safe-bottom)); max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.sheet-overlay.open .sheet-panel { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); margin: 0 auto 14px; }

/* ===== PROFILE SELECTOR ===== */
.profile-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 20px 0; }
.profile-card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.2s; padding: 12px; border-radius: var(--radius); }
.profile-card:active { transform: scale(0.93); }
.profile-card .avatar-ring { width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--line); display: grid; place-items: center; font-size: 32px; transition: border-color 0.2s, box-shadow 0.2s; }
.profile-card:hover .avatar-ring { border-color: var(--gold-border); box-shadow: 0 0 20px rgba(212,168,67,0.2); }
.profile-card .pname { font-size: 14px; font-weight: 600; color: var(--text2); }
.profile-card.setup .avatar-ring { border-style: dashed; border-color: var(--muted); opacity: 0.5; }
.profile-card.setup .pname { color: var(--muted); }

/* ===== QUICK GRID ===== */
.quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.quick { padding: 12px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--line); cursor: pointer; transition: transform 0.15s; }
.quick:active { transform: scale(0.96); }
.quick b { font-size: 13px; display: block; }

/* ===== TOAST ===== */
.toast { position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%) translateY(16px); background: linear-gradient(180deg, #1e3660, #132548); border: 1px solid var(--gold-border); color: var(--text); padding: 12px 20px; border-radius: var(--radius); z-index: 99; box-shadow: var(--shadow); font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s ease; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== ONBOARDING STEP INDICATOR ===== */
.step-dots { display: flex; justify-content: center; gap: 8px; padding: 12px 0; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); transition: all 0.3s; }
.step-dot.active { width: 24px; border-radius: 99px; background: var(--gold); }
.step-dot.done { background: var(--green); }

/* ===== STATS CARD ===== */
.stat-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
.stat-row .stat-icon { width: 36px; height: 36px; border-radius: var(--radius-xs); display: grid; place-items: center; font-size: 16px; }
.stat-row .stat-info { flex: 1; }
.stat-row .stat-val { font-weight: 700; font-size: 15px; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 32px 16px; }
.empty-state .empty-emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.empty-state .empty-text { font-size: 13px; color: var(--muted); }

/* ===== UTILITIES ===== */
.text-gold { color: var(--gold2); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-blue { color: var(--blue); }
.text-center { text-align: center; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<nav class="bottom-nav" id="bottomNav" style="display:none"></nav>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>
<div class="toast" id="toast"></div>

const esc = (s) => String(s ?? '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
const js = (v) => JSON.stringify(v).replace(/</g, '\\u003c');
const uid = () => 'id-' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
const deepClone = (v) => JSON.parse(JSON.stringify(v));
const simpleHash = (s) => { let h = 0; for (let i = 0; i < s.length; i++) { h = ((h << 5) - h + s.charCodeAt(i)) | 0; } return (h >>> 0).toString(16); };
const normalize = (s) => String(s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
const fuzzyMatch = (query, text) => { const nq = normalize(query), nt = normalize(text); if (nt.includes(nq)) return true; if (nq.length < 2) return false; let qi = 0; for (let ti = 0; ti < nt.length && qi < nq.length; ti++) { if (nt[ti] === nq[qi]) qi++; } return qi >= nq.length * 0.8; };
const formatDate = (ts) => { const d = new Date(ts); return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' · ' + d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); };
const pluralize = (n, word) => n + ' ' + word + (n > 1 ? 's' : '');

function bootstrap() {
  let data;
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    data = raw ? JSON.parse(raw) : null;
  } catch (e) {
    console.warn('Storage corrupted, resetting');
    data = null;
  }
  if (!data) {
    data = { currentProfileId: null, apiKey: '', profiles: {}, config: { messageGlobal: '', maintenance: false } };
  }
  if (!data.profiles) data.profiles = {};
  if (!data.config) data.config = { messageGlobal: '', maintenance: false };

  // Ensure all fixed profiles exist
  FIXED_PROFILES.forEach(fp => {
    if (!data.profiles[fp.id]) {
      data.profiles[fp.id] = makeProfileData({
        avatar: fp.defaultAvatar,
        color: fp.defaultColor,
        setupDone: false,
        code: fp.isAdmin ? simpleHash('21') : ''
      });
    }
    // Migrate: ensure all fields exist
    const p = data.profiles[fp.id];
    const defaults = makeProfileData();
    Object.keys(defaults).forEach(k => { if (!(k in p)) p[k] = defaults[k]; });
    if (!p.stats) p.stats = defaults.stats;
  });

  return data;
}

function allRecipes() {
  const p = current();
  if (!p) return [...RECIPES];
  const custom = p.customRecipes || [];
  const all = [...RECIPES, ...custom];
  const dislikes = (p.dislikes || []).map(normalize);
  const allergies = (p.allergies || []).map(normalize);
  return all.filter(r => !r.ingredients.some(i => {
    const n = normalize(i.name);
    return dislikes.includes(n) || allergies.some(a => n.includes(a));
  }));
}

function allProducts() {
  const p = current();
  const custom = p ? (p.customProducts || []) : [];
  const base = Object.entries(PRODUCTS).flatMap(([cat, items]) =>
    items.map(n => ({ id: 'p-' + normalize(n + cat), name: n, category: cat, custom: false }))
  );
  const all = [...custom, ...base];
  const seen = new Set(); const uniq = [];
  all.forEach(p => { const k = normalize(p.name + '|' + p.category); if (!seen.has(k)) { seen.add(k); uniq.push(p); } });
  return uniq;
}

function findProduct(id) { return allProducts().find(p => p.id === id); }

function faisableRecipes() {
  const p = current();
  if (!p) return [];
  const provNames = (p.provisions || []).filter(x => x.qty > 0).map(x => normalize(x.name));
  return allRecipes().filter(r => {
    const matched = r.ingredients.filter(i => provNames.includes(normalize(i.name)));
    return matched.length >= Math.ceil(r.ingredients.length * 0.6);
  });
}

function shoppingQty(productId) {
  const p = current();
  const row = p?.shopping?.find(x => x.productId === productId);
  return row ? row.qty : 0;
}

/* ===== SWIPE TO DELETE ===== */
let _sw = {};
document.addEventListener('touchstart', function(e) {
  const w = e.target.closest('.swipe-wrap'); if (!w) return;
  const inn = w.querySelector('.swipe-inner'); if (!inn) return;
  _sw = { w, inn, sx: e.touches[0].clientX, sy: e.touches[0].clientY, locked: false };
  inn.classList.add('swiping');
}, { passive: true });
document.addEventListener('touchmove', function(e) {
  if (!_sw.w) return;
  const dx = e.touches[0].clientX - _sw.sx, dy = e.touches[0].clientY - _sw.sy;
  if (!_sw.locked && Math.abs(dy) > Math.abs(dx)) { _sw.w = null; _sw.inn?.classList.remove('swiping'); return; }
  _sw.locked = true;
  const x = Math.min(0, Math.max(-85, dx));
  _sw.inn.style.transform = 'translateX(' + x + 'px)';
  if (x < -28) _sw.w.classList.add('reveal'); else _sw.w.classList.remove('reveal');
}, { passive: true });
document.addEventListener('touchend', function() {
  if (!_sw.w) return;
  _sw.inn.classList.remove('swiping');
  const x = parseInt((_sw.inn.style.transform || '').replace(/[^\-\d]/g, '') || '0');
  if (x < -50) { _sw.inn.style.transform = 'translateX(-80px)'; _sw.w.classList.add('reveal'); }
  else { _sw.inn.style.transform = 'translateX(0)'; _sw.w.classList.remove('reveal'); }
  _sw = {};
}, { passive: true });

}

  const screens = {

    week: weekScreen, recipes: recipesScreen, coach: coachScreen,

  if (fid) {
    const el = document.getElementById(fid);

  renderBottomNav();
}

function setDraft(k, v) { _draft[k] = v; render(); }

  const p = current(); if (!p) return;
  Object.assign(p, {
    avatar: _draft.avatar, color: _draft.color, household: _draft.household,
    people: _draft.people, objective: _draft.objective, style: _draft.style,
    sport: _draft.sport, budget: _draft.budget, cookTime: _draft.cookTime,

      return p.custom ? swR(inner, 'deleteCustomProduct(' + js(p.id) + ')') : inner;

function addCustomProduct() {
  const el = document.getElementById('newProdName');
  const name = el?.value?.trim(); if (!name) return toast('Nom requis');
  current().customProducts.unshift({ id: uid(), name, category: 'Perso', custom: true });
  el.value = ''; save(); render();
}
function deleteCustomProduct(id) { const p = current(); p.customProducts = p.customProducts.filter(x => x.id !== id); save(); render(); }

function addToShopping(productId, delta) {
  const p = current(), prod = findProduct(productId); if (!p || !prod) return;
  let row = p.shopping.find(x => x.productId === productId);
  if (!row && delta > 0) { row = { id: uid(), productId, name: prod.name, category: prod.category, qty: 0, unit: 'x', checked: false }; p.shopping.unshift(row); }
  if (!row) return;
  row.qty = Math.max(0, (row.qty || 0) + delta);
  if (row.qty === 0) p.shopping = p.shopping.filter(x => x.id !== row.id);
  save(); render();
}

function addToProvisions(productId) {
  const p = current(), prod = findProduct(productId); if (!p || !prod) return;
  let row = p.provisions.find(x => x.productId === productId);
  if (!row) { row = { id: uid(), productId, name: prod.name, category: prod.category, qty: 0, unit: 'x', low: false }; p.provisions.unshift(row); }
  row.qty = Math.max(1, row.qty + 1);
  save(); render(); toast('Ajouté aux provisions 🏠');
}

/* ===== SCREEN: SHOPPING ===== */
function shoppingScreen() {
  const p = current();
  const q = VIEW.shoppingSearch.trim();
  const items = p.shopping.filter(i => !q || fuzzyMatch(q, i.name));
  const checkedCount = p.shopping.filter(i => i.checked).length;
  const totalCount = p.shopping.length;
  const allChecked = totalCount > 0 && checkedCount === totalCount;
  const pct = totalCount > 0 ? Math.round(checkedCount / totalCount * 100) : 0;

  // Group by category
  const grouped = {};
  items.forEach(i => { const cat = i.category || 'Divers'; if (!grouped[cat]) grouped[cat] = []; grouped[cat].push(i); });
  const catOrder = ['Fruits & légumes', 'Frais & crèmerie', 'Viandes & poisson', 'Épicerie salée', 'Boulangerie', 'Petit-déjeuner & goûter', 'Boissons', 'Surgelés', 'Hygiène', 'Ménage', 'Perso', 'Divers'];
  const sortedCats = Object.keys(grouped).sort((a, b) => (catOrder.indexOf(a) === -1 ? 99 : catOrder.indexOf(a)) - (catOrder.indexOf(b) === -1 ? 99 : catOrder.indexOf(b)));

  const listHtml = sortedCats.map(cat =>
    '<div class="rayon-header">' + esc(cat) + ' (' + grouped[cat].length + ')</div>' +
    grouped[cat].map(i => swR(
      '<div class="item-row" style="padding:' + (VIEW.shoppingMode ? '16' : '12') + 'px">' +
      '<div class="check' + (i.checked ? ' checked' : '') + '" onclick="toggleShopItem(' + js(i.id) + ')">' + (i.checked ? '✓' : '') + '</div>' +
      '<div class="item-meta"><b style="font-size:' + (VIEW.shoppingMode ? '17' : '14') + 'px;' + (i.checked ? 'text-decoration:line-through;opacity:0.5' : '') + '">' + esc(i.name) + '</b>' +
      '<small>' + i.qty + ' ' + i.unit + '</small></div>' +
      '<div class="qty"><button onclick="changeShopQty(' + js(i.id) + ',-1)">−</button><div class="val">' + i.qty + '</div><button onclick="changeShopQty(' + js(i.id) + ',1)">+</button></div></div>',
      'removeShopItem(' + js(i.id) + ')'
    )).join('')
  ).join('');

  return appHeader('Liste de courses') + '<div class="screen"><div class="panel col">' +
    (totalCount > 0 ? '<div class="row gap-sm" style="margin-bottom:8px"><span class="small bold">' + checkedCount + '/' + totalCount + '</span><div class="progress-bar flex1"><div class="fill" style="width:' + pct + '%"></div></div><span class="small">' + pct + '%</span></div>' : '') +
    '<div class="search"><input type="text" id="inp-ssearch" value="' + esc(VIEW.shoppingSearch) + '" oninput="setSearchDebounced(\'shoppingSearch\',this.value)" placeholder="Rechercher dans la liste..."></div>' +
    '<div class="grid2"><input type="text" id="quickAdd" placeholder="Ajouter un article" onkeydown="if(event.key===\'Enter\')quickAddItem()"><button class="btn secondary" onclick="quickAddItem()">+ Ajouter</button></div>' +
    '<div class="row wrap">' +
    '<button class="btn sm secondary" onclick="setView({shoppingMode:!view().shoppingMode})">' + (VIEW.shoppingMode ? '📱 Normal' : '🛒 Mode courses') + '</button>' +
    '<button class="btn sm secondary" onclick="toggleAllShop(true)">Tout ✓</button>' +
    '<button class="btn sm secondary" onclick="toggleAllShop(false)">Tout ✗</button>' +
    (allChecked ? '<button class="btn sm success" onclick="archiveShopping()">📦 Archiver</button>' : '') +
    '<button class="btn sm secondary" onclick="exportShopping()">📋</button>' +
    (totalCount > 0 && checkedCount > 0 ? '<button class="btn sm primary" onclick="transferToProvisions()">→ Provisions</button>' : '') +
    '</div></div>' +
    '<div class="section-title"><h3>À acheter</h3><span>' + totalCount + ' articles</span></div>' +
    '<div class="card-list">' + (listHtml || '<div class="empty-state"><div class="empty-emoji">🛒</div><div class="empty-title">Ta liste est vide</div><div class="empty-text">Ajoute des articles depuis le catalogue ou les recettes</div></div>') + '</div>' +
    '<div class="section-title"><h3>Historique</h3><span>' + p.shoppingHistory.length + '</span></div><div class="card-list">' +
    (p.shoppingHistory.slice(0, 6).map(h => swR(
      '<div class="item-row"><div class="item-meta"><b>' + formatDate(h.date) + '</b><small>' + h.items.length + ' articles</small></div>' +
      '<button class="btn sm secondary" onclick="restoreHistory(' + js(h.id) + ')">Remettre</button></div>',
      'deleteHistory(' + js(h.id) + ')'
    )).join('') || '<div class="mini-card small">Aucun historique</div>') + '</div></div>';
}

function quickAddItem() {
  const el = document.getElementById('quickAdd'), name = el?.value?.trim(); if (!name) return;
  const p = current(); let row = p.shopping.find(x => normalize(x.name) === normalize(name));
  if (!row) p.shopping.unshift({ id: uid(), productId: null, name, category: 'Divers', qty: 1, unit: 'x', checked: false });
  else row.qty += 1;
  el.value = ''; save(); render();
}
function toggleShopItem(id) { const r = current()?.shopping?.find(i => i.id === id); if (r) { r.checked = !r.checked; save(); render(); } }
function changeShopQty(id, d) { const r = current()?.shopping?.find(i => i.id === id); if (r) { r.qty = Math.max(1, r.qty + d); save(); render(); } }
function removeShopItem(id) { const p = current(); p.shopping = p.shopping.filter(i => i.id !== id); save(); render(); }
function toggleAllShop(v) { current().shopping.forEach(i => i.checked = v); save(); render(); }
function archiveShopping() {
  const p = current(); if (!p.shopping.length) return;
  p.shoppingHistory.unshift({ id: uid(), date: Date.now(), items: deepClone(p.shopping) });
  p.stats.listsCompleted = (p.stats.listsCompleted || 0) + 1;
  p.shopping = []; save(); render(); toast('Liste archivée ✓');
}
function restoreHistory(id) {
  const p = current(), h = p.shoppingHistory.find(x => x.id === id); if (!h) return;
  h.items.forEach(it => { let row = p.shopping.find(s => normalize(s.name) === normalize(it.name)); if (row) row.qty += it.qty; else p.shopping.push(deepClone(it)); });
  save(); render(); toast('Articles restaurés');
}
function deleteHistory(id) { current().shoppingHistory = current().shoppingHistory.filter(x => x.id !== id); save(); render(); }
function transferToProvisions() {
  const p = current();
  const checked = p.shopping.filter(i => i.checked);
  checked.forEach(item => {
    let prov = p.provisions.find(x => normalize(x.name) === normalize(item.name));
    if (!prov) { prov = { id: uid(), productId: item.productId, name: item.name, category: item.category, qty: 0, unit: 'x', low: false }; p.provisions.unshift(prov); }
    prov.qty += item.qty;
  });
  p.shopping = p.shopping.filter(i => !i.checked);
  save(); render(); toast(checked.length + ' articles transférés aux provisions 🏠');
}
function exportShopping() {
  const p = current(); if (!p.shopping.length) return toast('Liste vide');
  const grouped = {};
  p.shopping.forEach(i => { const cat = i.category || 'Divers'; if (!grouped[cat]) grouped[cat] = []; grouped[cat].push(i); });
  let txt = '🛒 Ma liste de courses\n';
  Object.entries(grouped).forEach(([cat, items]) => { txt += '\n' + cat + ':\n'; items.forEach(i => { txt += '  ' + (i.checked ? '✅' : '⬜') + ' ' + i.name + ' x' + i.qty + '\n'; }); });
  if (navigator.share) navigator.share({ title: 'Ma liste', text: txt }).catch(() => {});
  else if (navigator.clipboard) navigator.clipboard.writeText(txt).then(() => toast('Copié ! 📋'));
  else toast('Copie non supportée');
}

  );

function addNamedToShopping(name, qty, unit, category) {
  const p = current(); let row = p.shopping.find(x => normalize(x.name) === normalize(name));
  if (!row) p.shopping.unshift({ id: uid(), productId: null, name, category: category || 'Divers', qty: qty || 1, unit: unit || 'x', checked: false });
  else row.qty = Math.round((row.qty + qty) * 10) / 10;
  save();
}

function addRecipeMissing(id, doRender = true, servings = null) {
  const r = allRecipes().find(x => x.id === id); if (!r) return;
  const p = current();
  const provNames = p.provisions.filter(x => x.qty > 0).map(x => normalize(x.name));
  const factor = (servings || r.servings || 2) / (r.servings || 2);
  r.ingredients.forEach(i => {
    if (!provNames.includes(normalize(i.name))) addNamedToShopping(i.name, Math.round(i.qty * factor * 10) / 10, i.unit, r.category);
  });
  if (doRender) { closeModal(); save(); render(); toast('Produits manquants ajoutés 🛒'); }
}

function coachAsk(text) {
  const p = current(); if (!p) return;
  p.coachHistory.unshift({ id: uid(), role: 'user', text });
  p.stats.coachQuestions = (p.stats.coachQuestions || 0) + 1;
  save(); render();

  if (!getApiKey()) {
    // Offline mode
    const low = text.toLowerCase();
    let answer = 'Pour des réponses intelligentes et personnalisées, demande à Kassim de configurer la clé API Gemini dans les Paramètres.';
    if (low.includes('provision')) {
      const names = p.provisions.filter(x => x.qty > 0).map(x => x.name);
      const ideas = allRecipes().filter(r => r.ingredients.some(i => names.map(normalize).includes(normalize(i.name)))).slice(0, 3);
      answer = ideas.length ? 'Avec tes provisions, tu peux essayer :\n\n' + ideas.map(r => r.emoji + ' **' + r.name + '** — ' + r.time + ' min').join('\n') : 'Ajoute encore quelques produits dans Mes provisions pour des idées plus ciblées.';
    } else if (low.includes('semaine') || low.includes('planning')) {
      answer = 'Voici une suggestion simple :\n\n🟢 **Lundi** : Pâtes tomate basilic\n🟢 **Mardi** : Riz sauté légumes\n🟢 **Mercredi** : Soupe + omelette\n🟢 **Jeudi** : Salade complète\n🟢 **Vendredi** : Gratin de courgettes\n🟢 **Samedi** : Burgers maison\n🟢 **Dimanche** : Tajine pois chiches';
    } else if (low.includes('budget')) {
      answer = 'Mes meilleures recettes petit budget :\n\n🍝 Pâtes tomate basilic\n🍚 Riz sauté légumes œuf\n🍜 Soupe légumes maison\n🌮 Galette thon fromage frais\n🥘 Couscous légumes express';
    } else if (low.includes('nutrition') || low.includes('conseil')) {
      answer = 'Conseil du jour : essaie de varier tes sources de protéines sur la semaine (poulet, poisson, œufs, légumineuses). Et n\'oublie pas les fruits et légumes à chaque repas !';
    }
    p.coachHistory.unshift({ id: uid(), role: 'assistant', text: answer });
    save(); render(); return;
  }

  // Show typing indicator
  const msgEl = document.getElementById('coachMessages');
  if (msgEl) msgEl.insertAdjacentHTML('afterbegin', '<div class="coach-typing" id="typingDots"><span></span><span></span><span></span></div>');

  // Build context
  const provList = p.provisions.filter(x => x.qty > 0).map(x => x.name).join(', ');
  const fp = currentFixed();
  const context = `Profil: ${fp.name}, ${p.household}, ${p.people} personne(s), objectif ${p.objective}, style ${p.style}.
Budget: ${p.budget}. Temps max: ${p.cookTime}. Sport: ${p.sport || 'Non renseigné'}.
${provList ? 'Provisions actuelles: ' + provList + '.' : 'Pas de provisions renseignées.'}
${p.likes.length ? 'Aime: ' + p.likes.join(', ') + '.' : ''}
${p.dislikes.length ? 'N\'aime pas: ' + p.dislikes.join(', ') + '.' : ''}
${p.allergies.length ? 'Allergies: ' + p.allergies.join(', ') + '.' : ''}`;

  // Include last 6 messages for conversation context
  const history = p.coachHistory.slice(0, 7).reverse().map(m => ({
    role: m.role, parts: [{ text: m.text }]
  }));

  const fullPrompt = COACH_SYSTEM_PROMPT + '\n\n--- CONTEXTE UTILISATEUR ---\n' + context + '\n\n--- DEMANDE ---\n' + text;

  callGemini(fullPrompt, history).then(answer => {
    const dots = document.getElementById('typingDots'); if (dots) dots.remove();
    p.coachHistory.unshift({ id: uid(), role: 'assistant', text: answer });
    save(); render();
  });
}

async function callGemini(prompt, history = []) {
  const key = getApiKey();
  if (!key) return 'Clé API non configurée.';
  try {
    const contents = [{ role: 'user', parts: [{ text: prompt }] }];
    const r = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + encodeURIComponent(key), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents,
        generationConfig: { maxOutputTokens: 1500, temperature: 0.75 }
      })
    });
    if (!r.ok) throw new Error(await r.text());
    const d = await r.json();
    return d.candidates?.[0]?.content?.parts?.[0]?.text || 'Pas de réponse.';
  } catch (e) {
    console.error(e);
    return 'Erreur API. Vérifie la clé dans Paramètres.';
  }
}

function adminPanel() {
  const others = FIXED_PROFILES.filter(f => f.id !== currentId());
  return '<div class="section-title"><h3>Gestion des profils</h3><span>Admin</span></div><div class="panel card-list">' +
    others.map(fp => {
      const pd = DB.profiles[fp.id];
      if (!pd) return '';
      const weekCount = (pd.weekPlan || []).reduce((n, d) => n + Object.values(d.slots || {}).filter(Boolean).length, 0);
      return '<div class="mini-card"><div class="row"><div style="font-size:24px">' + (pd.avatar || fp.defaultAvatar) + '</div>' +
        '<div class="item-meta"><b>' + esc(fp.name) + '</b><small>' + (pd.setupDone ? pd.household + ' · ' + pd.objective : 'Pas encore configuré') + '</small></div></div>' +
        '<div class="small mt">Liste: ' + (pd.shopping || []).length + ' · Provisions: ' + (pd.provisions || []).filter(x => x.qty > 0).length + ' · Semaine: ' + weekCount + ' repas · Coach: ' + (pd.coachHistory || []).length + ' msg</div>' +
        '<div class="row mt"><button class="btn sm secondary" onclick="adminInspect(\'' + fp.id + '\')">Voir tout</button>' +
        '<button class="btn sm secondary" onclick="adminResetCode(\'' + fp.id + '\')">Reset code</button></div></div>';
    }).join('') + '</div>';
}

function adminInspect(id) {
  const fp = FIXED_PROFILES.find(f => f.id === id);
  const pd = DB.profiles[id]; if (!pd || !fp) return;
  const week = (pd.weekPlan || []).map(d => d.day + ': ' + Object.entries(d.slots || {}).filter(([, v]) => v).map(([k]) => k).join(', ') || 'vide').join('<br>');
  openModal(
    '<div class="section-title"><h3>' + esc(fp.name) + '</h3><span>Vue admin</span></div><div class="col">' +
    '<div class="mini-card"><b>Profil</b><div class="small mt">' + (pd.household || 'N/A') + ' · ' + (pd.people || 1) + ' pers. · ' + (pd.objective || '') + ' · ' + (pd.style || '') + '</div>' +
    '<div class="small">Sport: ' + (pd.sport || 'N/A') + ' · Budget: ' + (pd.budget || 'N/A') + ' · Temps: ' + (pd.cookTime || 'N/A') + '</div>' +
    '<div class="small">Allergies: ' + ((pd.allergies || []).join(', ') || 'Aucune') + '</div></div>' +
    '<div class="mini-card"><b>Liste de courses</b><div class="small mt">' + ((pd.shopping || []).map(i => i.name + ' x' + i.qty).join(' · ') || 'Vide') + '</div></div>' +
    '<div class="mini-card"><b>Provisions</b><div class="small mt">' + ((pd.provisions || []).filter(i => i.qty > 0).map(i => i.name + ' x' + i.qty).join(' · ') || 'Vide') + '</div></div>' +
    '<div class="mini-card"><b>Semaine</b><div class="small mt">' + (week || 'Vide') + '</div></div>' +
    '<button class="btn secondary full mt" onclick="closeModal()">Fermer</button></div>'
  );
}

function adminResetCode(id) {
  if (!confirm('Réinitialiser le code de ce profil ?')) return;
  DB.profiles[id].code = ''; save(); toast('Code réinitialisé');
}
