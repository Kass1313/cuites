<style>
:root{--bg:#0b1426;--panel:#11203c;--panel2:#182949;--line:rgba(255,255,255,.08);--text:#f7f9fc;--muted:#b4bfd6;--gold:#d9b463;--gold2:#f2ddb2;--blue:#8fb4ff;--green:#46c780;--red:#eb6d7a;--amber:#efc159;--radius:22px;--shadow:0 12px 35px rgba(0,0,0,.28)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;padding:0;background:linear-gradient(180deg,#08101f,#0f1b34 38%,#132546);color:var(--text);font-family:Calibri,Arial,sans-serif;height:100%}body{min-height:100vh}button,input,select,textarea{font:inherit}.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:96px}.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(8,16,31,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}.icon-btn{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:var(--text);display:grid;place-items:center;cursor:pointer}.brand{display:flex;align-items:center;gap:10px;min-width:0;flex:1}.brandmark{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,#1a3058,#0c1730);border:1px solid rgba(217,180,99,.35);display:grid;place-items:center;font-size:18px}.brandtext{min-width:0}.brandtext h1{margin:0;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brandtext p{margin:2px 0 0;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.admin-logo{display:none}.mini-badge{padding:8px 10px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--gold2);font-size:12px}.screen{padding:16px}.panel{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}.hero{padding:18px;border-radius:28px;background:radial-gradient(circle at top left,rgba(217,180,99,.20),transparent 34%),linear-gradient(180deg,#152b50,#0f1f3d);border:1px solid rgba(217,180,99,.22);box-shadow:var(--shadow)}.hero h2{margin:0 0 6px;font-size:28px;line-height:1.05}.hero p{margin:0;color:#d5ddef;line-height:1.45}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.kpi{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:18px;padding:12px}.kpi .n{font-size:22px;font-weight:700}.kpi .l{font-size:11px;color:var(--muted);margin-top:2px}.shortcuts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}.shortcut{padding:16px;border-radius:20px;background:linear-gradient(180deg,#172b4f,#11213c);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px;cursor:pointer}.shortcut .ico{width:42px;height:42px;border-radius:14px;display:grid;place-items:center;background:rgba(217,180,99,.12);border:1px solid rgba(217,180,99,.24)}.section-title{display:flex;justify-content:space-between;align-items:center;margin:18px 2px 10px}.section-title h3{margin:0;font-size:16px}.section-title span{font-size:12px;color:var(--muted)}.mini-card{padding:14px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.primary{background:linear-gradient(180deg,#e3c179,#cda450);color:#0f1728;border:none}.secondary{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--text)}.danger{background:rgba(235,109,122,.12);border:1px solid rgba(235,109,122,.24);color:#ffd7db}button.btn{height:46px;border-radius:16px;padding:0 16px;cursor:pointer}.row{display:flex;gap:10px;align-items:center}.row.wrap{flex-wrap:wrap}.col{display:flex;flex-direction:column;gap:8px}input[type=text],input[type=password],input[type=number],select,textarea{width:100%;height:46px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text);padding:0 14px;outline:none}textarea{min-height:90px;padding:12px 14px;resize:vertical}label.lbl{display:block;margin-bottom:6px;color:#e6ebf7;font-size:13px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.chips{display:flex;flex-wrap:wrap;gap:8px}.chip{padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:13px;cursor:pointer}.chip.active{background:rgba(217,180,99,.18);border-color:rgba(217,180,99,.38);color:#ffeabf}.slide-visual{height:170px;border-radius:24px;background:linear-gradient(135deg,#1c3460,#10203b);border:1px solid rgba(255,255,255,.08);position:relative;overflow:hidden;display:grid;place-items:center;font-size:64px;margin:18px 0}.slide-visual::after{content:'';position:absolute;inset:auto -40px -40px auto;width:130px;height:130px;background:rgba(217,180,99,.16);border-radius:999px;filter:blur(8px)}.auth-actions{display:grid;gap:12px;margin-top:14px}.card-list{display:grid;gap:12px}.product-row,.shopping-row,.provision-row,.profile-row,.history-row,.recipe-row{display:flex;gap:10px;align-items:center;padding:12px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}.product-meta{flex:1;min-width:0}.product-meta b{display:block;font-size:14px}.product-meta small{color:var(--muted)}.qty{display:flex;align-items:center;gap:6px}.qty button{width:32px;height:32px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--text)}.qty .val{min-width:28px;text-align:center;font-weight:700}.drawer{position:fixed;inset:0;background:rgba(0,0,0,.46);opacity:0;pointer-events:none;transition:.2s;z-index:50}.drawer.open{opacity:1;pointer-events:auto}.drawer-panel{position:absolute;left:0;top:0;bottom:0;width:min(86vw,360px);background:linear-gradient(180deg,#101c35,#0b162a);border-right:1px solid var(--line);padding:18px;transform:translateX(-100%);transition:.23s}.drawer.open .drawer-panel{transform:translateX(0)}.drawer-panel .menu-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:16px;color:var(--text);margin-top:8px;background:transparent;border:1px solid transparent;cursor:pointer}.drawer-panel .menu-item.active{background:rgba(255,255,255,.05);border-color:var(--line)}.bottom-sheet,.modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;z-index:60}.bottom-sheet.open,.modal.open{display:block}.sheet-panel{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#14274a,#0d1b34);border-top-left-radius:26px;border-top-right-radius:26px;border-top:1px solid var(--line);padding:16px 16px 22px;max-height:88vh;overflow:auto}.modal-panel{position:absolute;inset:50% auto auto 50%;transform:translate(-50%,-50%);width:min(92vw,420px);background:linear-gradient(180deg,#14274a,#0d1b34);border:1px solid var(--line);border-radius:26px;padding:18px;max-height:88vh;overflow:auto}.recipe-cover{height:140px;border-radius:18px;background:linear-gradient(135deg,#203c6e,#122342);border:1px solid rgba(255,255,255,.08);display:grid;place-items:center;font-size:56px}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:4px}.tab{padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);white-space:nowrap;cursor:pointer;font-size:13px}.tab.active{background:rgba(217,180,99,.18);border-color:rgba(217,180,99,.38)}.quick-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.quick{padding:12px;border-radius:16px;background:rgba(255,255,255,.04);border:1px solid var(--line);cursor:pointer}.small{font-size:12px;color:var(--muted)}.badge{display:inline-flex;padding:5px 9px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:12px;margin-right:6px;margin-top:6px}.search{position:relative}.search input{padding-left:40px}.search:before{content:'🔎';position:absolute;left:14px;top:11px;font-size:16px;opacity:.8}.inline-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.check{width:24px;height:24px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;background:rgba(255,255,255,.04);cursor:pointer}.checked{background:rgba(70,199,128,.18);border-color:rgba(70,199,128,.35)}.footer-space{height:20px}.hide-scrollbar::-webkit-scrollbar{display:none}@media (min-width:480px){.app{border-left:1px solid rgba(255,255,255,.03);border-right:1px solid rgba(255,255,255,.03)}}
</style>

<script>
const STORAGE_KEY='maison-gourmet-v16-kassim-admin';
const ADMIN_CODE='21';
const RECIPE_LIBRARY=[{"id": 1, "name": "Smoothie banane avoine", "category": "Petit-déjeuner", "time": 15, "ingredients": [{"name": "banane", "qty": 2, "unit": "pièces"}, {"name": "flocons d’avoine", "qty": 80, "unit": "g"}, {"name": "lait", "qty": 40, "unit": "cl"}, {"name": "miel", "qty": 1, "unit": "càs"}], "steps": ["Coupe les bananes en rondelles.", "Verse le lait dans le blender.", "Ajoute les bananes, les flocons d’avoine et le miel.", "Mixe 40 secondes jusqu’à obtenir une texture lisse.", "Sers bien frais."], "emoji": "🥤", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 2, "name": "Pancakes moelleux", "category": "Petit-déjeuner", "time": 20, "ingredients": [{"name": "farine", "qty": 200, "unit": "g"}, {"name": "œufs", "qty": 2, "unit": "pièces"}, {"name": "lait", "qty": 25, "unit": "cl"}, {"name": "levure chimique", "qty": 1, "unit": "sachet"}], "steps": ["Mélange la farine et la levure dans un saladier.", "Ajoute les œufs puis le lait petit à petit.", "Fouette jusqu’à disparition des grumeaux.", "Fais chauffer une poêle légèrement huilée.", "Verse une petite louche de pâte et cuis 1 minute de chaque côté."], "emoji": "🥞", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 3, "name": "Overnight oats fruits rouges", "category": "Petit-déjeuner", "time": 10, "ingredients": [{"name": "flocons d’avoine", "qty": 70, "unit": "g"}, {"name": "yaourt nature", "qty": 1, "unit": "pot"}, {"name": "fruits rouges", "qty": 100, "unit": "g"}, {"name": "graines de chia", "qty": 1, "unit": "càs"}], "steps": ["Verse les flocons d’avoine dans un bocal.", "Ajoute le yaourt puis les graines de chia.", "Mélange soigneusement.", "Dépose les fruits rouges sur le dessus.", "Place au frais toute la nuit puis déguste le matin."], "emoji": "🫐", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 4, "name": "Toast avocat œuf", "category": "Petit-déjeuner", "time": 15, "ingredients": [{"name": "pain de mie", "qty": 2, "unit": "tranches"}, {"name": "avocat", "qty": 1, "unit": "pièce"}, {"name": "œufs", "qty": 2, "unit": "pièces"}, {"name": "citron", "qty": 0.5, "unit": "pièce"}], "steps": ["Fais griller le pain.", "Écrase l’avocat avec un filet de citron.", "Fais cuire les œufs selon ton goût.", "Tartine le pain avec l’avocat.", "Dépose les œufs sur le dessus et assaisonne."], "emoji": "🥑", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 5, "name": "Bowl yaourt granola", "category": "Petit-déjeuner", "time": 10, "ingredients": [{"name": "yaourt grec", "qty": 2, "unit": "pots"}, {"name": "granola", "qty": 80, "unit": "g"}, {"name": "banane", "qty": 1, "unit": "pièce"}, {"name": "miel", "qty": 1, "unit": "càs"}], "steps": ["Verse le yaourt dans deux bols.", "Ajoute le granola par-dessus.", "Coupe la banane en rondelles.", "Dispose les rondelles de banane dans les bols.", "Termine par un filet de miel."], "emoji": "🥣", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 6, "name": "Omelette fromage herbes", "category": "Petit-déjeuner", "time": 12, "ingredients": [{"name": "œufs", "qty": 4, "unit": "pièces"}, {"name": "fromage râpé", "qty": 60, "unit": "g"}, {"name": "persil", "qty": 0.5, "unit": "bouquet"}, {"name": "beurre", "qty": 10, "unit": "g"}], "steps": ["Casse les œufs dans un saladier.", "Ajoute le fromage râpé et le persil ciselé.", "Bats légèrement le mélange.", "Fais fondre le beurre dans une poêle.", "Verse les œufs et replie l’omelette quand elle est prise."], "emoji": "🍳", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 7, "name": "Porridge pomme cannelle", "category": "Petit-déjeuner", "time": 15, "ingredients": [{"name": "flocons d’avoine", "qty": 80, "unit": "g"}, {"name": "lait", "qty": 40, "unit": "cl"}, {"name": "pomme", "qty": 1, "unit": "pièce"}, {"name": "cannelle", "qty": 1, "unit": "cc"}], "steps": ["Verse le lait dans une casserole.", "Ajoute les flocons d’avoine et fais cuire à feu doux 5 minutes.", "Coupe la pomme en petits dés.", "Ajoute la cannelle et la pomme dans le porridge.", "Mélange puis sers chaud."], "emoji": "🍎", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 8, "name": "Wrap petit-déj dinde fromage", "category": "Petit-déjeuner", "time": 10, "ingredients": [{"name": "tortillas", "qty": 2, "unit": "pièces"}, {"name": "blanc de dinde", "qty": 4, "unit": "tranches"}, {"name": "fromage frais", "qty": 80, "unit": "g"}, {"name": "salade", "qty": 2, "unit": "feuilles"}], "steps": ["Tartine les tortillas de fromage frais.", "Dépose la salade puis les tranches de dinde.", "Roules les tortillas bien serrées.", "Coupe en deux.", "Sers immédiatement."], "emoji": "🌯", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 9, "name": "Pain perdu vanillé", "category": "Petit-déjeuner", "time": 15, "ingredients": [{"name": "pain de mie", "qty": 4, "unit": "tranches"}, {"name": "œufs", "qty": 2, "unit": "pièces"}, {"name": "lait", "qty": 20, "unit": "cl"}, {"name": "sucre vanillé", "qty": 1, "unit": "sachet"}], "steps": ["Bats les œufs avec le lait et le sucre vanillé.", "Trempe le pain dans ce mélange quelques secondes.", "Fais chauffer une poêle beurrée.", "Fais dorer le pain 2 minutes de chaque côté.", "Sers chaud."], "emoji": "🍞", "difficulty": "Facile", "cost": "€", "servings": 2, "tags": ["Rapide", "Moins de 5 ingrédients", "Équilibré"]}, {"id": 10, "name": "Muffins œuf épinards", "category": "Petit-déjeuner", "time": 20, "ingredients": [{"name": "œufs", "qty": 4, "unit": "pièces"}, {"name": "épinards", "qty": 80, "unit": "g"}, {"name": "fro function setDraft(k,v){window.__draftProfile[k]=v;render()}function toggleDraftValue(k,v){const arr=[...(window.__draftProfile[k]||[])];const i=arr.indexOf(v);if(i>-1)arr.splice(i,1);else arr.push(v);window.__draftProfile[k]=arr;render()}

function createScreen(){const d=window.__draftProfile;const step=view().quizStep;const steps=['Compte','Foyer','Préférences','Finaliser'];let body='';if(step===0){body=`<div class="col"><div><label class="lbl">Nom d’utilisateur</label><input type="text" id="inp-draft-username" value="${esc(d.username)}" oninput="setDraft('username',this.value)" placeholder="Ex : Lina"></div><div><label class="lbl">Code (facultatif)</label><input type="password" id="inp-draft-code" value="${esc(d.code)}" oninput="setDraft('code',this.value)" placeholder="4 chiffres ou plus"></div><div class="grid2"><div><label class="lbl">Avatar</label><select onchange="setDraft('avatar',this.value)">${['🍽️','🧁','🥗','🍝','🍎','⭐'].map(a=>`<option ${d.avatar===a?'selected':''}>${a}</option>`).join('')}</select></div><div><label class="lbl">Couleur</label><select onchange="setDraft('color',this.value)">${[['#89abff','Bleu'],['#d9b463','Or'],['#46c780','Vert'],['#eb6d7a','Rose']].map(([c,n])=>`<option value="${c}" ${d.color===c?'selected':''}>${n}</option>`).join('')}</select></div></div></div>`}
if(step===1){body=`<div class="col"><div><label class="lbl">Type de foyer</label><div class="chips">${['Solo','Duo','Famille','Sur mesure'].map(h=>`<div class="chip ${d.household===h?'active':''}" onclick='setDraft("household",${js(h)})'>${h}</div>`).join('')}</div></div><div class="grid2"><div><label class="lbl">Nombre de personnes</label><input type="number" id="inp-draft-people" min="1" max="10" value="${d.people}" oninput="setDraft('people',parseInt(this.value||1))"></div><div><label class="lbl">Temps max pour cuisiner</label><select onchange="setDraft('cookTime',this.value)">${['15 min','20 min','30 min','45 min'].map(v=>`<option ${d.cookTime===v?'selected':''}>${v}</option>`).join('')}</select></div></div><div class="grid2"><div><label class="lbl">Budget</label><select onchange="setDraft('budget',this.value)">${['Petit budget','Normal','Plaisir'].map(v=>`<option ${d.budget===v?'selected':''}>${v}</option>`).join('')}</select></div><div><label class="lbl">Sport</label><select onchange="setDraft('sport',this.value)">${['0 séance','1 à 2 fois / semaine','3 à 4 fois / semaine','5 à 6 fois / semaine'].map(v=>`<option ${d.sport===v?'selected':''}>${v}</option>`).join('')}</select></div></div></div>`}
if(step===2){body=`<div class="col"><div><label class="lbl">Allergies / intolérances</label>${renderMultiChips('allergies',['Lactose','Gluten','Fruits à coque','Œufs','Poisson','Crustacés'],d.allergies)}</div><div><label class="lbl">J’aime manger</label>${renderMultiChips('likes',['Pâtes','Riz','Poulet','Saumon','Soupe','Salade','Fromage','Œufs','Légumes rôtis','Wraps'],d.likes)}</div><div><label class="lbl">Je n’aime pas</label>${renderMultiChips('dislikes',['Champignons','Courgettes','Carottes','Aubergines','Pois chiches','Poisson'],d.dislikes)}</div></div>`}
if(step===3){body=`<div class="col"><div><label class="lbl">Objectif principal</label><div class="chips">${['Équilibre','Forme','Petit budget','Organisation','Perte de poids','Prise de muscle'].map(o=>`<div class="chip ${d.objective===o?'active':''}" onclick='setDraft("objective",${js(o)})'>${o}</div>`).join('')}</div></div><div><label class="lbl">Style de repas</label><div class="chips">${['Rapide','Simple','Gourmand','Protéiné','Varié'].map(o=>`<div class="chip ${d.style===o?'active':''}" onclick='setDraft("style",${js(o)})'>${o}</div>`).join('')}</div></div><div class="mini-card"><b>Résumé du profil</b><div class="small" style="margin-top:6px">${esc(d.username||'Profil sans nom')} · ${d.household} · ${d.people} personne(s)</div><div class="small">${d.objective} · ${d.style} · ${d.sport}</div></div></div>`}
return `${appHeader('Configuration en 4 étapes')}<div class="screen"><div class="chips">${steps.map((s,i)=>`<div class="chip ${i===step?'active':''}">${i+1}. ${s}</div>`).join('')}</div><div class="panel" style="margin-top:14px">${body}</div><div class="row" style="margin-top:12px"><button class="btn secondary" onclick="quizBack()">${step===0?'Retour':'Précédent'}</button><button class="btn primary" style="flex:1" onclick="quizNext()">${step===3?'Créer mon profil':'Suivant'}</button></div></div>`}
function quizBack(){if(view().quizStep===0)setView({page:'start'});else setView({quizStep:view().quizStep-1})}
function quizNext(){if(view().quizStep<3)return setView({quizStep:view().quizStep+1});const d=window.__draftProfile;let desired=titleCase(d.username)||'Profil perso';if(desired.toLowerCase()==='kassim') return toast('Le compte Kassim est réservé à l’administrateur');const username=uniqueUsername(desired);const p=makeProfileBase({username,code:d.code||'',isAdmin:false,avatar:d.avatar,color:d.color,household:d.household,objective:d.objective,style:d.style,people:d.people,guideSeen:!DB.config.guideForNewProfiles,profileData:{sport:d.sport,budget:d.budget,cookTime:d.cookTime,allergies:d.allergies,likes:d.likes,dislikes:d.dislikes}});DB.profiles.push(p);DB.auth.currentProfileId=p.id;DB.auth.guestProfile=null;save();window.__draftProfile={username:'',code:'',avatar:'🍽️',color:'#89abff',household:'Solo',people:1,objective:'Équilibre',style:'Rapide',sport:'1 à 2 fois / semaine',budget:'Normal',cookTime:'20 min',allergies:[],likes:[],dislikes:[]};setView({page:DB.config.guideForNewProfiles?'guide':'home',quizStep:0})}
function guideScreen(){const guides=[{t:'1. Catalogue',d:'Ajoute des produits à ta liste ou à tes provisions.'},{t:'2. Liste de courses',d:'Prépare tes achats, coche au magasin et archive quand c’est terminé.'},{t:'3. Programme semaine',d:'Place tes repas et transforme ta semaine en liste.'},{t:'4. Recettes & Coach IA',d:'Choisis une recette ou demande une idée avec ce que tu as.'}];const g=guides[view().guideIndex];return `${appHeader('Guide de démarrage')}<div class="screen"><div class="hero"><div class="slide-visual">${['🧭','🛒','🗓️','🤖'][view().guideIndex]}</div><h2>${g.t}</h2><p>${g.d}</p><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="guidePrev()">Précédent</button><button class="btn primary" style="flex:1" onclick="guideNext()">${view().guideIndex<guides.length-1?'Suivant':'Commencer'}</button></div></div></div>`}
function guidePrev(){if(view().guideIndex>0)setView({guideIndex:view().guideIndex-1})}function guideNext(){if(view().guideIndex<3)setView({guideIndex:view().guideIndex+1});else{const p=currentProfile();if(p)p.guideSeen=true;save();setView({page:'home',guideIndex:0})}}
function loginScreen(){return `${appHeader('Connexion')}<div class="screen"><div class="panel col"><div><label class="lbl">Nom d’utilisateur</label><input type="text" id="inp-login-user" value="${esc(view().existingUsername)}" oninput="setView({existingUsername:this.value})" placeholder="Ex : Lina"></div><div><label class="lbl">Code (si défini)</label><input type="password" id="loginCode" placeholder="Ton code"></div><div class="row"><button class="btn secondary" onclick="setView({page:'start'})">Retour</button><button class="btn primary" style="flex:1" onclick="loginExisting()">Se connecter</button></div></div></div>`}
function loginExisting(){const username=view().existingUsername.trim().toLowerCase();const code=(document.getElementById('loginCode')||{}).value||'';if(!username) return toast('Entre un nom d’utilisateur');const profile=DB.profiles.find(p=>!p.deleted&&p.username.trim().toLowerCase()===username);if(!profile)return toast('Profil introuvable');if(profile.code&&profile.code!==code)return toast('Code incorrect');DB.auth.currentProfileId=profile.id;DB.auth.guestProfile=null;save();setView({page:profile.guideSeen?'home':'guide'})}
function startGuest(){DB.auth.guestProfile=makeProfileBase({id:'guest-session',username:'Invité',guest:true,guideSeen:true,avatar:'👀',color:'#d9b463',household:'Solo',objective:'Découverte',style:'Simple',people:1,profileData:{sport:'0 séance',budget:'Normal',cookTime:'20 min',allergies:[],likes:[],dislikes:[]}});DB.auth.currentProfileId='guest-session';save();setView({page:'home'})}
function getSuggestionRecipe(){const all=allRecipesForCurrent();return all[Math.floor((Date.now()/86400000)%all.length)]||all[0]}
function homeScreen(){const p=currentProfile(),priv=currentPrivate();const planCount=priv.weekPlan.reduce((n,d)=>n+Object.values(d.slots).filter(Boolean).length,0),listCount=priv.shopping.length,provCount=priv.provisions.reduce((n,i)=>n+(i.qty>0?1:0),0),suggestion=getSuggestionRecipe();return `${appHeader(p.username+' · '+p.household)}<div class="screen"><div class="hero"><h2>${esc(DB.config.slogan)}</h2><p>${p.objective} · ${p.style} · ${p.profileData.cookTime}</p><div class="kpis"><div class="kpi"><div class="n">${planCount}</div><div class="l">repas planifiés</div></div><div class="kpi"><div class="n">${listCount}</div><div class="l">articles en liste</div></div><div class="kpi"><div class="n">${provCount}</div><div class="l">provisions</div></div></div></div><div class="shortcuts">${[['catalogue','📦','Catalogue'],['shopping','🛒','Liste'],['week','🗓️','Programme'],['recipes','🍝','Recettes']].map(([k,i,t])=>`<div class="shortcut" onclick='setView({page:${js(k)}})'><div class="ico">${i}</div><div><b>${t}</b><div class="small">Ouvrir</div></div></div>`).join('')}</div><div class="section-title"><h3>À reprendre</h3><span>${esc(p.username)}</span></div><div class="card-list"><div class="mini-card"><b>Liste et semaine</b><div class="small" style="margin-top:6px">${listCount?'Ta liste attend encore des achats.':'Ta liste est vide pour le moment.'}</div><div class="inline-actions"><button class="btn secondary" onclick="setView({page:'shopping'})">Ouvrir la liste</button><button class="btn secondary" onclick="setView({page:'week'})">Voir le programme</button></div></div><div class="mini-card"><div class="row"><div style="font-size:34px">${suggestion.emoji}</div><div class="product-meta"><b>Suggestion du jour</b><small>${esc(suggestion.name)} · ${suggestion.time} min</small></div></div><div class="inline-actions"><button class="btn primary" onclick="openRecipe(${suggestion.id})">Voir</button><button class="btn secondary" onclick="addRecipeMissingToShopping(${suggestion.id})">Ajouter ce qu’il manque</button></div></div>${DB.config.messageGlobal?`<div class="mini-card"><b>Info</b><div class="small" style="margin-top:6px;color:#eef3ff">${esc(DB.config.messageGlobal)}</div></div>`:''}</div></div>`}
function toggleDrawer(){if(!currentProfile()) return;document.getElementById('drawer').classList.toggle('open');renderDrawer()}function closeDrawer(){document.getElementById('drawer').classList.remove('open')}
function renderDrawer(){const p=currentProfile();if(!p){document.getElementById('drawerPanel').innerHTML='';return;}document.getElementById('drawerPanel').innerHTML=`<div class="brand" style="margin-bottom:12px"><div class="brandmark">${p.avatar||'🍽️'}</div><div class="brandtext"><h1>${esc(DB.config.appName)}</h1><p>${esc(p.username||'Bienvenue')}</p></div></div>${currentMenuOrder().map(k=>`<div class="menu-item ${view().page===k?'active':''}" onclick='closeDrawer();setView({page:${js(k)}})'>${tabLabel(k)}</div>`).join('')}<div class="menu-item" onclick="logout()">Se déconnecter</div>`}
function logout(){DB.auth.currentProfileId=null;DB.auth.guestProfile=null;save();closeDrawer();setView({page:'start',introIndex:0,existingUsername:''})}
function findProductById(id){return allProductsForCurrent().find(p=>p.id===id)}
function catalogueScreen(){let list=allProductsForCurrent();if(view().productTab!=='Tout'){if(view().productTab==='Produits personnalisés')list=list.filter(p=>p.custom);else list=list.filter(p=>p.category===view().productTab)}const q=view().productSearch.trim().toLowerCase();if(q)list=list.filter(p=>p.name.toLowerCase().includes(q));return `${appHeader('Base complète + produits personnalisés')}<div class="screen"><div class="panel col"><div class="search"><input type="text" id="inp-product-search" value="${esc(view().productSearch)}" oninput="setView({productSearch:this.value})" placeholder="Rechercher un produit"></div><div class="tabs hide-scrollbar">${['Tout','Produits personnalisés',...Object.keys(PRODUCT_LIBRARY)].map(t=>`<div class="tab ${view().productTab===t?'active':''}" onclick='setView({productTab:${js(t)}})'>${t}</div>`).join('')}</div>${DB.config.allowCustomProducts?`<div class="grid2"><input type="text" id="newProductName" placeholder="Créer un produit"><select id="newProductCat">${Object.keys(PRODUCT_LIBRARY).map(c=>`<option>${c}</option>`).join('')}<option>Produits personnalisés</option></select></div><button class="btn secondary" onclick="addCustomProduct()">Ajouter au catalogue</button>`:''}</div><div class="section-title"><h3>Produits</h3><span>${list.length}</span></div><div class="card-list">${list.map(p=>`<div class="product-row"><div class="product-meta"><b>${esc(p.name)}</b><small>${esc(p.category)}</small></div><div class="qty"><button onclick='addProductToShopping(${js(p.id)},-1)'>−</button><div class="val">${shoppingQtyForProduct(p.id)}</div><button onclick='addProductToShopping(${js(p.id)},1)'>+</button></div><button class="icon-btn" onclick='addProductToProvisions(${js(p.id)})'>＋</button>${p.custom?`<button class="icon-btn" onclick='deleteCustomProduct(${js(p.id)})'>✕</button>`:''}</div>`).join('')}</div></div>`}
function addCustomProduct(){const name=document.getElementById('newProductName').value.trim(),cat=document.getElementById('newProductCat').value;if(!name)return toast('Nom du produit requis');currentPrivate().customProducts.unshift({id:uid(),name,category:cat,custom:true});save();render()}
function deleteCustomProduct(id){const priv=currentPrivate();priv.customProducts=priv.customProducts.filter(p=>p.id!==id);save();render()}
function addProductToShopping(id,delta){const priv=currentPrivate(),p=findProductById(id);if(!p)return;let row=priv.shopping.find(x=>x.productId===id);if(!row&&delta>0){row={id:uid(),productId:id,name:p.name,category:p.category,qty:0,unit:'x',checked:false};priv.shopping.unshift(row)}if(!row)return;row.qty=Math.max(0,(row.qty||0)+delta);if(row.qty===0)priv.shopping=priv.shopping.filter(x=>x.id!==row.id);save();render()}
function addProductToProvisions(id){const priv=currentPrivate(),p=findProductById(id);if(!p)return;let row=priv.provisions.find(x=>x.productId===id);if(!row){row={id:uid(),productId:id,name:p.name,category:p.category,qty:0,unit:'x',low:false};priv.provisions.unshift(row)}row.qty=Math.max(1,row.qty+1);save();render();toast('Ajouté à Mes provisions')}
function quickAddShopping(){const el=document.getElementById('quickAdd'),name=el.value.trim();if(!name)return;const priv=currentPrivate();let row=priv.shopping.find(x=>x.name.toLowerCase()===name.toLowerCase());if(!row)priv.shopping.unshift({id:uid(),productId:null,name,category:'Divers',qty:1,unit:'x',checked:false});else row.qty+=1;el.value='';save();render()}
function shoppingScreen(){const priv=currentPrivate();const q=view().shoppingSearch.trim().toLowerCase();const items=priv.shopping.filter(i=>!q||i.name.toLowerCase().includes(q));const allChecked=priv.shopping.length>0&&priv.shopping.every(i=>i.checked);return `${appHeader('Mode magasin et historique')}<div class="screen"><div class="panel col"><div class="search"><input type="text" id="inp-shopping-search" value="${esc(view().shoppingSearch)}" oninput="setView({shoppingSearch:this.value})" placeholder="Rechercher dans la liste"></div><div class="grid2"><input type="text" id="quickAdd" placeholder="Ajouter rapidement un article"><button class="btn secondary" onclick="quickAddShopping()">Ajouter</button></div><div class="row wrap"><button class="btn secondary" onclick="setView({shoppingMode:!view().shoppingMode})">${view().shoppingMode?'Mode normal':'Mode courses'}</button><button class="btn secondary" onclick="toggleAllShopping(true)">Tout cocher</button><button class="btn secondary" onclick="toggleAllShopping(false)">Tout décocher</button>${allChecked?'<button class="btn primary" onclick="archiveShopping()">Archiver cette liste</button>':''}</div></div><div class="section-title"><h3>À acheter</h3><span>${priv.shopping.length}</span></div><div class="card-list">${items.map(i=>`<div class="shopping-row" style="padding:${view().shoppingMode?'16px':'12px'}"><div class="check ${i.checked?'checked':''}" onclick='toggleShopping(${js(i.id)})'>${i.checked?'✓':''}</div><div class="product-meta"><b style="font-size:${view().shoppingMode?'16px':'14px'}">${esc(i.name)}</b><small>${esc(i.category)} · ${i.qty} ${i.unit}</small></div><div class="qty"><button onclick='changeShoppingQty(${js(i.id)},-1)'>−</button><div class="val">${i.qty}</div><button onclick='changeShoppingQty(${js(i.id)},1)'>+</button></div><button class="icon-btn" onclick='removeShopping(${js(i.id)})'>✕</button></div>`).join('')||'<div class="mini-card">Ta liste est vide.</div>'}</div><div class="section-title"><h3>Historique</h3><span>${priv.shoppingHistory.length}</span></div><div class="card-list">${priv.shoppingHistory.slice(0,8).map(h=>`<div class="history-row"><div class="product-meta"><b>${formatDate(h.date)}</b><small>${h.items.length} articles · ${h.items.reduce((n,i)=>n+i.qty,0)} unité(s)</small></div><button class="btn secondary" onclick='restoreHistory(${js(h.id)})'>Remettre</button><button class="icon-btn" onclick='deleteHistory(${js(h.id)})'>✕</button></div>`).join('')||'<div class="mini-card">Aucun historique pour le moment.</div>'}</div></div>`}
function toggleShopping(id){const row=currentPrivate()?.shopping?.find(i=>i.id===id);if(!row)return;row.checked=!row.checked;save();render()}function changeShoppingQty(id,d){const row=currentPrivate()?.shopping?.find(i=>i.id===id);if(!row)return;row.qty=Math.max(1,row.qty+d);save();render()}function removeShopping(id){const priv=currentPrivate();priv.shopping=priv.shopping.filter(i=>i.id!==id);save();render()}function toggleAllShopping(v){currentPrivate().shopping.forEach(i=>i.checked=v);save();render()}function archiveShopping(){const priv=currentPrivate();if(!priv.shopping.length)return;priv.shoppingHistory.unshift({id:uid(),date:Date.now(),items:deepClone(priv.shopping)});priv.shopping=[];save();render()}function restoreHistory(id){const priv=currentPrivate();const h=priv.shoppingHistory.find(x=>x.id===id);if(!h)return;h.items.forEach(it=>{let row=priv.shopping.find(s=>s.name===it.name);if(row)row.qty+=it.qty;else priv.shopping.push(deepClone(it))});save();render()}function deleteHistory(id){const priv=currentPrivate();priv.shoppingHistory=priv.shoppingHistory.filter(x=>x.id!==id);save();render()}
function weekScreen(){const priv=currentPrivate();const tags=['Tous','Équilibré','Petit budget','Rapide','Protéiné'];return `${appHeader('Planifie puis transforme en liste')}<div class="screen"><div class="tabs hide-scrollbar">${tags.map(t=>`<div class="tab ${view().weekTag===t?'active':''}" onclick='setView({weekTag:${js(t)}})'>${t}</div>`).join('')}</div><div class="row wrap" style="margin:12px 0"><button class="btn secondary" onclick="fillDinnerIdeas()">Remplir les dîners</button><button class="btn secondary" onclick="resetWeek()">Réinitialiser</button><button class="btn primary" onclick="weekToList()">Transformer en liste</button></div><div class="card-list">${priv.weekPlan.map((d,di)=>`<div class="panel"><div class="section-title"><h3>${d.day}</h3><span>${Object.values(d.slots).filter(Boolean).length} repas</span></div>${Object.keys(d.slots).map(slot=>{const recipe=allRecipesForCurrent().find(r=>r.id===d.slots[slot]);return `<div class="product-row" style="margin-top:8px"><div class="product-meta"><b>${slot}</b><small>${recipe?esc(recipe.name):'Aucun repas'}</small></div><button class="btn secondary" onclick='pickRecipeForSlot(${di},${js(slot)})'>Choisir</button>${recipe?`<button class="icon-btn" onclick='clearWeekSlot(${di},${js(slot)})'>✕</button>`:''}</div>`}).join('')}</div>`).join('')}</div></div>`}
function clearWeekSlot(day,slot){currentPrivate().weekPlan[day].slots[slot]=null;save();render()}function recipesForWeekTag(){let dinners=allRecipesForCurrent().filter(r=>['Repas du soir','Pâtes'].includes(r.category));const tag=view().weekTag;if(tag&&tag!=='Tous') dinners=dinners.filter(r=>r.tags?.includes(tag));return dinners.length?dinners:allRecipesForCurrent().filter(r=>['Repas du soir','Pâtes'].includes(r.category));}function fillDinnerIdeas(){const dinners=recipesForWeekTag();currentPrivate().weekPlan.forEach((d,i)=>d.slots['Repas du soir']=dinners[i%dinners.length].id);save();render()}function resetWeek(){currentPrivate().weekPlan=makeEmptyWeek();save();render()}function pickRecipeForSlot(dayIndex,slot){const list=slot==='Repas du soir'?recipesForWeekTag():allRecipesForCurrent();openSheet(`<div class="sheet-panel"><div class="section-title"><h3>Choisir une recette</h3><span>${esc(slot)}</span></div><div class="card-list">${list.map(r=>`<div class="recipe-row" onclick='assignRecipeToSlot(${dayIndex},${js(slot)},${r.id})'><div style="font-size:30px">${r.emoji}</div><div class="product-meta"><b>${esc(r.name)}</b><small>${r.category} · ${r.time} min</small></div></div>`).join('')}</div></div>`)}function assignRecipeToSlot(dayIndex,slot,recipeId){currentPrivate().weekPlan[dayIndex].slots[slot]=recipeId;save();closeSheet();render()}function weekToList(){const ids=[...new Set(currentPrivate().weekPlan.flatMap(d=>Object.values(d.slots).filter(Boolean)))];ids.forEach(id=>addRecipeMissingToShopping(id,false));save();render();toast('Le programme a été ajouté à la liste')}
function recipesScreen(){let list=allRecipesForCurrent();if(view().recipeFilter!=='Toutes')list=list.filter(r=>r.category===view().recipeFilter);const q=view().recipeSearch.trim().toLowerCase();if(q)list=list.filter(r=>r.name.toLowerCase().includes(q));if(view().recipeLess5)list=list.filter(r=>r.ingredients.length<=5);if(view().recipeFast)list=list.filter(r=>r.time<=20);return `${appHeader('50 idées bien classées')}<div class="screen"><div class="panel col"><div class="search"><input type="text" id="inp-recipe-search" value="${esc(view().recipeSearch)}" oninput="setView({recipeSearch:this.value})" placeholder="Rechercher une recette"></div><div class="tabs hide-scrollbar">${['Toutes','Petit-déjeuner','Déjeuner','Goûter','Repas du soir','Pâtes'].map(t=>`<div class="tab ${view().recipeFilter===t?'active':''}" onclick='setView({recipeFilter:${js(t)}})'>${t}</div>`).join('')}</div><div class="row wrap"><div class="chip ${view().recipeLess5?'active':''}" onclick="setView({recipeLess5:!view().recipeLess5})">Moins de 5 ingrédients</div><div class="chip ${view().recipeFast?'active':''}" onclick="setView({recipeFast:!view().recipeFast})">Moins de 20 min</div></div></div><div class="card-list" style="margin-top:14px">${list.map(r=>`<div class="recipe-row"><div style="font-size:34px">${r.emoji}</div><div class="product-meta"><b>${esc(r.name)}</b><small>${r.category} · ${r.time} min · ${r.ingredients.length} ingrédients</small></div><button class="icon-btn" onclick="toggleFavRecipe(${r.id})">${currentPrivate().favorites.recipes.includes(r.id)?'★':'☆'}</button><button class="btn secondary" onclick="openRecipe(${r.id})">Voir</button></div>`).join('')}</div></div>`}
function toggleFavRecipe(id){const arr=currentPrivate().favorites.recipes;const i=arr.indexOf(id);if(i>-1)arr.splice(i,1);else arr.push(id);save();render()}
function openRecipe(id){const r=allRecipesForCurrent().find(x=>x.id===id);if(!r)return toast('Recette introuvable');const servings=view().recipeServings||r.servings||2;openModal(`<div class="modal-panel"><div class="section-title"><h3>${esc(r.name)}</h3><span>${r.category}</span></div><div class="recipe-cover">${r.emoji}</div><div class="inline-actions"><span class="badge">${r.time} min</span><span class="badge">${r.difficulty}</span><span class="badge">${r.cost}</span></div><div style="margin-top:12px"><label class="lbl">Nombre de personnes</label><div class="qty"><button onclick='setView({recipeServings:Math.max(1,(view().recipeServings||${r.servings})-1)});openRecipe(${r.id})'>−</button><div class="val">${servings}</div><button onclick='setView({recipeServings:(view().recipeServings||${r.servings})+1});openRecipe(${r.id})'>+</button></div></div><div class="section-title"><h3>Ingrédients</h3><span>${r.ingredients.length}</span></div><div class="card-list">${r.ingredients.map(i=>`<div class="product-row"><div class="product-meta"><b>${esc(i.name)}</b><small>${Math.round(i.qty*(servings/(r.servings||2))*10)/10} ${i.unit}</small></div></div>`).join('')}</div><div class="section-title"><h3>Préparation</h3><span>${r.steps.length} étapes</span></div><div class="card-list">${r.steps.map((s,idx)=>`<div class="mini-card"><b>Étape ${idx+1}</b><div class="small" style="margin-top:6px;color:#eef3ff">${esc(s)}</div></div>`).join('')}</div><div class="row wrap" style="margin-top:14px"><button class="btn primary" onclick="addRecipeMissingToShopping(${r.id},true,${servings})">Ajouter seulement ce qu’il manque</button><button class="btn secondary" onclick="shareRecipe(${r.id})">Partager</button><button class="btn secondary" onclick="closeModal()">Fermer</button></div></div>`)}
function addNamedItemToShopping(name,qty=1,unit='x',category='Divers'){const priv=currentPrivate();let row=priv.shopping.find(x=>x.name.toLowerCase()===String(name).toLowerCase());if(!row)priv.shopping.unshift({id:uid(),productId:null,name,category,qty,unit,checked:false});else row.qty=Math.round((row.qty+qty)*10)/10;save()}
function addRecipeMissingToShopping(id,rerender=true,servings=null){const r=allRecipesForCurrent().find(x=>x.id===id);if(!r){if(rerender)toast('Recette introuvable');return;}const provNames=currentPrivate().provisions.filter(p=>p.qty>0).map(p=>p.name.toLowerCase());const factor=(servings||r.servings||2)/(r.servings||2);r.ingredients.forEach(i=>{if(!provNames.includes(i.name.toLowerCase()))addNamedItemToShopping(i.name,Math.round(i.qty*factor*10)/10,i.unit,r.category)});save();if(rerender){closeModal();render();toast('Les produits manquants ont été ajoutés à la liste')}}
function shareRecipe(id){if(!DB.config.allowSharing)return toast('Le partage est désactivé');const choices=DB.profiles.filter(p=>!p.deleted&&p.id!==currentProfile().id).map(p=>`<option value="${p.id}">${esc(p.username)}</option>`).join('');if(!choices)return toast('Aucun profil disponible');openModal(`<div class="modal-panel"><div class="section-title"><h3>Partager la recette</h3><span>Choisir un profil</span></div><div class="col"><select id="shareProfileSelect">${choices}</select><button class="btn primary" onclick="confirmShareRecipe(${id})">Partager</button><button class="btn secondary" onclick="closeModal()">Annuler</button></div></div>`)}function confirmShareRecipe(id){const pid=(document.getElementById('shareProfileSelect')||{}).value;const receiver=DB.profiles.find(p=>!p.deleted&&p.id===pid);if(!receiver)return toast('Profil introuvable');DB.shares.unshift({id:uid(),type:'recipe',from:currentProfile().id,to:receiver.id,date:Date.now(),payload:{recipeId:id}});save();closeModal();toast('Recette partagée')}
function provisionsScreen(){let list=allProductsForCurrent();if(view().provisionTab!=='Tout'){if(view().provisionTab==='Produits personnalisés')list=list.filter(p=>p.custom);else list=list.filter(p=>p.category===view().provisionTab)}const q=view().provisionSearch.trim().toLowerCase();if(q)list=list.filter(p=>p.name.toLowerCase().includes(q));const priv=currentPrivate();return `${appHeader('Ce que tu as déjà à la maison')}<div class="screen"><div class="panel col"><div class="search"><input type="text" id="inp-provision-search" value="${esc(view().provisionSearch)}" oninput="setView({provisionSearch:this.value})" placeholder="Chercher un produit"></div><div class="tabs hide-scrollbar">${['Tout','Frais & crèmerie','Fruits & légumes','Épicerie salée','Petit-déjeuner & goûter','Viandes & poisson','Boissons','Hygiène','Ménage','Produits personnalisés'].map(t=>`<div class="tab ${view().provisionTab===t?'active':''}" onclick='setView({provisionTab:${js(t)}})'>${t}</div>`).join('')}</div><div class="row wrap"><button class="btn secondary" onclick="addBasePack()">Ajouter les bases</button><button class="btn primary" onclick="coachFromProvisions()">Proposer 3 idées</button></div></div><div class="section-title"><h3>Ajouter à mes provisions</h3><span>${list.length}</span></div><div class="card-list">${list.map(p=>`<div class="product-row"><div class="product-meta"><b>${esc(p.name)}</b><small>${esc(p.category)}</small></div><button class="btn secondary" onclick='incrementProvision(${js(p.id)},1)'>J’ai ça</button></div>`).join('')}</div><div class="section-title"><h3>Mes provisions actuelles</h3><span>${priv.provisions.filter(p=>p.qty>0).length}</span></div><div class="card-list">${priv.provisions.filter(p=>p.qty>0).map(p=>`<div class="provision-row"><div class="product-meta"><b>${esc(p.name)}</b><small>${esc(p.category)}${p.low?' · presque fini':''}</small></div><div class="qty"><button onclick='changeProvisionQty(${js(p.id)},-1)'>−</button><div class="val">${p.qty}</div><button onclick='changeProvisionQty(${js(p.id)},1)'>+</button></div><button class="btn secondary" onclick='toggleLowProvision(${js(p.id)})'>${p.low?'Normal':'Presque fini'}</button><button class="icon-btn" onclick='moveProvisionToShopping(${js(p.id)})'>🛒</button></div>`).join('')||'<div class="mini-card">Aucune provision enregistrée.</div>'}</div></div>`}
function incrementProvision(productId,inc){const priv=currentPrivate(),p=findProductById(productId);if(!p)return;let row=priv.provisions.find(x=>x.productId===productId);if(!row){row={id:uid(),productId,name:p.name,category:p.category,qty:0,unit:'x',low:false};priv.provisions.unshift(row)}row.qty+=inc;save();render()}function changeProvisionQty(id,d){const row=currentPrivate()?.provisions?.find(x=>x.id===id);if(!row)return;row.qty=Math.max(0,row.qty+d);if(row.qty===0)row.low=false;save();render()}function toggleLowProvision(id){const row=currentPrivate()?.provisions?.find(x=>x.id===id);if(!row)return;row.low=!row.low;save();render()}function moveProvisionToShopping(id){const row=currentPrivate()?.provisions?.find(x=>x.id===id);if(!row)return;addNamedItemToShopping(row.name,1,row.unit,row.category);toast('Ajouté à la liste')}
function addBasePack(){['pâtes','riz','œufs','lait','farine','thon','tomates pelées','beurre','fromage râpé'].forEach(n=>{const prod=allProductsForCurrent().find(p=>p.name===n);if(prod)incrementProvision(prod.id,1)});save();render()}function coachFromProvisions(){const names=currentPrivate().provisions.filter(p=>p.qty>0).map(p=>p.name.toLowerCase());const ideas=allRecipesForCurrent().filter(r=>r.ingredients.some(i=>names.includes(i.name.toLowerCase()))).slice(0,3);currentPrivate().coachHistory.unshift({id:uid(),role:'assistant',text:ideas.length?'Avec tes provisions, tu peux essayer : '+ideas.map(i=>i.name).join(' · '):'Ajoute encore quelques produits dans Mes provisions pour des idées plus ciblées.'});save();setView({page:'coach'})}
function coachScreen(){const hist=currentPrivate().coachHistory.slice(0,12);return `${appHeader('Compact, utile, sans envahir')}<div class="screen"><div class="panel col"><div class="quick-grid">${[['Repas rapide','Donne-moi une idée de repas rapide ce soir'],['Avec mes provisions','Propose-moi un repas avec mes provisions'],['Petit budget','Propose-moi un repas petit budget'],['Semaine simple','Propose-moi une semaine simple']].map(([l,t])=>`<div class="quick" onclick='coachAsk(${js(t)})'><b>${l}</b><div class="small">${t}</div></div>`).join('')}</div><div class="row" style="margin-top:12px"><input type="text" id="coachInput" placeholder="Écris ta demande"><button class="btn primary" onclick="coachSend()">Envoyer</button></div></div><div class="card-list" style="margin-top:14px">${hist.map(m=>`<div class="mini-card"><b>${m.role==='user'?'Toi':'Coach IA'}</b><div class="small" style="margin-top:6px;color:#eef3ff">${esc(m.text)}</div></div>`).join('')||'<div class="mini-card">Commence par une demande rapide.</div>'}</div></div>`}
function coachAsk(text){currentPrivate().coachHistory.unshift({id:uid(),role:'user',text});const low=text.toLowerCase();let answer='Je te conseille un plat rapide et facile à transformer en liste.';if(low.includes('provisions')){const names=currentPrivate().provisions.filter(p=>p.qty>0).map(p=>p.name.toLowerCase());const ideas=allRecipesForCurrent().filter(r=>r.ingredients.some(i=>names.includes(i.name.toLowerCase()))).slice(0,3);answer=ideas.length?'Voici 3 idées avec ce que tu as : '+ideas.map(r=>r.name).join(' · '):'Ajoute encore quelques produits dans Mes provisions pour que je te propose des idées plus ciblées.'} else if(low.includes('semaine')) answer='Je te conseille une semaine simple : 2 plats de pâtes, 2 dîners soupe/omelette, 1 salade complète, 1 plat au four et 1 repas libre.'; else if(low.includes('budget')) answer='Va vers les pâtes tomate basilic, riz sauté légumes œuf, soupe maison et galette thon fromage frais.'; currentPrivate().coachHistory.unshift({id:uid(),role:'assistant',text:answer});save();render()}
function coachSend(){const text=(document.getElementById('coachInput')||{}).value?.trim();if(!text)return;coachAsk(text)}
function settingsScreen(){const p=currentProfile();return `${appHeader(p.isAdmin?'Configuration Admin':'Mon profil et mon espace')}<div class="screen"><div class="panel col"><div><label class="lbl">Nom</label><input type="text" id="inp-settings-name" value="${esc(p.username)}" oninput="renameProfile(this.value)"></div><div><label class="lbl">Nouveau code</label><input type="password" placeholder="Laisser vide pour ne pas changer" onblur="if(this.value)changeOwnCode(this.value);this.value='' "></div><div><label class="lbl">Avatar</label><select onchange="changeAvatar(this.value)">${['🍽️','🧁','🥗','🍝','🍎','⭐','👀'].map(a=>`<option ${p.avatar===a?'selected':''}>${a}</option>`).join('')}</select></div><div class="row wrap"><button class="btn secondary" onclick="logout()">Se déconnecter</button>${!p.isAdmin?'<button class="btn danger" onclick="deleteOwnProfile()">Supprimer mon profil</button>':''}</div></div>${p.isAdmin?adminBlock():userBlock()}</div>`}
function userBlock(){const order=currentMenuOrder();return `<div class="section-title"><h3>Mon menu</h3><span>Privé</span></div><div class="panel card-list">${order.map((k,i)=>`<div class="product-row"><div class="product-meta"><b>${tabLabel(k)}</b><small>Ordre personnel</small></div><button class="icon-btn" ${i===0?'disabled':''} onclick='moveMenu(${js(k)},-1)'>↑</button><button class="icon-btn" ${i===order.length-1?'disabled':''} onclick='moveMenu(${js(k)},1)'>↓</button></div>`).join('')}<button class="btn secondary" onclick="setView({page:'guide',guideIndex:0})">Revoir le guide</button></div>`}
function moveMenu(k,d){let order=currentMenuOrder();const i=order.indexOf(k),ni=i+d;if(ni<0||ni>=order.length)return;[order[i],order[ni]]=[order[ni],order[i]];currentPrivate().menuOrder=order;save();render()}
function adminBlock(){const others=DB.profiles.filter(p=>!p.deleted&&p.id!==currentProfile().id);return `<div class="section-title"><h3>Configuration globale</h3><span>Admin Kassim</span></div><div class="panel col"><div><label class="lbl">Nom de l’application</label><input type="text" id="inp-admin-appname" value="${esc(DB.config.appName)}" oninput="DB.config.appName=this.value;save();render()"></div><div><label class="lbl">Phrase d’accueil</label><input type="text" id="inp-admin-slogan" value="${esc(DB.config.slogan)}" oninput="DB.config.slogan=this.value;save();render()"></div><div><label class="lbl">Message global</label><textarea id="inp-admin-message" oninput="DB.config.messageGlobal=this.value;save();render()">${esc(DB.config.messageGlobal||'')}</textarea></div><div class="grid2"><div><label class="lbl">Mode invité</label><select onchange="DB.config.allowGuest=this.value==='Oui';save();render()"><option ${DB.config.allowGuest?'selected':''}>Oui</option><option ${!DB.config.allowGuest?'selected':''}>Non</option></select></div><div><label class="lbl">Partage</label><select onchange="DB.config.allowSharing=this.value==='Oui';save();render()"><option ${DB.config.allowSharing?'selected':''}>Oui</option><option ${!DB.config.allowSharing?'selected':''}>Non</option></select></div></div><div class="grid2"><div><label class="lbl">Produits perso</label><select onchange="DB.config.allowCustomProducts=this.value==='Oui';save();render()"><option ${DB.config.allowCustomProducts?'selected':''}>Oui</option><option ${!DB.config.allowCustomProducts?'selected':''}>Non</option></select></div><div><label class="lbl">Recettes perso</label><select onchange="DB.config.allowCustomRecipes=this.value==='Oui';save();render()"><option ${DB.config.allowCustomRecipes?'selected':''}>Oui</option><option ${!DB.config.allowCustomRecipes?'selected':''}>Non</option></select></div></div><div><label class="lbl">Onglets visibles</label><div class="chips">${['home','catalogue','shopping','week','recipes','coach','provisions','settings'].map(k=>`<div class="chip ${DB.config.visibleTabs.includes(k)?'active':''}" onclick='toggleGlobalTab(${js(k)})'>${tabLabel(k)}</div>`).join('')}</div></div></div><div class="section-title"><h3>Profils et données</h3><span>Vue complète admin</span></div><div class="panel card-list">${others.map(p=>{const priv=p.privateData||{};const weekCount=(priv.weekPlan||[]).reduce((n,d)=>n+Object.values(d.slots||{}).filter(Boolean).length,0);return `<div class="mini-card"><div class="row"><div class="product-meta"><b>${esc(p.username)}</b><small>${p.household} · ${p.people||1} pers.</small></div><button class="btn danger" onclick='adminDeleteProfile(${js(p.id)})'>Supprimer</button></div><div class="small" style="margin-top:8px">Liste: ${(priv.shopping||[]).length} · Historique: ${(priv.shoppingHistory||[]).length} · Provisions: ${(priv.provisions||[]).filter(x=>x.qty>0).length} · Semaine: ${weekCount} repas</div><div class="inline-actions"><button class="btn secondary" onclick='openAdminInspect(${js(p.id)})'>Voir tout</button><button class="btn secondary" onclick='adminResetCode(${js(p.id)})'>Réinitialiser le code</button></div></div>`}).join('')||'<div class="mini-card">Aucun autre profil.</div>'}</div>`}
function toggleGlobalTab(k){const arr=DB.config.visibleTabs;const i=arr.indexOf(k);if(i>-1) arr.splice(i,1); else arr.push(k);DB.config.defaultMenuOrder=DB.config.defaultMenuOrder.filter(x=>arr.includes(x)).concat(arr.filter(x=>!DB.config.defaultMenuOrder.includes(x)));save();render();}
function openAdminInspect(id){const p=getProfile(id);if(!p)return toast('Profil introuvable');const priv=p.privateData||{};const week=(priv.weekPlan||[]).map(d=>`${d.day}: ${Object.entries(d.slots||{}).filter(([,v])=>v).map(([k])=>`${k}`).join(', ')||'vide'}`).join('<br>');openModal(`<div class="modal-panel"><div class="section-title"><h3>${esc(p.username)}</h3><span>Vue complète admin</span></div><div class="col"><div class="mini-card"><b>Profil</b><div class="small" style="margin-top:6px">${esc(p.household)} · ${p.people||1} personne(s) · ${esc(p.objective)} · ${esc(p.style)}</div><div class="small">Sport: ${esc(p.profileData?.sport||'')} · Budget: ${esc(p.profileData?.budget||'')} · Temps: ${esc(p.profileData?.cookTime||'')}</div><div class="small">Allergies: ${esc((p.profileData?.allergies||[]).join(', ')||'Aucune')}</div><div class="small">Aime: ${esc((p.profileData?.likes||[]).join(', ')||'Non renseigné')}</div><div class="small">N’aime pas: ${esc((p.profileData?.dislikes||[]).join(', ')||'Non renseigné')}</div></div><div class="mini-card"><b>Liste de courses</b><div class="small" style="margin-top:6px">${(priv.shopping||[]).map(i=>`${esc(i.name)} x${i.qty}`).join(' · ')||'Vide'}</div></div><div class="mini-card"><b>Mes provisions</b><div class="small" style="margin-top:6px">${(priv.provisions||[]).filter(i=>i.qty>0).map(i=>`${esc(i.name)} x${i.qty}`).join(' · ')||'Vide'}</div></div><div class="mini-card"><b>Programme semaine</b><div class="small" style="margin-top:6px">${week||'Vide'}</div></div><div class="mini-card"><b>Historique coach</b><div class="small" style="margin-top:6px">${(priv.coachHistory||[]).slice(0,6).map(i=>`${i.role==='user'?'Toi':'Coach'}: ${esc(i.text)}`).join(' · ')||'Vide'}</div></div><button class="btn secondary" onclick="closeModal()">Fermer</button></div></div>`)}
function renameProfile(v){if(currentProfile().isAdmin) return; currentProfile().username=uniqueUsername(v||currentProfile().username);save();render()}function changeOwnCode(v){currentProfile().code=v;save();toast('Code mis à jour')}function changeAvatar(v){currentProfile().avatar=v;save();render()}function deleteOwnProfile(){if(currentProfile().guest){logout();return;}if(!confirm('Supprimer ton profil ?'))return;currentProfile().deleted=true;DB.auth.currentProfileId=null;save();setView({page:'start'})}function adminDeleteProfile(id){if(!confirm('Supprimer ce profil ?'))return;const p=getProfile(id);if(p)p.deleted=true;save();render()}function adminResetCode(id){const p=getProfile(id);if(!p) return; p.code=''; save(); toast('Code réinitialisé')}
function openModal(content){const m=document.getElementById('modal');m.className='modal open';m.innerHTML=content}function closeModal(){const m=document.getElementById('modal');m.className='modal';m.innerHTML='';setView({recipeServings:null})}function openSheet(content){const s=document.getElementById('sheet');s.className='bottom-sheet open';s.innerHTML=content}function closeSheet(){const s=document.getElementById('sheet');s.className='bottom-sheet';s.innerHTML=''}
function toast(msg){let el=document.getElementById('toast');if(!el){el=document.createElement('div');el.id='toast';el.style.cssText='position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#0b162a;border:1px solid rgba(255,255,255,.12);color:white;padding:12px 16px;border-radius:14px;z-index:99;box-shadow:0 10px 26px rgba(0,0,0,.3)';document.body.appendChild(el)}el.textContent=msg;el.style.display='block';clearTimeout(window.__toastT);window.__toastT=setTimeout(()=>el.style.display='none',1900)}
document.addEventListener('click',e=>{if(e.target.id==='drawer')closeDrawer();if(e.target.id==='modal')closeModal();if(e.target.id==='sheet')closeSheet()});render();
</script>
</body>
