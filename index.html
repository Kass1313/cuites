}
function addCustomProduct(){const el=document.getElementById('newPN'),name=el?.value?.trim();if(!name)return toast('Nom requis');current().customProducts.unshift({id:uid(),name,category:'Perso',custom:true});el.value='';save();render();}
function deleteCustomProduct(id){const p=current();p.customProducts=p.customProducts.filter(x=>x.id!==id);save();render();}
function removeFromShopping(pid){const p=current();p.shopping=p.shopping.filter(x=>x.productId!==pid);save();render();}
function addToShopping(pid,d){const p=current(),prod=findProduct(pid);if(!p||!prod)return;let row=p.shopping.find(x=>x.productId===pid);if(!row&&d>0){row={id:uid(),productId:pid,name:prod.name,category:prod.category,qty:0,unit:'x',checked:false};p.shopping.unshift(row);}if(!row)return;row.qty=Math.max(0,(row.qty||0)+d);if(row.qty===0)p.shopping=p.shopping.filter(x=>x.id!==row.id);save();render();}
function addToProvisions(pid){const p=current(),prod=findProduct(pid);if(!p||!prod)return;let row=p.provisions.find(x=>x.productId===pid);if(!row){row={id:uid(),productId:pid,name:prod.name,category:prod.category,qty:0,unit:'x',low:false};p.provisions.unshift(row);}row.qty=Math.max(1,row.qty+1);save();render();toast('Ajouté 🏠');}

/* ===== SHOPPING ===== */
function shoppingScreen(){
  const p=current(),q=VIEW.shoppingSearch.trim();const items=p.shopping.filter(i=>!q||fuzzyMatch(q,i.name));
  const checked=p.shopping.filter(i=>i.checked).length,total=p.shopping.length,allOK=total>0&&checked===total;
  const pct=total>0?Math.round(checked/total*100):0;
  const grouped={};items.forEach(i=>{const c=i.category||'Divers';if(!grouped[c])grouped[c]=[];grouped[c].push(i);});
  const catOrd=['Fruits & légumes','Frais & crèmerie','Viandes & poisson','Boulangerie','Épicerie salée','Petit-déjeuner & goûter','Boissons','Surgelés','Hygiène','Ménage','Perso','Divers'];
  const sorted=Object.keys(grouped).sort((a,b)=>(catOrd.indexOf(a)===-1?99:catOrd.indexOf(a))-(catOrd.indexOf(b)===-1?99:catOrd.indexOf(b)));
  const listH=sorted.map(cat=>'<div class="rayon-header">'+esc(cat)+' ('+grouped[cat].length+')</div>'+grouped[cat].map(i=>'<div class="item-row" style="padding:'+(VIEW.shoppingMode?'16':'12')+'px"><div class="check'+(i.checked?' checked':'')+'" onclick="toggleShopItem('+js(i.id)+')">'+(i.checked?'✓':'')+'</div><div class="item-meta"><b style="font-size:'+(VIEW.shoppingMode?'17':'14')+'px;'+(i.checked?'text-decoration:line-through;opacity:0.5':'')+'">'+esc(i.name)+'</b><small>'+i.qty+' '+i.unit+'</small></div><div class="qty"><button onclick="changeShopQty('+js(i.id)+',-1)">−</button><div class="val">'+i.qty+'</div><button onclick="changeShopQty('+js(i.id)+',1)">+</button></div><button class="icon-btn" style="width:28px;height:28px;font-size:12px;color:var(--red)" onclick="removeShopItem('+js(i.id)+')">✕</button></div>').join('')).join('');
  // Recurring items
  const recHtml=p.recurringItems.length?'<div class="section-title"><h3>🔄 Récurrents</h3><span>'+p.recurringItems.length+'</span></div><div class="card-list">'+p.recurringItems.map((r,i)=>swR('<div class="item-row"><div class="item-meta"><b>'+esc(r.name)+'</b><small>'+r.qty+' '+r.unit+' · auto chaque semaine</small></div><button class="btn sm secondary" onclick="addRecurringToList('+i+')">+ Liste</button></div>','removeRecurring('+i+')')).join('')+'<button class="btn sm secondary mt" onclick="addAllRecurring()">Tout ajouter à la liste</button></div>':'';

  return appHeader('Liste de courses')+'<div class="screen"><div class="panel col">'+
    (total>0?'<div class="row gap-sm" style="margin-bottom:8px"><span class="small bold">'+checked+'/'+total+'</span><div class="progress-bar flex1"><div class="fill" style="width:'+pct+'%"></div></div><span class="small">'+pct+'%</span></div>':'')+
    '<div class="search"><input type="text" id="inp-ss" value="'+esc(VIEW.shoppingSearch)+'" oninput="setSearchDebounced(\'shoppingSearch\',this.value)" placeholder="Rechercher..."></div>'+
    '<div class="grid2"><input type="text" id="quickAdd" placeholder="Ajouter un article" onkeydown="if(event.key===\'Enter\')quickAddItem()"><button class="btn secondary" onclick="quickAddItem()">+</button></div>'+
    '<div class="row wrap"><button class="btn sm secondary" onclick="setView({shoppingMode:!view().shoppingMode})">'+(VIEW.shoppingMode?'📱 Normal':'🛒 Courses')+'</button><button class="btn sm secondary" onclick="toggleAllShop(true)">Tout ✓</button><button class="btn sm secondary" onclick="toggleAllShop(false)">Tout ✗</button>'+(allOK?'<button class="btn sm success" onclick="archiveShopping()">📦 Archiver</button>':'')+(checked>0?'<button class="btn sm primary" onclick="transferToProvisions()">→ Provisions</button>':'')+'<button class="btn sm secondary" onclick="exportShopping()">📋</button></div></div>'+
    '<div class="section-title"><h3>À acheter</h3><span>'+total+'</span></div><div class="card-list">'+(listH||'<div class="empty-state"><div class="empty-emoji">🛒</div><div class="empty-title">Liste vide</div></div>')+'</div>'+
    recHtml+
    '<div class="section-title"><h3>Historique</h3><span>'+p.shoppingHistory.length+'</span></div><div class="card-list">'+
    (p.shoppingHistory.slice(0,5).map(h=>swR('<div class="item-row" style="flex-wrap:wrap"><div class="item-meta"><b>'+formatDate(h.date)+'</b><small>'+h.items.length+' articles — '+h.items.slice(0,4).map(x=>x.name).join(', ')+(h.items.length>4?' ...':'')+'</small></div><div class="row gap-sm"><button class="btn sm secondary" onclick="viewHistory('+js(h.id)+')">👁️</button><button class="btn sm secondary" onclick="restoreHistory('+js(h.id)+')">+ Liste</button></div></div>','deleteHistory('+js(h.id)+')')).join('')||'<div class="mini-card small">Aucun historique</div>')+'</div></div>';
}
function quickAddItem(){const el=document.getElementById('quickAdd'),name=el?.value?.trim();if(!name)return;const p=current();let row=p.shopping.find(x=>normalize(x.name)===normalize(name));if(!row)p.shopping.unshift({id:uid(),productId:null,name,category:'Divers',qty:1,unit:'x',checked:false});else row.qty+=1;el.value='';save();render();}
function toggleShopItem(id){const r=current()?.shopping?.find(i=>i.id===id);if(r){r.checked=!r.checked;save();render();}}
function changeShopQty(id,d){const r=current()?.shopping?.find(i=>i.id===id);if(r){r.qty=Math.max(1,r.qty+d);save();render();}}
function removeShopItem(id){const p=current();p.shopping=p.shopping.filter(i=>i.id!==id);save();render();}
function toggleAllShop(v){current().shopping.forEach(i=>i.checked=v);save();render();}
function archiveShopping(){const p=current();if(!p.shopping.length)return;p.shoppingHistory.unshift({id:uid(),date:Date.now(),items:deepClone(p.shopping)});p.stats.listsCompleted++;p.shopping=[];save();render();toast('Archivé ✓');}
function restoreHistory(id){const p=current(),h=p.shoppingHistory.find(x=>x.id===id);if(!h)return;h.items.forEach(it=>{let row=p.shopping.find(s=>normalize(s.name)===normalize(it.name));if(row)row.qty+=it.qty;else p.shopping.push(deepClone(it));});save();render();}
function deleteHistory(id){current().shoppingHistory=current().shoppingHistory.filter(x=>x.id!==id);save();render();}
function transferToProvisions(){const p=current();const ch=p.shopping.filter(i=>i.checked);ch.forEach(item=>{let prov=p.provisions.find(x=>normalize(x.name)===normalize(item.name));if(!prov){prov={id:uid(),productId:item.productId,name:item.name,category:item.category,qty:0,unit:'x',low:false};p.provisions.unshift(prov);}prov.qty+=item.qty;});p.shopping=p.shopping.filter(i=>!i.checked);save();render();toast(ch.length+' → provisions 🏠');}
function exportShopping(){const p=current();if(!p.shopping.length)return toast('Liste vide');let txt='🛒 Ma liste\n';const grouped={};p.shopping.forEach(i=>{const c=i.category||'Divers';if(!grouped[c])grouped[c]=[];grouped[c].push(i);});Object.entries(grouped).forEach(([cat,items])=>{txt+='\n'+cat+':\n';items.forEach(i=>{txt+='  '+(i.checked?'✅':'⬜')+' '+i.name+' x'+i.qty+'\n';});});if(navigator.share)navigator.share({title:'Ma liste',text:txt}).catch(()=>{});else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>toast('Copié 📋'));else toast('Non supporté');}
function markAsRecurring(name,cat,qty,unit){const p=current();if(p.recurringItems.find(r=>normalize(r.name)===normalize(name)))return toast('Déjà récurrent');p.recurringItems.push({name,category:cat||'Divers',qty:qty||1,unit:unit||'x'});save();toast(name+' → récurrent 🔄');}
function removeRecurring(i){current().recurringItems.splice(i,1);save();render();}
function addRecurringToList(i){const r=current().recurringItems[i];if(r)addNamedToShopping(r.name,r.qty,r.unit,r.category);save();render();}
function addAllRecurring(){current().recurringItems.forEach(r=>addNamedToShopping(r.name,r.qty,r.unit,r.category));save();render();toast('Récurrents ajoutés ✓');}


function viewHistory(id){const p=current(),h=p.shoppingHistory.find(x=>x.id===id);if(!h)return;openSheet('<div class="section-title"><h3>Historique du '+formatDate(h.date)+'</h3><span>'+h.items.length+' articles</span></div><div class="card-list">'+h.items.map(i=>'<div class="item-row"><div class="item-meta"><b>'+esc(i.name)+'</b><small>'+i.qty+' '+i.unit+' · '+(i.checked?"✅":"⬜")+'</small></div><button class="btn sm secondary" onclick="addNamedToShopping('+js(i.name)+','+i.qty+','+js(i.unit)+','+js(i.category)+');save();toast(\'Ajouté\')">+ Liste</button></div>').join('')+'</div><button class="btn secondary full mt" onclick="restoreHistory('+js(id)+');closeSheet()">Tout remettre dans la liste</button>');}

  '<div class="chip'+(VIEW.recipeCopie?' active':'')+'" onclick="setView({recipeCopie:!view().recipeCopie})">🏠 Copie commande</div>'+

}
function addNamedToShopping(name,qty,unit,cat){const p=current();let row=p.shopping.find(x=>normalize(x.name)===normalize(name));if(!row)p.shopping.unshift({id:uid(),productId:null,name,category:cat||'Divers',qty:qty||1,unit:unit||'x',checked:false});else row.qty=Math.round((row.qty+qty)*10)/10;save();}
function addRecipeMissing(id,doR=true,serv=null){const r=allRecipes().find(x=>x.id===id);if(!r)return;const p=current();const pn=p.provisions.filter(x=>x.qty>0).map(x=>normalize(x.name));const f=(serv||r.servings||2)/(r.servings||2);r.ingredients.forEach(i=>{if(!pn.includes(normalize(i.name)))addNamedToShopping(i.name,Math.round(i.qty*f*10)/10,i.unit,r.category);});if(doR){closeModal();save();render();toast('Ajouté 🛒');}}

/* ===== PROVISIONS ===== */
function provisionsScreen(){
  let list=allProducts();const tab=VIEW.provisionTab;if(tab!=='Tout'){if(tab==='Perso')list=list.filter(p=>p.custom);else list=list.filter(p=>p.category===tab);}
  const q=VIEW.provisionSearch.trim();if(q)list=list.filter(p=>fuzzyMatch(q,p.name));
  const p=current(),active=p.provisions.filter(x=>x.qty>0),lowC=active.filter(x=>x.low).length;
  return appHeader('Mes provisions')+'<div class="screen"><div class="panel col"><div class="search"><input type="text" id="inp-pvs" value="'+esc(VIEW.provisionSearch)+'" oninput="setSearchDebounced(\'provisionSearch\',this.value)" placeholder="Chercher..."></div><div class="tabs">'+
  ['Tout','Frais & crèmerie','Fruits & légumes','Épicerie salée','Petit-déjeuner & goûter','Viandes & poisson','Boissons','Perso'].map(t=>'<div class="tab'+(tab===t?' active':'')+'" onclick="setView({provisionTab:'+js(t)+'})">' +t+'</div>').join('')+'</div><div class="row wrap"><button class="btn sm secondary" onclick="addBasePack()">📦 Base</button><button class="btn sm primary" onclick="coachFromProv()">🤖 3 idées</button></div></div>'+
  '<div class="section-title"><h3>En stock</h3><span>'+active.length+(lowC?' · '+lowC+' ⚠️':'')+'</span></div><div class="card-list">'+
  (active.length?active.map(pr=>swR('<div class="item-row"><div class="item-meta"><b>'+esc(pr.name)+'</b><small>'+esc(pr.category)+(pr.low?' · <span style="color:var(--red)">⚠️ Bas</span>':'')+'</small></div><div class="qty"><button onclick="changeProvQty('+js(pr.id)+',-1)">−</button><div class="val">'+pr.qty+'</div><button onclick="changeProvQty('+js(pr.id)+',1)">+</button></div><button class="btn sm '+(pr.low?'danger':'secondary')+'" onclick="toggleLow('+js(pr.id)+')">'+(pr.low?'⚠️':'Bas')+'</button><button class="icon-btn" style="width:28px;height:28px;font-size:12px" onclick="provToShopping('+js(pr.id)+')">🛒</button></div>','removeProv('+js(pr.id)+')')).join(''):'<div class="empty-state"><div class="empty-emoji">🏠</div><div class="empty-title">Vide</div></div>')+'</div>'+
  '<div class="section-title"><h3>Ajouter</h3><span>'+list.length+'</span></div><div class="card-list">'+
  list.slice(0,50).map(pr=>'<div class="item-row"><div class="item-meta"><b>'+esc(pr.name)+'</b><small>'+esc(pr.category)+'</small></div><button class="btn sm secondary" onclick="incProv('+js(pr.id)+')">J\'ai ça</button></div>').join('')+'</div></div>';
}
function removeProv(id){const r=current().provisions.find(x=>x.id===id);if(r)r.qty=0;save();render();}
function incProv(pid){const p=current(),prod=findProduct(pid);if(!prod)return;let row=p.provisions.find(x=>x.productId===pid);if(!row){row={id:uid(),productId:pid,name:prod.name,category:prod.category,qty:0,unit:'x',low:false};p.provisions.unshift(row);}row.qty++;save();render();}
function changeProvQty(id,d){const r=current()?.provisions?.find(x=>x.id===id);if(!r)return;r.qty=Math.max(0,r.qty+d);if(!r.qty)r.low=false;save();render();}
function toggleLow(id){const r=current()?.provisions?.find(x=>x.id===id);if(r){r.low=!r.low;save();render();}}
function provToShopping(id){const r=current()?.provisions?.find(x=>x.id===id);if(r){addNamedToShopping(r.name,1,r.unit,r.category);save();toast('→ Liste 🛒');}}
function addBasePack(){['pâtes','riz','œufs','lait','farine','thon','tomates pelées','beurre','fromage râpé','huile d\'olive','sel','poivre'].forEach(n=>{const prod=allProducts().find(p=>normalize(p.name)===normalize(n));if(prod)incProv(prod.id);});toast('Pack de base 📦');}
function coachFromProv(){setView({page:'coach'});setTimeout(()=>coachAsk("Propose-moi 3 idées repas avec mes provisions."),200);}

/* ===== COACH ===== */
function coachScreen(){
  const p=current(),hist=(p.coachHistory||[]).slice(0,30),hasKey=!!getApiKey();
  return appHeader('Coach IA'+(hasKey?' · Gemini':' · Hors-ligne'))+'<div class="screen"><div class="panel col"><div class="quick-grid">'+
  [['🍳 Rapide','Repas rapide ce soir'],['🏠 Provisions','Repas avec mes provisions'],['💰 Budget','Repas petit budget'],['📅 Semaine','Planning semaine'],['💪 Nutrition','Conseil nutrition'],['🔄 Alternative','Alternative plus saine'],['📦 Batch cooking','Propose un batch cooking dimanche'],['🥗 Restes','Que faire avec mes restes ?']].map(([l,t])=>'<div class="quick" onclick="coachAsk('+js(t)+')"><b>'+l+'</b></div>').join('')+'</div>'+
  '<div class="row mt"><input type="text" id="coachInput" value="'+esc(VIEW.coachInput||'')+'" placeholder="'+(hasKey?'Demande ce que tu veux...':'Clé API requise (admin)')+'" oninput="VIEW.coachInput=this.value" onkeydown="if(event.key===\'Enter\')coachSend()"><button class="btn primary" onclick="coachSend()">➤</button></div>'+
  (!hasKey?'<div class="small mt" style="color:var(--amber)">⚠️ Demande à Kassim de configurer la clé API.</div>':'')+
  '</div><div id="coachMsgs" class="card-list mt">'+
  (hist.length?hist.map(m=>'<div class="coach-bubble '+m.role+'"><div class="cb-role">'+(m.role==='user'?'Toi':'🤖 Coach')+'</div><div class="cb-text">'+formatCoachText(m.text)+'</div></div>').join(''):'<div class="empty-state"><div class="empty-emoji">🤖</div><div class="empty-title">Ton coach personnel</div><div class="empty-text">Nutritionniste · Chef · Coach sportif</div></div>')+'</div></div>';
}
function formatCoachText(t){return esc(t).replace(/\*\*(.*?)\*\*/g,'<b>$1</b>').replace(/\*(.*?)\*/g,'<i>$1</i>');}
function coachSend(){const el=document.getElementById('coachInput'),text=el?.value?.trim()||VIEW.coachInput?.trim();if(!text)return;VIEW.coachInput='';if(el)el.value='';coachAsk(text);}
function coachAsk(text){
  const p=current();if(!p)return;p.coachHistory.unshift({id:uid(),role:'user',text});p.stats.coachQuestions++;save();render();setTimeout(()=>{const el=document.getElementById('coachMsgs');if(el)el.scrollTop=el.scrollHeight;},100);
  if(!getApiKey()){const low=text.toLowerCase();let ans='Pour des réponses IA, demande à Kassim de configurer la clé API.';
    if(low.includes('provision')){const names=p.provisions.filter(x=>x.qty>0).map(x=>x.name);const ideas=allRecipes().filter(r=>r.ingredients.some(i=>names.map(normalize).includes(normalize(i.name)))).slice(0,3);ans=ideas.length?'Avec tes provisions :\n\n'+ideas.map(r=>r.emoji+' **'+r.name+'** — '+r.time+' min').join('\n'):'Ajoute des provisions d\'abord.';}
    else if(low.includes('semaine')||low.includes('planning'))ans='Suggestion :\n🟢 Lun: Pâtes tomate\n🟢 Mar: Riz sauté\n🟢 Mer: Soupe + omelette\n🟢 Jeu: Salade complète\n🟢 Ven: Gratin courgettes\n🟢 Sam: Burgers maison\n🟢 Dim: Tajine';
    else if(low.includes('budget'))ans='Petit budget :\n🍝 Pâtes tomate basilic\n🍚 Riz sauté légumes\n🍜 Soupe maison\n🌮 Galette thon';
    else if(low.includes('batch'))ans='Batch cooking dimanche :\n1. Cuis du riz (pour 3 jours)\n2. Rôtis des légumes au four\n3. Prépare une sauce tomate\n4. Cuis du poulet ou des lentilles\n→ Combine différemment chaque jour !';
    p.coachHistory.unshift({id:uid(),role:'assistant',text:ans});save();render();setTimeout(()=>{const el=document.getElementById('coachMsgs');if(el)el.scrollTop=el.scrollHeight;},150);setTimeout(()=>{const el=document.getElementById('coachMsgs');if(el)el.scrollTop=el.scrollHeight;},100);return;
  }
  const el2=document.getElementById('coachMsgs');if(el2)el2.insertAdjacentHTML('afterbegin','<div class="coach-typing" id="typDots"><span></span><span></span><span></span></div>');
  const fp=currentFixed(),prov=p.provisions.filter(x=>x.qty>0).map(x=>x.name).join(', ');
  const ctx=COACH_SYSTEM_PROMPT+'\n\nProfil actuel: '+fp.name+', '+p.household+', '+p.people+' pers, objectif '+p.objective+', style '+p.style+'. Budget: '+p.budget+'. Temps max: '+p.cookTime+'. Sport: '+(p.sport||'N/A')+'.'+(prov?'\nProvisions actuelles: '+prov:'')+(p.likes.length?'\nAime: '+p.likes.join(', '):'')+(p.dislikes.length?'\nAime PAS: '+p.dislikes.join(', '):'')+(p.allergies.length?'\nAllergies: '+p.allergies.join(', '):'')+'\n\nDemande: '+text;
  callGemini(text,ctx).then(ans=>{const d=document.getElementById('typDots');if(d)d.remove();p.coachHistory.unshift({id:uid(),role:'assistant',text:ans});save();render();setTimeout(()=>{const el=document.getElementById('coachMsgs');if(el)el.scrollTop=el.scrollHeight;},150);});
}
async function callGemini(prompt){const key=getApiKey();if(!key)return 'Clé API non configurée.';try{const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contents:[{role:'user',parts:[{text:prompt}]}],generationConfig:{maxOutputTokens:1500,temperature:0.75}})});if(!r.ok)throw new Error(await r.text());const d=await r.json();return d.candidates?.[0]?.content?.parts?.[0]?.text||'Pas de réponse.';}catch(e){return 'Erreur API.';}}


function techniquesScreen(){
  const techniques=[
    {emoji:'🍚',title:'Cuire du riz basmati parfait',steps:['Rince 3 fois à l\'eau froide','1 volume riz = 1.5 volumes eau + sel','Feu fort sans couvercle jusqu\'à ébullition','Couvercle + feu minimum 12 min','NE JAMAIS OUVRIR. 5 min repos. Aérer.']},
    {emoji:'🍗',title:'Mariner du poulet',steps:['Coupe en morceaux réguliers','Yaourt + épices + huile + sel dans un bol','Mélange bien, chaque morceau doit être enrobé','Minimum 20 min au frigo (idéal : toute la nuit)','Le yaourt attendrit la viande, les épices pénètrent']},
    {emoji:'🍅',title:'Sauce tomate maison',steps:['Oignon émincé dans huile d\'olive 5 min','Ajoute ail pressé 1 min','Verse coulis de tomate + sel + sucre (1 pincée)','Basilic, paprika, herbes de Provence','Mijote 15 min feu doux. Plus ça mijote, meilleur c\'est.']},
    {emoji:'🥩',title:'Cuire un steak parfait',steps:['Sors la viande du frigo 30 min avant','Poêle TRÈS chaude + filet d\'huile','Dépose le steak, NE TOUCHE PAS pendant 2 min','Retourne 1 seule fois. 2 min de l\'autre côté (à point)','Laisse reposer 2 min dans une assiette avant de servir']},
    {emoji:'🥚',title:'Œuf mollet parfait',steps:['Eau bouillante à gros bouillons','Plonge l\'œuf délicatement avec une cuillère','CHRONO : 6 min 30 exactement','Plonge immédiatement dans l\'eau glacée','Épluche doucement. Jaune coulant garanti.']},
    {emoji:'🫓',title:'Pâte à naan express',steps:['300g farine + levure + sel + 150g yaourt','Pétris 3-4 min jusqu\'à boule souple','Divise en boules, repose 10 min','Aplatis au rouleau, cuis à la poêle très chaude','Beurre fondu immédiatement à la sortie']},
    {emoji:'🔪',title:'Couper vite et bien',steps:['Couteau bien aiguisé = sécurité','Main en griffe : doigts repliés, pousse avec les phalanges','Le couteau glisse contre les phalanges, jamais les doigts','Planche stable : torchon humide dessous','Petits morceaux = cuisson plus rapide et uniforme']},
    {emoji:'🍳',title:'Omelette baveuse',steps:['Bats les œufs + sel + 1 càs d\'eau (légèreté)','Poêle beurrée à feu MOYEN (pas fort !)','Verse les œufs, laisse prendre 1 min','Garniture quand le dessous est pris, dessus baveux','Plie, 30 sec, sers. Le centre finit dans l\'assiette.']}
  ];
  return appHeader('Fiches techniques')+'<div class="screen"><div class="section-title"><h3>📚 Techniques de base</h3><span>'+techniques.length+' fiches</span></div><div class="card-list">'+
    techniques.map(t=>'<div class="panel" style="margin-bottom:8px"><div class="row"><div style="font-size:28px">'+t.emoji+'</div><b>'+esc(t.title)+'</b></div><div class="col mt">'+t.steps.map((s,i)=>'<div class="small"><b>'+(i+1)+'.</b> '+esc(s)+'</div>').join('')+'</div></div>').join('')+'</div>';
}

/* ===== SETTINGS ===== */
function settingsScreen(){
  const p=current(),fp=currentFixed();
  return appHeader(isAdmin()?'Administration':'Mon profil')+'<div class="screen">'+
    '<div class="panel col"><div class="row"><div style="font-size:36px">'+(p.avatar||'🍽️')+'</div><div class="item-meta"><b style="font-size:18px">'+esc(fp.name)+'</b><small>'+p.household+' · '+p.people+' pers. · '+p.objective+'</small></div></div>'+
    '<div class="grid2"><div><label class="lbl">Avatar</label><select onchange="current().avatar=this.value;save();render()">'+['🍽️','👑','🐼','⭐','🌙','⚡','💎','🦊','🌸','🎯','🔥','🌈'].map(a=>'<option'+(p.avatar===a?' selected':'')+'>'+a+'</option>').join('')+'</select></div>'+
    '<div><label class="lbl">Couleur</label><select onchange="current().color=this.value;save();render()">'+[['#6da0f0','Bleu'],['#d4a843','Or'],['#3ec97a','Vert'],['#e8616e','Rose'],['#c77dff','Violet'],['#e8b33a','Ambre']].map(([c,n])=>'<option value="'+c+'"'+(p.color===c?' selected':'')+'>'+n+'</option>').join('')+'</select></div></div>'+
    '<div><label class="lbl">Nouveau code</label><input type="password" placeholder="Laisser vide" onblur="if(this.value){current().code=simpleHash(this.value);save();toast(\'Code ✓\');this.value=\'\'}"></div>'+
    '<div class="row wrap"><button class="btn sm secondary" onclick="toggleLightMode()">'+(p.lightMode?'🌙 Mode sombre':'☀️ Mode clair')+'</button>'+
    '<button class="btn sm secondary" onclick="initDraft();setView({page:\'setup\',setupStep:0})">🔧 Reconfigurer</button>'+
    '<button class="btn sm secondary" onclick="logout()">🚪 Changer profil</button></div></div>'+

    // Objectif hebdo
    '<div class="section-title"><h3>🎯 Objectif hebdo</h3><span></span></div><div class="panel col"><div><label class="lbl">Repas maison / semaine</label><input type="number" min="1" max="21" value="'+p.goals.target+'" oninput="current().goals.target=Math.max(1,parseInt(this.value)||5);save()"></div></div>'+

    // Stats
    '<div class="section-title"><h3>Statistiques</h3></div><div class="panel"><div class="stat-row"><div style="font-size:20px">🍳</div><div class="item-meta"><div class="small">Recettes cuisinées</div><b>'+(p.stats.recipesCooked||0)+'</b></div></div><div class="stat-row"><div style="font-size:20px">🛒</div><div class="item-meta"><div class="small">Listes complétées</div><b>'+(p.stats.listsCompleted||0)+'</b></div></div><div class="stat-row"><div style="font-size:20px">🤖</div><div class="item-meta"><div class="small">Questions au coach</div><b>'+(p.stats.coachQuestions||0)+'</b></div></div></div>'+

    // Admin API
    (isAdmin()?'<div class="section-title"><h3>🔑 Coach IA · Gemini</h3><span>Admin</span></div><div class="panel col"><div><label class="lbl">Clé API (partagée)</label><input type="password" id="inp-ak" value="'+(getApiKey()?'••••••••••••':'')+'" onfocus="this.value=getApiKey()" onblur="if(this.value!==getApiKey())saveApiKey(this.value);if(this.value)this.value=\'••••••••••••\'" placeholder="Colle ta clé"></div><div class="small">'+(getApiKey()?'✅ Active pour tous':'❌ Hors-ligne')+'</div></div>':'')+

    // Admin panel
    (isAdmin()?adminPanel():'')+
    (isAdmin()?'<div class="section-title"><h3>Config app</h3></div><div class="panel col"><div><label class="lbl">Message global</label><textarea id="inp-msg" oninput="DB.config.messageGlobal=this.value;save()">'+esc(DB.config.messageGlobal||'')+'</textarea></div></div>':'')+
    '</div>';
}
function toggleLightMode(){const p=current();p.lightMode=!p.lightMode;save();render();}
function adminPanel(){return '<div class="section-title"><h3>👥 Profils</h3><span>Admin</span></div><div class="panel card-list">'+FIXED_PROFILES.filter(f=>f.id!==DB.currentProfileId).map(fp=>{const pd=DB.profiles[fp.id];return '<div class="mini-card"><div class="row"><div style="font-size:24px">'+(pd?.avatar||fp.defaultAvatar)+'</div><div class="item-meta"><b>'+esc(fp.name)+'</b><small>'+(pd?.setupDone?pd.household+' · '+pd.objective:'Non configuré')+'</small></div></div><div class="row mt"><button class="btn sm secondary" onclick="adminResetCode(\''+fp.id+'\')">🔑 Reset code</button><button class="btn sm danger" onclick="adminDeleteProfile(\''+fp.id+'\')">🗑️ Supprimer</button></div></div>';}).join('')+'</div>';}
function adminResetCode(id){if(!confirm('Réinitialiser le code ?'))return;DB.profiles[id].code='';save();toast('Code réinitialisé');}
function adminDeleteProfile(id){const fp=FIXED_PROFILES.find(f=>f.id===id);if(!confirm('Supprimer les données de '+fp.name+' ?'))return;DB.profiles[id]=makeProfileData({avatar:fp.defaultAvatar,color:fp.defaultColor});save();render();toast(fp.name+' réinitialisé');}


render();
</script>
