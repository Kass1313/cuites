<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maison Gourmet</title>
<meta name="theme-color" content="#0a1628">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
/* ===== DESIGN SYSTEM ===== */
:root {
  --bg: #0a1628;
  --bg2: #0e1d36;
  --panel: #121f3a;
  --panel2: #182a4a;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --line: rgba(255,255,255,0.08);
  --line2: rgba(255,255,255,0.12);
  --text: #f0f4fc;
  --text2: #c8d4ea;
  --muted: #8899b8;
  --gold: #d4a843;
  --gold2: #f0d88a;
  --gold-bg: rgba(212,168,67,0.12);
  --gold-border: rgba(212,168,67,0.28);
  --blue: #6da0f0;
  --blue-bg: rgba(109,160,240,0.10);
  --blue-border: rgba(109,160,240,0.22);
  --green: #3ec97a;
  --green-bg: rgba(62,201,122,0.12);
  --green-border: rgba(62,201,122,0.28);
  --red: #e8616e;
  --red-bg: rgba(232,97,110,0.12);
  --red-border: rgba(232,97,110,0.28);
  --amber: #e8b33a;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.3);
  --shadow-sm: 0 4px 16px rgba(0,0,0,0.2);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 15px; line-height: 1.5; height: 100%; -webkit-font-smoothing: antialiased; }
body { min-height: 100vh; min-height: 100dvh; }
button, input, select, textarea { font: inherit; color: inherit; }
img { max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ===== APP SHELL ===== */
.app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; position: relative; padding-bottom: 80px; }
@media (min-width: 481px) { .app { border-left: 1px solid var(--line); border-right: 1px solid var(--line); } }

/* ===== TOPBAR ===== */
.topbar { position: sticky; top: 0; z-index: 20; display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(10,22,40,0.92); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid var(--line); }
.brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.brandmark { width: 40px; height: 40px; border-radius: 13px; background: linear-gradient(135deg, var(--panel2), var(--panel)); border: 1px solid var(--gold-border); display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
.brand-text h1 { margin: 0; font-size: 17px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.brand-text p { margin: 2px 0 0; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.topbar-badge { padding: 6px 10px; border-radius: var(--radius-xs); border: 1px solid var(--gold-border); background: var(--gold-bg); color: var(--gold2); font-size: 11px; font-weight: 700; letter-spacing: 0.03em; white-space: nowrap; }

/* ===== BOTTOM NAV ===== */
.bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; z-index: 30; display: flex; justify-content: space-around; align-items: center; padding: 6px 4px calc(6px + var(--safe-bottom)); background: rgba(10,22,40,0.96); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid var(--line); }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 10px; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); color: var(--muted); background: none; border: none; min-width: 52px; position: relative; }
.nav-item.active { color: var(--gold); }
.nav-item.active::before { content: ''; position: absolute; top: -6px; width: 20px; height: 3px; border-radius: 99px; background: var(--gold); animation: navDot 0.3s ease; }
.nav-ico { font-size: 22px; line-height: 1; transition: transform var(--transition); position: relative; }
.nav-item.active .nav-ico { transform: scale(1.12); }
.nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.02em; }
.nav-badge { position: absolute; top: -4px; right: -6px; min-width: 18px; height: 18px; border-radius: 99px; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 4px; animation: badgePop 0.3s ease; }
@keyframes navDot { from { width: 0; opacity: 0; } to { width: 20px; opacity: 1; } }
@keyframes badgePop { from { transform: scale(0); } to { transform: scale(1); } }

/* ===== SCREEN ===== */
.screen { padding: 16px; }
.page-enter { animation: pageIn 0.22s ease; }
@keyframes pageIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

/* ===== PANELS & CARDS ===== */
.panel { background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02)); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); }
.hero { padding: 20px; border-radius: 24px; background: radial-gradient(ellipse at top left, rgba(212,168,67,0.15), transparent 40%), linear-gradient(180deg, #152b50, #0f1f3d); border: 1px solid var(--gold-border); box-shadow: var(--shadow); }
.hero h2 { margin: 0 0 6px; font-size: 26px; line-height: 1.1; }
.hero p { margin: 0; color: var(--text2); line-height: 1.45; font-size: 14px; }
.mini-card { padding: 14px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--line); transition: transform 0.15s; }
.mini-card:active { transform: scale(0.98); }
.card-list { display: grid; gap: 10px; }

/* ===== KPIS ===== */
.kpis { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px; }
.kpi { background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 12px; text-align: center; }
.kpi .n { font-size: 22px; font-weight: 800; }
.kpi .l { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ===== SHORTCUTS ===== */
.shortcuts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 14px; }
.shortcut { padding: 14px; border-radius: var(--radius); background: linear-gradient(180deg, var(--panel2), var(--panel)); border: 1px solid var(--line); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
.shortcut:active { transform: scale(0.97); }
.shortcut .ico { width: 40px; height: 40px; border-radius: var(--radius-sm); display: grid; place-items: center; background: var(--gold-bg); border: 1px solid var(--gold-border); font-size: 18px; flex-shrink: 0; }
.shortcut b { font-size: 14px; }
.shortcut .small { font-size: 12px; color: var(--muted); }

/* ===== SECTION TITLES ===== */
.section-title { display: flex; justify-content: space-between; align-items: center; margin: 18px 2px 10px; }
.section-title h3 { margin: 0; font-size: 16px; font-weight: 700; }
.section-title span { font-size: 12px; color: var(--muted); }

/* ===== BUTTONS ===== */
.btn { height: 44px; border-radius: var(--radius-sm); padding: 0 16px; cursor: pointer; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: transform 0.12s, filter 0.12s; white-space: nowrap; }
.btn:active { transform: scale(0.96); }
.btn.primary { background: linear-gradient(180deg, #e8c56e, #c9a040); color: #0f1728; border: none; box-shadow: 0 4px 12px rgba(212,168,67,0.3); }
.btn.secondary { background: var(--surface2); border: 1px solid var(--line2); color: var(--text); }
.btn.danger { background: var(--red-bg); border: 1px solid var(--red-border); color: #ffd0d5; }
.btn.success { background: var(--green-bg); border: 1px solid var(--green-border); color: #b8f5d4; }
.btn.sm { height: 36px; font-size: 13px; padding: 0 12px; border-radius: var(--radius-xs); }
.btn.full { width: 100%; }
.icon-btn { width: 40px; height: 40px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--surface); color: var(--text); display: grid; place-items: center; cursor: pointer; transition: transform 0.12s; flex-shrink: 0; }
.icon-btn:active { transform: scale(0.9); }

/* ===== INPUTS ===== */
input[type=text], input[type=password], input[type=number], select, textarea { width: 100%; height: 44px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--surface); color: var(--text); padding: 0 14px; outline: none; font-size: 14px; transition: border-color var(--transition); }
input:focus, select:focus, textarea:focus { border-color: var(--gold-border); }
textarea { min-height: 80px; padding: 12px 14px; resize: vertical; }
label.lbl { display: block; margin-bottom: 5px; color: var(--text2); font-size: 13px; font-weight: 600; }
::placeholder { color: var(--muted); }

/* ===== LAYOUT HELPERS ===== */
.row { display: flex; gap: 10px; align-items: center; }
.row.wrap { flex-wrap: wrap; }
.col { display: flex; flex-direction: column; gap: 10px; }
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.flex1 { flex: 1; }
.small { font-size: 12px; color: var(--muted); }
.bold { font-weight: 700; }
.mt { margin-top: 14px; }
.gap-sm { gap: 6px; }

/* ===== CHIPS & TABS ===== */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); font-size: 13px; cursor: pointer; transition: all 0.15s; user-select: none; }
.chip:active { transform: scale(0.95); }
.chip.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold2); }
.tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; -ms-overflow-style: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line); background: var(--surface); white-space: nowrap; cursor: pointer; font-size: 13px; transition: all 0.15s; }
.tab:active { transform: scale(0.95); }
.tab.active { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold2); }

/* ===== SEARCH ===== */
.search { position: relative; }
.search input { padding-left: 40px; }
.search::before { content: '🔎'; position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: 0.7; pointer-events: none; }

/* ===== PRODUCT/ITEM ROWS ===== */
.item-row { display: flex; gap: 10px; align-items: center; padding: 12px; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--line); transition: transform 0.15s; }
.item-row:active { transform: scale(0.98); }
.item-meta { flex: 1; min-width: 0; }
.item-meta b { display: block; font-size: 14px; line-height: 1.3; }
.item-meta small { color: var(--muted); font-size: 12px; }
.item-emoji { font-size: 28px; width: 40px; text-align: center; flex-shrink: 0; }

/* ===== QUANTITY CONTROLS ===== */
.qty { display: flex; align-items: center; gap: 5px; }
.qty button { width: 32px; height: 32px; border-radius: var(--radius-xs); border: 1px solid var(--line); background: var(--surface); color: var(--text); cursor: pointer; font-size: 16px; display: grid; place-items: center; transition: transform 0.1s; }
.qty button:active { transform: scale(0.88); }
.qty .val { min-width: 28px; text-align: center; font-weight: 700; font-size: 15px; }

/* ===== CHECKBOX ===== */
.check { width: 26px; height: 26px; border-radius: 8px; border: 1px solid var(--line); display: grid; place-items: center; background: var(--surface); cursor: pointer; flex-shrink: 0; transition: all 0.15s; font-size: 13px; }
.check:active { transform: scale(0.9); }
.check.checked { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }

/* ===== PROGRESS BAR ===== */
.progress-bar { height: 6px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
.progress-bar .fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--gold), var(--green)); transition: width 0.4s ease; }

/* ===== BADGES ===== */
.badge { display: inline-flex; padding: 4px 8px; border-radius: 999px; background: var(--surface2); border: 1px solid var(--line); font-size: 11px; font-weight: 600; }
.badge.gold { background: var(--gold-bg); border-color: var(--gold-border); color: var(--gold2); }
.badge.green { background: var(--green-bg); border-color: var(--green-border); color: var(--green); }
.badge.red { background: var(--red-bg); border-color: var(--red-border); color: var(--red); }
.badge.blue { background: var(--blue-bg); border-color: var(--blue-border); color: var(--blue); }

/* ===== SWIPE TO DELETE ===== */
.swipe-wrap { position: relative; overflow: hidden; border-radius: var(--radius); }
.swipe-inner { position: relative; transition: transform 0.25s ease; touch-action: pan-y; }
.swipe-inner.swiping { transition: none; }
.swipe-del { position: absolute; right: 0; top: 0; bottom: 0; width: 80px; display: flex; align-items: center; justify-content: center; background: linear-gradient(90deg, transparent, rgba(232,97,110,0.85) 40%); border-radius: 0 var(--radius) var(--radius) 0; color: #fff; font-size: 20px; cursor: pointer; opacity: 0; transition: opacity 0.2s; }
.swipe-wrap.reveal .swipe-del { opacity: 1; }

/* ===== RAYON HEADER ===== */
.rayon-header { padding: 8px 12px; border-radius: var(--radius-xs); background: var(--gold-bg); border: 1px solid var(--gold-border); font-size: 12px; font-weight: 700; color: var(--gold2); margin-top: 8px; letter-spacing: 0.02em; }

/* ===== COACH BUBBLES ===== */
.coach-bubble { padding: 14px; border-radius: var(--radius); border: 1px solid var(--line); animation: pageIn 0.25s ease; }
.coach-bubble.user { background: var(--gold-bg); border-color: var(--gold-border); margin-left: 32px; }
.coach-bubble.assistant { background: var(--blue-bg); border-color: var(--blue-border); margin-right: 20px; }
.cb-role { font-size: 11px; font-weight: 700; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
.coach-bubble.user .cb-role { color: var(--gold); }
.coach-bubble.assistant .cb-role { color: var(--blue); }
.cb-text { font-size: 14px; color: var(--text2); line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
.cb-text b, .cb-text strong { color: var(--text); }
.coach-typing { display: inline-flex; gap: 4px; padding: 10px 16px; border-radius: var(--radius); background: var(--blue-bg); border: 1px solid var(--blue-border); }
.coach-typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); opacity: 0.4; animation: typeDot 1.2s infinite; }
.coach-typing span:nth-child(2) { animation-delay: 0.2s; }
.coach-typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typeDot { 0%, 80% { opacity: 0.4; transform: scale(1); } 40% { opacity: 1; transform: scale(1.3); } }

/* ===== RECIPE COVER ===== */
.recipe-cover { height: 140px; border-radius: var(--radius); background: linear-gradient(135deg, #1e3a68, #122342); border: 1px solid var(--line); display: grid; place-items: center; font-size: 56px; }

/* ===== SLIDE VISUAL ===== */
.slide-visual { height: 160px; border-radius: 22px; background: linear-gradient(135deg, #1c3460, #10203b); border: 1px solid var(--line); position: relative; overflow: hidden; display: grid; place-items: center; font-size: 64px; margin: 16px 0; }
.slide-visual::after { content: ''; position: absolute; inset: auto -40px -40px auto; width: 120px; height: 120px; background: rgba(212,168,67,0.14); border-radius: 999px; filter: blur(30px); }

/* ===== MODAL & SHEET ===== */
.modal-overlay, .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.modal-overlay.open, .sheet-overlay.open { opacity: 1; pointer-events: auto; }
.modal-panel { position: absolute; inset: 50% auto auto 50%; transform: translate(-50%, -50%); width: min(92vw, 440px); background: linear-gradient(180deg, #152a4e, #0d1b34); border: 1px solid var(--line); border-radius: 24px; padding: 20px; max-height: 88vh; overflow-y: auto; }
.sheet-panel { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(180deg, #152a4e, #0d1b34); border-top-left-radius: 24px; border-top-right-radius: 24px; border-top: 1px solid var(--line); padding: 16px 16px calc(16px + var(--safe-bottom)); max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.sheet-overlay.open .sheet-panel { transform: translateY(0); }
.sheet-handle { width: 36px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.15); margin: 0 auto 14px; }

/* ===== PROFILE SELECTOR ===== */
.profile-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; padding: 20px 0; }
.profile-card { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: transform 0.2s; padding: 12px; border-radius: var(--radius); }
.profile-card:active { transform: scale(0.93); }
.profile-card .avatar-ring { width: 72px; height: 72px; border-radius: 50%; border: 3px solid var(--line); display: grid; place-items: center; font-size: 32px; transition: border-color 0.2s, box-shadow 0.2s; }
.profile-card:hover .avatar-ring { border-color: var(--gold-border); box-shadow: 0 0 20px rgba(212,168,67,0.2); }
.profile-card .pname { font-size: 14px; font-weight: 600; color: var(--text2); }
.profile-card.setup .avatar-ring { border-style: dashed; border-color: var(--muted); opacity: 0.5; }
.profile-card.setup .pname { color: var(--muted); }

/* ===== QUICK GRID ===== */
.quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
.quick { padding: 12px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--line); cursor: pointer; transition: transform 0.15s; }
.quick:active { transform: scale(0.96); }
.quick b { font-size: 13px; display: block; }

/* ===== TOAST ===== */
.toast { position: fixed; left: 50%; bottom: 88px; transform: translateX(-50%) translateY(16px); background: linear-gradient(180deg, #1e3660, #132548); border: 1px solid var(--gold-border); color: var(--text); padding: 12px 20px; border-radius: var(--radius); z-index: 99; box-shadow: var(--shadow); font-size: 14px; font-weight: 500; opacity: 0; pointer-events: none; transition: all 0.3s ease; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== ONBOARDING STEP INDICATOR ===== */
.step-dots { display: flex; justify-content: center; gap: 8px; padding: 12px 0; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--surface2); transition: all 0.3s; }
.step-dot.active { width: 24px; border-radius: 99px; background: var(--gold); }
.step-dot.done { background: var(--green); }

/* ===== STATS CARD ===== */
.stat-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
.stat-row .stat-icon { width: 36px; height: 36px; border-radius: var(--radius-xs); display: grid; place-items: center; font-size: 16px; }
.stat-row .stat-info { flex: 1; }
.stat-row .stat-val { font-weight: 700; font-size: 15px; }

/* ===== EMPTY STATE ===== */
.empty-state { text-align: center; padding: 32px 16px; }
.empty-state .empty-emoji { font-size: 48px; margin-bottom: 12px; }
.empty-state .empty-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.empty-state .empty-text { font-size: 13px; color: var(--muted); }

/* ===== UTILITIES ===== */
.text-gold { color: var(--gold2); }
.text-green { color: var(--green); }
.text-red { color: var(--red); }
.text-blue { color: var(--blue); }
.text-center { text-align: center; }
.hidden { display: none !important; }
</style>
</head>
<body>
<div class="app" id="app"></div>
<nav class="bottom-nav" id="bottomNav" style="display:none"></nav>
<div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
<div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet()"></div>

il","qty":3,"unit":"gousses"},{"name":"beurre","qty":30,"unit":"g"},{"name":"garam masala","qty":2,"unit":"cc"}],"steps":["MARINADE : Coupe le poulet en cubes de 3 cm. Dans un bol : yaourt + 1 cc garam masala + 0.5 cc curcuma + sel. Mélange avec le poulet. Couvre et frigo 30 min minimum (toute la nuit = encore meilleur).","CUISSON POULET : Poêle bien chaude + filet d'huile. Fais dorer le poulet 3-4 min de chaque côté. Il doit être COLORÉ avec des marques de caramélisation. C'est ça qui donne le goût. Réserve.","SAUCE : Même poêle, fais fondre le beurre. Ajoute l'oignon émincé FINEMENT. Cuis 5 min à feu moyen jusqu'à ce qu'il soit translucide et commence à dorer.","Ajoute l'ail pressé + le reste du garam masala + un doigt de gingembre si t'en as. Mélange 1 min, ça doit sentir incroyablement bon.","Verse le coulis de tomate + un demi-verre d'eau. Laisse mijoter 15 min à feu doux. La sauce épaissit et devient plus foncée. Goûte : ajuste le sel, une pincée de sucre si trop acide.","Ajoute la crème, mélange. Remets le poulet. Feu TRÈS DOUX 5 min. La sauce doit napper le poulet. Ne fais plus bouillir après la crème.","Sers avec du riz basmati (voir fiche technique 'Riz parfait'). ASTUCE : un peu de coriandre fraîche et un naan par-dessus = niveau restaurant indien."],"emoji":"🍛","difficulty":"Moyen","cost":"€€","servings":4,"tags":["Confort","Protéiné"],"protein":33,"priceMaison":6,"priceLivraison":0},{"id":92,"name":"Poulet Tikka Masala","category":"Repas du soir","time":35,"ingredients":[{"name":"blanc de poulet","qty":500,"unit":"g"},{"name":"yaourt nature","qty":100,"unit":"g"},{"name":"coulis de tomate","qty":300,"unit":"g"},{"name":"lait de coco","qty":200,"unit":"ml"},{"name":"oignon","qty":2,"unit":"pièces"},{"name":"curry","qty":2,"unit":"cc"}],"steps":["Coupe le poulet en morceaux. Marine-le dans le yaourt avec le curry, du cumin et du sel pendant au moins 20 min.","Dans une grande poêle, fais dorer le poulet mariné à feu vif 4-5 min. Il doit être bien coloré. Réserve-le.","Dans la même poêle, fais revenir les oignons émincés 5 min à feu moyen avec un filet d'huile.","Ajoute le coulis de tomate, le lait de coco et une pincée de paprika. Mélange bien.","Remets le poulet dans la sauce. Laisse mijoter 15 min à couvert, à feu doux. La sauce va devenir crémeuse et épaisse.","Sers bien chaud avec du riz basmati ou du naan. Conseil : un filet de citron vert par-dessus, c'est incroyable."],"emoji":"🍛","difficulty":"Moyen","cost":"€€","servings":4,"tags":["Confort","Protéiné"],"protein":33,"priceMaison":6,"priceLivraison":0},{"id":93,"name":"Tacos mexicains bœuf","category":"Repas du soir","time":25,"ingredients":[{"name":"bœuf haché","qty":400,"unit":"g"},{"name":"tortillas","qty":8,"unit":"pièces"},{"name":"tomate","qty":2,"unit":"pièces"},{"name":"avocat","qty":1,"unit":"pièce"},{"name":"oignon","qty":1,"unit":"pièce"},{"name":"citron","qty":1,"unit":"pièce"}],"steps":["Émince l'oignon. Fais-le revenir dans une poêle avec un filet d'huile pendant 3 min.","Ajoute le bœuf haché. Casse-le bien avec une spatule. Ajoute du cumin, du paprika, du sel et du poivre. Cuis 8 min en remuant.","Pendant ce temps, prépare la garniture : coupe les tomates en petits dés, écrase l'avocat avec du jus de citron et du sel.","Réchauffe les tortillas 30 secondes à la poêle sèche (sans huile) de chaque côté.","Garnis chaque tortilla de viande, de tomates, et d'une cuillère de guacamole. Un filet de citron par-dessus et c'est prêt !"],"emoji":"🌮","difficulty":"Facile","cost":"€€","servings":4,"tags":["Rapide","Confort"],"protein":25,"priceMaison":6,"priceLivraison":0},{"id":94,"name":"Quesadillas poulet fromage","category":"Déjeuner","time":15,"ingredients":[{"name":"tortillas","qty":4,"unit":"pièces"},{"name":"blanc de poulet","qty":200,"unit":"g"},{"name":"fromage râpé","qty":150,"unit":"g"},{"name":"poivron","qty":1,"unit":"pièce"}],"steps":["Si le poulet est cru, coupe-le en petits morceaux et fais-le cuire à la poêle 6-7 min avec des épices (paprika, cumin, sel). Sinon, utilise des restes de poulet cuit.","Coupe le poivron en fines lamelles.","Sur une tortilla, répartis du fromage râpé, du poulet et des lamelles de poivron. Referme avec une deuxième tortilla.","Fais cuire à la poêle sèche (sans huile) 2-3 min de chaque côté à feu moyen. Le fromage doit fondre et la tortilla devenir croustillante.","Coupe en quartiers et sers avec de la sauce tomate ou du guacamole. Astuce : appuie légèrement avec la spatule pendant la cuisson pour bien souder les deux tortillas."],"emoji":"🧀","difficulty":"Facile","cost":"€","servings":2,"tags":["Rapide","Moins de 5 ingrédients","J'ai la flemme"],"protein":33,"priceMaison":3,"priceLivraison":0},{"id":95,"name":"Smash Burger maison","category":"Repas du soir","time":20,"ingredients":[{"name":"steak haché","qty":4,"unit":"pièces"},{"name":"pain burger","qty":4,"unit":"pièces"},{"name":"fromage râpé","qty":100,"unit":"g"},{"name":"salade","qty":4,"unit":"feuilles"},{"name":"tomate","qty":1,"unit":"pièce"},{"name":"oignon","qty":1,"unit":"pièce"}],"steps":["Forme des boules de viande d'environ 80g chacune. Ne les aplatis pas encore, c'est le secret du smash burger.","Fais chauffer une poêle (ou plancha) à FEU TRÈS FORT. C'est la clé : la poêle doit être brûlante.","Dépose une boule de viande et ÉCRASE-LA immédiatement avec une spatule. Appuie fort pour l'aplatir au maximum. Sale et poivre. Cuis 2 min sans y toucher.","Retourne le steak. Dépose immédiatement une tranche de fromage dessus. Cuis encore 1 min. Le fromage va fondre grâce à la chaleur.","Pendant ce temps, coupe la tomate et l'oignon en rondelles fines. Fais griller les pains 30 sec côté mie dans la poêle.","Monte le burger : pain, salade, steak-fromage, tomate, oignon, sauce de ton choix, pain du dessus. Le secret : la croûte caramélisée du smash, c'est ce qui donne tout le goût !"],"emoji":"🍔","difficulty":"Facile","cost":"€€","servings":4,"tags":["Rapide","Confort"],"protein":8,"priceMaison":6,"priceLivraison":0},{"id":96,"name":"Tenders de poulet croustillants","category":"Repas du soir","time":25,"ingredients":[{"name":"blanc de poulet","qty":500,"unit":"g"},{"name":"farine","qty":100,"unit":"g"},{"name":"œufs","qty":2,"unit":"pièces"},{"name":"chapelure","qty":150,"unit":"g"}],"steps":["Coupe les blancs de poulet en lanières d'environ 2 cm de large. Astuce : mets-les au congélateur 15 min avant, c'est plus facile à couper.","Prépare 3 assiettes creuses : 1 avec la farine + sel + paprika, 1 avec les œufs battus, 1 avec la chapelure.","Passe chaque lanière dans la farine d'abord, puis dans l'œuf, puis dans la chapelure. Appuie bien pour que la chapelure adhère. Astuce : pour un résultat extra croustillant, repasse dans l'œuf puis la chapelure une deuxième fois.","Fais chauffer de l'huile dans une grande poêle (1 cm de hauteur). Quand l'huile est chaude, dépose les tenders sans les superposer.","Cuis 3-4 min de chaque côté à feu moyen-fort. Ils doivent être bien dorés et croustillants.","Dépose-les sur du papier absorbant. Sers avec une sauce au choix : ketchup, moutarde-miel, barbecue, ou mayo-sriracha."],"emoji":"🍗","difficulty":"Moyen","cost":"€","servings":4,"tags":["Confort","Protéiné"],"protein":33,"priceMaison":3,"priceLivraison":0},{"id":97,"name":"Fondant au chocolat","category":"Goûter","time":25,"ingredients":[{"name":"chocolat noir","qty":200,"unit":"g"},{"name":"beurre","qty":100,"unit":"g"},{"name":"œufs","qty":4,"unit":"pièces"},{"name":"sucre","qty":60,"unit":"g"},{"name":"farine","qty":50,"unit":"g"}],"steps":["Préchauffe le four à 180°C. Beurre un moule à manqué de 20 cm.","Fais fondre le chocolat cassé en morceaux avec le beurre au bain-marie ou au micro-ondes (par tranches de 30 sec en remuant). Le mélange doit être lisse et brillant.","Dans un saladier, fouette les œufs avec le sucre pendant 2 min. Le mélange doit blanchir légèrement.","Verse le chocolat fondu dans le mélange œufs-sucre. Mélange doucement.","Ajoute la farine tamisée et mélange juste ce qu'il faut (pas trop, sinon le gâteau sera dur).","Verse dans le moule et enfourne 12-14 min maximum. Le secret : le centre doit encore trembler quand tu secoues le moule ! Il finira de cuire en refroidissant. Laisse tiédir 10 min avant de démouler."],"emoji":"🍫","difficulty":"Moyen","cost":"€","servings":6,"tags":["Confort"],"protein":8,"priceMaison":3,"priceLivraison":0},{"id":98,"name":"Crêpes Nutella banane","category":"Goûter","time":20,"ingredients":[{"name":"farine","qty":200,"unit":"g"},{"name":"œufs","qty":3,"unit":"pièces"},{"name":"lait","qty":400,"unit":"ml"},{"name":"pâte à tartiner","qty":100,"unit":"g"},{"name":"banane","qty":2,"unit":"pièces"}],"steps":["Mets la farine dans un saladier. Fais un puits au centre. Casse les œufs dedans.","Verse le lait petit à petit en fouettant depuis le centre vers l'extérieur. Tu dois obtenir une pâte lisse, sans grumeaux, fluide comme de la crème liquide.","Laisse reposer 10 min si possible (mais c'est pas obligatoire, ça marche quand même).","Fais chauffer une poêle antiadhésive à feu moyen. Huile très légèrement avec un papier absorbant imbibé.","Verse une louche de pâte, fais tourner la poêle pour répartir. Cuis 1-2 min, retourne quand les bords se décollent.","Tartine de pâte à tartiner pendant que la crêpe est chaude (ça fond mieux). Ajoute des rondelles de banane. Plie en quatre et sers immédiatement."],"emoji":"🥞","difficulty":"Facile","cost":"€","servings":4,"tags":["Confort","Rapide"],"protein":8,"priceMaison":3,"priceLivraison":0},{"id":99,"name":"Burritos poulet complet","category":"Déjeuner","time":25,"ingredients":[{"name":"tortillas","qty":4,"unit":"pièces"},{"name":"blanc de poulet","qty":300,"unit":"g"},{"name":"riz","qty":150,"unit":"g"},{"name":"haricots rouges","qty":200,"unit":"g"},{"name":"fromage râpé","qty":80,"unit":"g"},{"name":"tomate","qty":1,"unit":"pièce"}],"steps":["Fais cuire le riz. Pendant ce temps, coupe le poulet en lanières et fais-le cuire à la poêle avec du paprika, du cumin, du sel et un filet d'huile.","Rince et égoutte les haricots rouges. Coupe la tomate en dés.","Réchauffe les tortillas 20 sec au micro-ondes ou à la poêle sèche (elles seront plus souples).","Au centre de chaque tortilla, mets dans l'ordre : riz, poulet, haricots, tomate, fromage.","Pour plier : rabats le bas, puis les côtés, et roule bien serré. Astuce : fais dorer le burrito à la poêle 1 min sur la fermeture pour le sceller."],"emoji":"🌯","difficulty":"Facile","cost":"€","servings":4,"tags":["Confort","Protéiné"],"protein":48,"priceMaison":3,"priceLivraison":0},{"id":100,"name":"Soupe thaïe coco poulet","category":"Repas du soir","time":25,"ingredients":[{"name":"blanc de poulet","qty":300,"unit":"g"},{"name":"lait de coco","qty":400,"unit":"ml"},{"name":"champignons","qty":150,"unit":"g"},{"name":"citron","qty":1,"unit":"pièce"},{"name":"sauce soja","qty":2,"unit":"càs"},{"name":"gingembre","qty":1,"unit":"morceau"}],"steps":["Coupe le poulet en fines lamelles. Émince les champignons. Râpe le gingembre (environ 1 cm).","Dans une casserole, verse le lait de coco et un verre d'eau. Ajoute le gingembre râpé. Porte à frémissement (pas d'ébullition).","Ajoute le poulet et les champignons. Laisse cuire 10 min à feu doux.","Ajoute la sauce soja et le jus d'un citron. Goûte et ajuste : plus de citron pour l'acidité, plus de soja pour le salé.","Sers dans des bols, avec du riz si tu veux. Conseil : ajoute de la coriandre fraîche et un piment émincé si tu aimes le piquant."],"emoji":"🥥","difficulty":"Facile","cost":"€€","servings":2,"tags":["Rapide","Confort"],"protein":25,"priceMaison":6,"priceLivraison":0},{"id":101,"name":"Bowl protéiné petit-déj","category":"Petit-déjeuner","time":10,"ingredients":[{"name":"fromage blanc","qty":200,"unit":"g"},{"name":"flocons d'avoine","qty":40,"unit":"g"},{"name":"banane","qty":1,"unit":"pièce"},{"name":"beurre de cacahuète","qty":1,"unit":"càs"},{"name":"miel","qty":1,"unit":"càs"}],"steps":["Verse le fromage blanc dans un bol. C'est ta base protéinée (~15g de protéines).","Ajoute les flocons d'avoine directement dessus (pas besoin de les cuire, ils vont ramollir au contact du fromage blanc).","Coupe la banane en rondelles et dispose-les joliment.","Ajoute une cuillère de beurre de cacahuète (c'est là que viennent les bonnes graisses et encore plus de protéines).","Un filet de miel par-dessus. Total : environ 30g de protéines, parfait pour bien démarrer la journée ou après le sport."],"emoji":"💪","difficulty":"Facile","cost":"€","servings":1,"tags":["Rapide","Protéiné","Moins de 5 ingrédients","J'ai la flemme"],"protein":8,"priceMaison":3,"priceLivraison":0},{"id":102,"name":"Enchiladas poulet","category":"Repas du soir","time":35,"ingredients":[{"name":"tortillas","qty":6,"unit":"pièces"},{"name":"blanc de poulet","qty":400,"unit":"g"},{"name":"coulis de tomate","qty":500,"unit":"g"},{"name":"fromage râpé","qty":150,"unit":"g"},{"name":"oignon","qty":1,"unit":"pièce"},{"name":"crème","qty":100,"unit":"ml"}],"steps":["Préchauffe le four à 200°C. Fais cuire le poulet à la poêle puis effiloche-le à la fourchette.","Fais revenir l'oignon émincé, ajoute la moitié du coulis de tomate et la crème. Laisse mijoter 5 min. Mélange le poulet avec cette sauce.","Garnis chaque tortilla de farce au poulet et de fromage. Roule et dispose dans un plat à gratin.","Verse le reste du coulis de tomate par-dessus. Couvre de fromage râpé.","Enfourne 15-20 min jusqu'à ce que le fromage soit bien gratiné et doré. Astuce : laisse reposer 5 min avant de servir, c'est brûlant !"],"emoji":"🫔","difficulty":"Moyen","cost":"€€","servings":4,"tags":["Confort"],"protein":33,"priceMaison":6,"priceLivraison":0},{"id":103,"name":"Frittata légumes","category":"Repas du soir","time":25,"ingredients":[{"name":"œufs","qty":6,"unit":"pièces"},{"name":"courgette","qty":1,"unit":"pièce"},{"name":"poivron","qty":1,"unit":"pièce"},{"name":"fromage râpé","qty":80,"unit":"g"},{"name":"oignon","qty":1,"unit":"pièce"}],"steps":["Préchauffe le four à 180°C. Coupe les légumes en petits dés ou lamelles fines.","Fais revenir l'oignon et les légumes dans une poêle allant au four, 5 min à feu moyen.","Bats les œufs dans un saladier avec le fromage, du sel et du poivre.","Verse les œufs sur les légumes dans la poêle. Laisse cuire 2 min à feu doux.","Mets la poêle au four 12-15 min. La frittata est prête quand elle est dorée et que le centre ne tremble plus. Laisse tiédir 5 min, c'est meilleur tiède que brûlant."],"emoji":"🍳","difficulty":"Facile","cost":"€","servings":4,"tags":["Protéiné","Équilibré"],"protein":16,"priceMaison":3,"priceLivraison":0},{"id":104,"name":"Carrot Cake","category":"Goûter","time":50,"ingredients":[{"name":"carottes","qty":250,"unit":"g"},{"name":"farine","qty":200,"unit":"g"},{"name":"œufs","qty":3,"unit":"pièces"},{"name":"sucre","qty":150,"unit":"g"},{"name":"huile","qty":100,"unit":"ml"},{"name":"noix","qty":50,"unit":"g"}],"steps":["Préchauffe le four à 180°C. Beurre et farine un moule.","Râpe les carottes finement. Plus c'est fin, plus le gâteau sera moelleux.","Mélange les œufs et le sucre au fouet pendant 2 min. Ajoute l'huile.","Incorpore la farine, une pincée de cannelle et de levure. Mélange.","Ajoute les carottes râpées et les noix concassées. La pâte sera épaisse, c'est normal.","Verse dans le moule et enfourne 35-40 min. Pique avec un couteau : s'il ressort propre, c'est cuit. Conseil : c'est encore meilleur le lendemain !"],"emoji":"🥕","difficulty":"Moyen","cost":"€","servings":8,"tags":["Confort"],"protein":8,"priceMaison":3,"priceLivraison":0},{"id":105,"name":"Salade thaïe crevettes","category":"Déjeuner","time":15,"ingredients":[{"name":"crevettes","qty":250,"unit":"g"},{"name":"concombre","qty":1,"unit":"pièce"},{"name":"carotte","qty":1,"unit":"pièce"},{"name":"sauce soja","qty":2,"unit":"càs"},{"name":"citron","qty":1,"unit":"pièce"}],"steps":["Si les crevettes sont crues, fais-les sauter 3-4 min dans une poêle chaude avec un filet d'huile et de la sauce soja.","Avec un économe, fais des rubans de concombre et de carotte (ou râpe-les en julienne).","Prépare la sauce : mélange le jus de citron, la sauce soja, un peu de miel et de l'huile de sésame si tu en as.","Mélange les légumes et les crevettes dans un saladier.","Verse la sauce, mélange bien. Sers frais. Astuce : ajoute des cacahuètes concassées et de la coriandre fraîche pour le croquant."],"emoji":"🥗","difficulty":"Facile","cost":"€€","servings":2,"tags":["Rapide","Protéiné","J'ai la flemme"],"protein":25,"priceMaison":6,"priceLivraison":0},{"id":106,"name":"Cheesecake sans cuisson","category":"Goûter","time":20,"ingredients":[{"name":"fromage frais","qty":400,"unit":"g"},{"name":"crème","qty":200,"unit":"ml"},{"name":"sucre","qty":80,"unit":"g"},{"name":"biscottes","qty":200,"unit":"g"},{"name":"beurre","qty":80,"unit":"g"},{"name":"fruits rouges","qty":150,"unit":"g"}],"steps":["Écrase les biscottes en miettes fines (mets-les dans un sac et roule dessus avec une bouteille, ou utilise un mixeur).","Fais fondre le beurre et mélange-le aux miettes. Tasse bien ce mélange au fond d'un moule à charnière. Mets au frigo.","Fouette le fromage frais avec le sucre. Dans un autre bol, monte la crème en chantilly bien ferme.","Incorpore délicatement la chantilly au fromage frais en soulevant la masse (ne touille pas, sinon la chantilly retombe).","Verse sur la base biscuit. Lisse le dessus et place au frigo minimum 4h (toute la nuit c'est idéal).","Décore avec les fruits rouges au moment de servir. Ce gâteau se conserve 3 jours au frigo."],"emoji":"🍰","difficulty":"Facile","cost":"€€","servings":8,"tags":["Confort","Rapide"],"protein":8,"priceMaison":6,"priceLivraison":0},{"id":107,"name":"Biryani poulet","category":"Repas du soir","time":45,"ingredients":[{"name":"blanc de poulet","qty":500,"unit":"g"},{"name":"riz basmati","qty":300,"unit":"g"},{"name":"yaourt nature","qty":100,"unit":"g"},{"name":"oignon","qty":2,"unit":"pièces"},{"name":"curcuma","qty":1,"unit":"cc"},{"name":"garam masala","qty":2,"unit":"cc"}],"steps":["Marine le poulet coupé en morceaux dans le yaourt avec le curcuma, le garam masala, du sel et du poivre pendant 20 min.","Rince le riz basmati à l'eau froide 3 fois (jusqu'à ce que l'eau soit claire). Fais-le cuire 5 min dans l'eau bouillante salée (il ne doit être qu'à moitié cuit). Égoutte.","Fais frire les oignons émincés dans de l'huile à feu moyen-fort jusqu'à ce qu'ils soient bien dorés et croustillants (8-10 min). Réserve la moitié pour la déco.","Dans une grande cocotte, dépose le poulet mariné au fond. Couvre avec le riz à moitié cuit. Ajoute les oignons frits restants.","Couvre hermétiquement (mets un torchon sous le couvercle pour bien sceller). Cuis à feu très doux pendant 25 min sans ouvrir.","Le riz aura fini de cuire à la vapeur du poulet. Mélange délicatement, décore avec les oignons frits réservés. C'est un festin !"],"emoji":"🍚","difficulty":"Avancé","cost":"€€","servings":4,"tags":["Confort"],"protein":38,"priceMaison":6,"priceLivraison":0},{"id":108,"name":"Velouté de potiron","category":"Repas du soir","time":30,"ingredients":[{"name":"potiron","qty":600,"unit":"g"},{"name":"pommes de terre","qty":200,"unit":"g"},{"name":"oignon","qty":1,"unit":"pièce"},{"name":"crème","qty":50,"unit":"ml"},{"name":"bouillon cube","qty":1,"unit":"pièce"}],"steps":["Épluche le potiron et les pommes de terre. Coupe-les en morceaux de taille moyenne.","Fais revenir l'oignon émincé dans une grande casserole avec un filet d'huile pendant 3 min.","Ajoute le potiron et les pommes de terre. Couvre d'eau chaude avec le bouillon cube émietté.","Laisse cuire 20 min à feu moyen. Les légumes doivent être très tendres quand tu les piques.","Mixe le tout au mixeur plongeant. Ajoute la crème, mélange. Rectifie l'assaisonnement. Conseil : une pincée de noix de muscade et quelques graines de courge grillées par-dessus, c'est top."],"emoji":"🎃","difficulty":"Facile","cost":"€","servings":4,"tags":["Confort","Petit budget","Moins de 5 ingrédients"],"protein":0,"priceMaison":3,"priceLivraison":0},{"id":109,"name":"Œufs brouillés parfaits","category":"Petit-déjeuner","time":8,"ingredients":[{"name":"œufs","qty":4,"unit":"pièces"},{"name":"beurre","qty":15,"unit":"g"},{"name":"pain de mie","qty":2,"unit":"tranches"},{"name":"ciboulette","qty":3,"unit":"brins"}],"steps":["Casse les œufs dans un bol. NE LES BATS PAS tout de suite. Ajoute le beurre coupé en dés.","Mets le bol au bain-marie (casserole d'eau frémissante) ou dans une poêle à feu TRÈS DOUX.","Commence à remuer avec une spatule. Alterne : remue 10 sec, retire du feu 10 sec. Recommence. Les œufs vont épaissir lentement et devenir crémeux.","Quand les œufs sont encore légèrement baveux (ils continuent de cuire hors du feu), arrête la cuisson. C'est le secret des œufs brouillés crémeux !","Sale, poivre, ajoute la ciboulette ciselée. Sers immédiatement sur des toasts grillés. Le résultat doit être onctueux et tremblotant, pas sec."],"emoji":"🥚","difficulty":"Facile","cost":"€","servings":2,"tags":["Rapide","Protéiné","Moins de 5 ingrédients","J'ai la flemme"],"protein":8,"priceMaison":3,"priceLivraison":0},{"id":110,"name":"Pancakes protéinés avoine","category":"Petit-déjeuner","time":15,"ingredients":[{"name":"flocons d'avoine","qty":80,"unit":"g"},{"name":"fromage blanc","qty":100,"unit":"g"},{"name":"œufs","qty":2,"unit":"pièces"},{"name":"banane","qty":1,"unit":"pièce"}],"steps":["Mixe tous les ingrédients ensemble jusqu'à obtenir une pâte lisse. Si tu n'as pas de mixeur, écrase la banane et mélange bien.","La pâte doit être épaisse mais coulante. Si trop épaisse, ajoute un peu de lait.","Fais chauffer une poêle antiadhésive à feu moyen-doux. Pas besoin de matière grasse.","Verse des petites louches de pâte (environ 8 cm de diamètre). Cuis 2 min jusqu'à ce que des bulles apparaissent en surface.","Retourne délicatement et cuis encore 1-2 min. Sers avec du miel, des fruits ou du beurre de cacahuète. Environ 25g de protéines pour 2 pancakes !"],"emoji":"🥞","difficulty":"Facile","cost":"€","servings":2,"tags":["Rapide","Protéiné","Moins de 5 ingrédients","J'ai la flemme"],"protein":16,"priceMaison":3,"priceLivraison":0},{"name":"Naan fromage maison","category":"Accompagnement","time":25,"ingredients":[{"name":"farine","qty":300,"unit":"g"},{"name":"yaourt nature","qty":150,"unit":"g"},{"name":"levure chimique","qty":1,"unit":"sachet"},{"name":"fromage râpé","qty":150,"unit":"g"},{"name":"beurre","qty":30,"unit":"g"}],"steps":["Dans un saladier, mélange la farine, la levure, une pincée de sel et le yaourt. Pétris 3-4 min. Si ça colle, ajoute un peu de farine.","Divise la pâte en 6 boules. Laisse reposer 10 min sous un torchon.","Aplatis chaque boule au rouleau. Mets du fromage râpé au centre, referme la pâte et re-aplatis doucement.","Poêle antiadhésive à feu FORT sans huile. Cuis 2 min quand ça gonfle, retourne, 1 min.","Badigeonne de beurre fondu immédiatement en sortant. C'est ÇA le secret du naan comme au resto."],"emoji":"🫓","difficulty":"Moyen","cost":"€","servings":6,"tags":["Indien","Accompagnement"],"protein":8,"priceMaison":2,"priceLivraison":0,"id":111},{"name":"Naan poulet tandoori","category":"Repas du soir","time":35,"ingredients":[{"name":"farine","qty":300,"unit":"g"},{"name":"yaourt nature","qty":150,"unit":"g"},{"name":"levure chimique","qty":1,"unit":"sachet"},{"name":"blanc de poulet","qty":300,"unit":"g"},{"name":"curry","qty":2,"unit":"cc"},{"name":"fromage râpé","qty":100,"unit":"g"}],"steps":["MARINADE : Coupe le poulet en petits morceaux. Mélange avec 2 càs de yaourt, le curry, paprika, sel, huile. Marine 15 min.","PÂTE : Farine + levure + sel + reste du yaourt. Pétris 3 min. 4 boules, repose 10 min.","Fais cuire le poulet mariné à la poêle 5-6 min bien doré et caramélisé.","Aplatis chaque boule. Poulet + fromage au centre. Referme, aplatis doucement.","Poêle très chaude sans huile, 2-3 min de chaque côté. Beurre fondu à la sortie."],"emoji":"🫓","difficulty":"Moyen","cost":"€€","servin otein":22,"priceMaison":3,"priceLivraison":12,"id":117},{"name":"Lasagnes bœuf","category":"Repas du soir","time":45,"ingredients":[{"name":"bœuf haché","qty":500,"unit":"g"},{"name":"pâtes","qty":250,"unit":"g"},{"name":"coulis de tomate","qty":500,"unit":"g"},{"name":"fromage râpé","qty":200,"unit":"g"},{"name":"crème","qty":200,"unit":"ml"}],"steps":["SAUCE VIANDE : Bœuf à feu fort émietté. Doré → ajoute coulis, sel, poivre, paprika. Mijote 10 min.","SAUCE BLANCHE : Crème + fromage râpé à feu doux. Sale, poivre.","Four 190°C. Plat à gratin : alterne couches viande/lasagnes/sauce blanche. 3 couches.","Fromage râpé généreux sur le dessus.","Alu dessus 25 min. Retire l'alu, grille 5 min. Repose 5 min avant de servir."],"emoji":"🍝","difficulty":"Moyen","cost":"€€","servings":6,"tags":["Confort","Batch cooking"],"protein":32,"priceMaison":6,"priceLivraison":0,"id":118},{"name":"Pad Thaï poulet","category":"Repas du soir","time":20,"ingredients":[{"name":"nouilles chinoises","qty":200,"unit":"g"},{"name":"blanc de poulet","qty":250,"unit":"g"},{"name":"œufs","qty":2,"unit":"pièces"},{"name":"sauce soja","qty":3,"unit":"càs"},{"name":"citron","qty":1,"unit":"pièce"},{"name":"cacahuètes","qty":30,"unit":"g"}],"steps":["Trempe les nouilles dans l'eau chaude 5 min. Égoutte.","Poulet en lanières fines, saute à feu TRÈS FORT 4-5 min. Réserve.","Même poêle : casse 2 œufs, brouille 30 sec.","Ajoute nouilles + poulet + sauce soja + citron. Mélange 2 min à feu fort.","Cacahuètes concassées dessus + quartier de citron. Sriracha en option."],"emoji":"🍜","difficulty":"Facile","cost":"€","servings":2,"tags":["Rapide","Thaï","Protéiné"],"protein":38,"priceMaison":4,"priceLivraison":14,"id":119},{"name":"Ramen express","category":"Repas du soir","time":20,"ingredients":[{"name":"nouilles chinoises","qty":200,"unit":"g"},{"name":"blanc de poulet","qty":200,"unit":"g"},{"name":"œufs","qty":2,"unit":"pièces"},{"name":"sauce soja","qty":3,"unit":"càs"},{"name":"bouillon cube","qty":2,"unit":"pièces"},{"name":"champignons","qty":100,"unit":"g"}],"steps":["Bouillon : 800ml eau + bouillon cubes + sauce soja + gingembre. Frémissement.","Cuis les nouilles dans le bouillon 3-4 min. Retire dans 2 bols.","Poulet en tranches fines, poêle 4 min. Champignons sautés 2 min.","Œufs mollets : 6 min 30 dans l'eau bouillante. Eau froide, épluche, coupe en deux.","Monte : nouilles, bouillon chaud, poulet, champignons, œufs mollets. Ciboulette."],"emoji":"🍜","difficulty":"Moyen","cost":"€","servings":2,"tags":["Japonais","Confort"],"protein":35,"priceMaison":3,"priceLivraison":15,"id":120},{"name":"Curry thaï coco poulet","category":"Repas du soir","time":25,"ingredients":[{"name":"blanc de poulet","qty":400,"unit":"g"},{"name":"lait de coco","qty":400,"unit":"ml"},{"name":"poivron","qty":1,"unit":"pièce"},{"name":"riz basmati","qty":200,"unit":"g"},{"name":"curry","qty":2,"unit":"cc"}],"steps":["Fais cuire le riz (voir 'Riz basmati parfait').","Poulet en morceaux, poivron en lamelles.","Dore le poulet 4-5 min. Ajoute curry, mélange 1 min.","Verse lait de coco + poivron. Mijote 12 min feu doux.","Ajuste : sel, sucre si trop acide, citron si trop riche. Sur le riz."],"emoji":"🍛","difficulty":"Facile","cost":"€€","servings":3,"tags":["Thaï","Protéiné","Confort"],"protein":38,"priceMaison":5,"priceLivraison":16,"id":121},{"name":"Frites Air Fryer","category":"Accompagnement","time":25,"ingredients":[{"name":"pommes de terre","qty":600,"unit":"g"},{"name":"huile","qty":1,"unit":"càs"},{"name":"paprika","qty":1,"unit":"cc"}],"steps":["Coupe en frites régulières. TREMPE dans l'eau froide 10 min puis sèche bien. Ça retire l'amidon.","Mélange : huile + paprika + sel + ail en poudre.","Air fryer 200°C, 20-22 min. SECOUE le panier toutes les 7 min.","Dorées et croustillantes → ajoute du sel en sortant."],"emoji":"🍟","difficulty":"Facile","cost":"€","servings":3,"tags":["Air Fryer","Accompagnement","Rapide"],"protein":4,"priceMaison":1,"priceLivraison":0,"id":122},{"name":"Patatoes épicées","category":"Accompagnement","time":25,"ingredients":[{"name":"pommes de terre","qty":600,"unit":"g"},{"name":"paprika","qty":2,"unit":"cc"},{"name":"huile","qty":1,"unit":"càs"},{"name":"ail","qty":2,"unit":"gousses"}],"steps":["Coupe en quartiers (laisse la peau = plus croustillant).","Mélange : huile, paprika, ail pressé, sel, cumin.","Enrobe bien les patatoes.","Air Fryer 200°C 22-25 min en secouant. OU Four 220°C 30 min.","Sauce yaourt : yaourt + ail + citron + sel."],"emoji":"🥔","difficulty":"Facile","cost":"€","servings":3,"tags":["Air Fryer","Accompagnement","Rapide"],"protein":4,"priceMaison":1,"priceLivraison":0,"id":123},{"name":"Omelette garnie","category":"Repas du soir","time":10,"ingredients":[{"name":"œufs","qty":4,"unit":"pièces"},{"name":"fromage râpé","qty":60,"unit":"g"},{"name":"tomate","qty":1,"unit":"pièce"},{"name":"champignons","qty":80,"unit":"g"}],"steps":["Bats les œufs + sel + poivre. ASTUCE : 1 càs d'eau = omelette plus légère.","Champignons émincés sautés 3 min. Réserve.","Poêle beurrée feu MOYEN. Verse les œufs. 1 min sans toucher.","Quand le dessous est pris, le dessus baveux : fromage + champignons + tomate. Plie.","1 min de plus. L'intérieur reste baveux (finit dans l'assiette). Immédiat."],"emoji":"🍳","difficulty":"Facile","cost":"€","servings":2,"tags":["Rapide","Protéiné","J'ai la flemme"],"protein":28,"priceMaison":2,"priceLivraison":0,"id":124},{"name":"Salade protéinée","category":"Déjeuner","time":15,"ingredients":[{"name":"blanc de poulet","qty":200,"unit":"g"},{"name":"salade","qty":1,"unit":"pièce"},{"name":"avocat","qty":1,"unit":"pièce"},{"name":"œufs","qty":2,"unit":"pièces"},{"name":"maïs","qty":80,"unit":"g"},{"name":"tomate","qty":2,"unit":"pièces"}],"steps":["Poulet à la poêle avec paprika et sel, 5-6 min. Coupe en lanières.","Œufs durs : 10 min eau bouillante. Eau froide, épluche, quartiers.","Lave la salade. Tomates en dés, avocat en tranches.","Monte : salade, poulet, œufs, avocat, maïs, tomates.","Sauce : huile d'olive + citron + sel + moutarde. ~45g de protéines !"],"emoji":"🥗","difficulty":"Facile","cost":"€€","servings":2,"tags":["Rapide","Protéiné","Healthy","Meal prep"],"protein":45,"priceMaison":4,"priceLivraison":12,"id":125},{"name":"Milkshake protéiné","category":"Petit-déjeuner","time":5,"ingredients":[{"name":"lait","qty":300,"unit":"ml"},{"name":"banane","qty":1,"unit":"pièce"},{"name":"beurre de cacahuète","qty":1,"unit":"càs"},{"name":"miel","qty":1,"unit":"cc"}],"steps":["Tout dans un shaker. Ajoute ta dose de whey vanille (+25g protéines).","Secoue 30 sec vigoureusement.","ASTUCE : congèle la banane la veille = milkshake épais et frais.","~30-35g protéines avec whey. Parfait post-training."],"emoji":"🥤","difficulty":"Facile","cost":"€","servings":1,"tags":["Rapide","Protéiné","Post-training"],"protein":32,"priceMaison":1,"priceLivraison":0,"id":126},{"name":"Bowl cake protéiné","category":"Petit-déjeuner","time":8,"ingredients":[{"name":"flocons d'avoine","qty":40,"unit":"g"},{"name":"banane","qty":1,"unit":"pièce"},{"name":"œufs","qty":1,"unit":"pièce"},{"name":"lait","qty":50,"unit":"ml"}],"steps":["Écrase la banane dans un bol micro-ondes.","Ajoute flocons + œuf + lait. Mélange. Ajoute 1 dose de whey si tu veux.","Micro-ondes 2 min 30.","Tiédir 2 min. Ferme mais moelleux.","Garnis : beurre de cacahuète, miel, fruits. ~25g protéines sans whey, 50g avec."],"emoji":"🥣","difficulty":"Facile","cost":"€","servings":1,"tags":["Rapide","Protéiné","Petit-déjeuner"],"protein":25,"priceMaison":1,"priceLivraison":0,"id":127},{"name":"Riz basmati parfait","category":"Technique","time":15,"ingredients":[{"name":"riz basmati","qty":200,"unit":"g"},{"name":"sel","qty":1,"unit":"pincée"}],"steps":["RINCE le riz 3 fois à l'eau froide jusqu'à eau claire. Ça retire l'amidon.","Casserole : riz + EXACTEMENT 1.5x le volume en eau (200g = 300ml). Sel.","Feu fort SANS couvercle. Quand ça bout → couvercle → feu MINIMUM.","12 min. N'OUVRE PAS. Ne remue pas. Jamais.","Coupe le feu. 5 min couvercle fermé. Ouvre : grain par grain. Aère à la fourchette."],"emoji":"🍚","difficulty":"Facile","cost":"€","servings":3,"tags":["Technique","Accompagnement"],"protein":4,"priceMaison":1,"priceLivraison":0,"id":128},{"name":"Gyoza poulet","category":"Repas du soir","time":35,"ingredients":[{"name":"blanc de poulet","qty":300,"unit":"g"},{"name":"pâte à gyoza","qty":1,"unit":"paquet"},{"name":"carotte","qty":1,"unit":"pièce"},{"name":"sauce soja","qty":3,"unit":"càs"},{"name":"gingembre","qty":1,"unit":"morceau"}],"steps":["FARCE : Hache le poulet. Râpe carotte + gingembre. Mélange + 1 càs sauce soja.","1 cuillère de farce par feuille. Mouille le bord, plie en demi-lune, pince.","Poêle : fond d'huile, dépose les gyoza, 2 min pour dorer le dessous.","Ajoute 50ml d'eau, COUVRE. 5 min feu moyen. L'eau s'évapore.","Dessous croustillant, dessus vapeur. Sauce soja + vinaigre."],"emoji":"🥟","difficulty":"Moyen","cost":"€","servings":4,"tags":["Japonais","Confort"],"protein":28,"priceMaison":4,"priceLivraison":14,"id":129},{"name":"Muffins chocolat cœur COULANT","category":"Goûter","time":25,"ingredients":[{"name":"farine","qty":200,"unit":"g"},{"name":"sucre","qty":100,"unit":"g"},{"name":"œufs","qty":2,"unit":"pièces"},{"name":"lait","qty":120,"unit":"ml"},{"name":"pépites de chocolat","qty":100,"unit":"g"},{"name":"beurre","qty":80,"unit":"g"}],"steps":["SECRET : Mets 8 cuillères de Nutella (ou pâte à tartiner) au CONGÉLATEUR 30 min sur une assiette. C'est ça le truc pour le cœur coulant.","Four 200°C (un peu plus chaud que d'habitude, c'est volontaire).","Fais fondre le beurre 30 sec micro-ondes. Mélange avec le sucre. Ajoute les œufs + lait.","Ajoute farine + levure + pincée de sel. Mélange JUSTE ASSEZ. Des grumeaux légers = muffins plus gonflés. C'est contre-intuitif mais c'est vrai.","Remplis les moules à MOITIÉ. Pose un tas de Nutella congelé au centre. Recouvre avec le reste de pâte.","Enfourne 15-18 min. Le dessus doit être doré mais le centre doit TREMBLER légèrement quand tu secoues le moule.","Attends 5 min avant de démouler. Mange tiède : quand tu coupes, le cœur coule. ASTUCE FARINE : utilise de la farine T45 (la plus fine), c'est la meilleure pour les gâteaux moelleux. Francine ou Gruau d'Or sont de bonnes marques."],"emoji":"🧁","difficulty":"Facile","cost":"€","servings":8,"tags":["Goûter","Confort"],"protein":5,"priceMaison":3,"priceLivraison":0,"id":130},{"name":"Sushi maki maison","category":"Repas du soir","time":40,"ingredients":[{"name":"riz","qty":300,"unit":"g"},{"name":"saumon","qty":200,"unit":"g"},{"name":"avocat","qty":1,"unit":"pièce"},{"name":"concombre","qty":0.5,"unit":"pièce"},{"name":"vinaigre de cidre","qty":2,"unit":"càs"}],"steps":["RIZ SUSHI : Rince 3 fois. Cuis avec 360ml eau. Mélange vinaigre + 1 càs sucre + sel. Tiédir.","Coupe saumon et avocat en longues lanières fines. Concombre en bâtonnets.","Feuille de nori sur film plastique. Étale le riz (mains mouillées).","Ligne de saumon + avocat + concombre. Roule serré avec le film.","Sans nori : boules de riz + tranche de saumon dessus. Couteau mouillé pour couper."],"emoji":"🍣","difficulty":"Avancé","cost":"€€","servings":2,"tags":["Japonais"],"protein":30,"priceMaison":6,"priceLivraison":20,"id":131},{"name":"Tarte citron meringuée","category":"Goûter","time":45,"ingredients":[{"name":"pâte brisée","qty":1,"unit":"pièce"},{"name":"citron","qty":3,"unit":"pièces"},{"name":"sucre","qty":150,"unit":"g"},{"name":"œufs","qty":4,"unit":"pièces"},{"name":"beurre","qty":60,"unit":"g"}],"steps":["Four 180°C. Pâte dans moule, pique le fond, 15 min à blanc.","CRÈME : Jus de 3 citrons + zestes + 100g sucre + 3 jaunes, casserole feu doux 8 min en remuant. Beurre en dés.","Verse sur la pâte. Tiédir.","MERINGUE : 4 blancs en neige ferme + 50g sucre progressivement.","Meringue sur la tarte. 5 min à 200°C pour dorer. Frigo 2h."],"emoji":"🍋","difficulty":"Avancé","cost":"€","servings":8,"tags":["Pâtisserie"],"protein":5,"priceMaison":4,"priceLivraison":0,"id":132},{"id":133,"name":"Carbonara (dinde fumée)","category":"Pâtes","time":18,"ingredients":[{"name":"pâtes","qty":250,"unit":"g"},{"name":"dinde fumée","qty":150,"unit":"g"},{"name":"œufs","qty":3,"unit":"pièces"},{"name":"parmesan","qty":80,"unit":"g"},{"name":"poivre","qty":1,"unit":"pincée"}],"steps":["Mets une GRANDE casserole d'eau à bouillir. Sale généreusement (l'eau doit avoir le goût de la mer). Cuis les pâtes selon le paquet MOINS 1 MIN (al dente).","Pendant ce temps, coupe la dinde fumée en lanières. Fais-la revenir dans une poêle SANS huile (elle rend son propre gras) 3-4 min. Elle doit être dorée et un peu croustillante.","SAUCE (le secret) : Dans un bol, mélange 2 œufs ENTIERS + 1 JAUNE + le parmesan râpé fin + poivre. Le mélange doit être crémeux comme une pâte. SURTOUT PAS de crème. La vraie carbonara n'a pas de crème.","Égoutte les pâtes EN GARDANT un verre d'eau de cuisson. Verse les pâtes dans la poêle avec la dinde. COUPE LE FEU.","HORS DU FEU (sinon les œufs font des grumeaux) : verse la sauce œuf-parmesan sur les pâtes et mélange vigoureusement 30 sec. Ajoute un peu d'eau de cuisson si c'est trop sec. La chaleur des pâtes cuit la sauce sans faire d'omelette.","Sers IMMÉDIATEMENT. La carbonara n'attend pas. Parmesan et poivre par-dessus. C'est comme ça qu'ils la font à Rome."],"emoji":"🍝","difficulty":"Moyen","cost":"€","servings":2,"tags":["Pâtes","Rapide","Technique","Copie ta commande"],"protein":38,"priceMaison":4,"priceLivraison":14},{"id":134,"name":"Cookies double chocolat","category":"Goûter","time":25,"ingredients":[{"name":"beurre","qty":100,"unit":"g"},{"name":"sucre","qty":80,"unit":"g"},{"name":"œufs","qty":1,"unit":"pièce"},{"name":"farine","qty":160,"unit":"g"},{"name":"cacao","qty":40,"unit":"g"},{"name":"pépites de chocolat","qty":150,"unit":"g"}],"steps":["Beurre mou (pas fondu !) + sucre. Fouette 2 min, le mélange doit blanchir.","Ajoute l'œuf. Mélange 30 sec.","Ajoute farine + cacao + 0.5 cc de levure + pincée de sel. Mélange juste ce qu'il faut.","Incorpore les pépites de chocolat. La pâte est très chocolatée, c'est normal. 30 min au frigo.","Four 180°C. Boules de 40g sur plaque avec papier cuisson. Espace bien.","10-12 min. Les cookies DOIVENT sembler pas assez cuits. Centre mou et gonflé. Ils se figent en refroidissant.","5 min sur la plaque. Sel de mer par-dessus. Des bombes de chocolat."],"emoji":"🍪","difficulty":"Facile","cost":"€","servings":12,"tags":["Pâtisserie","Confort"],"protein":4,"priceMaison":3,"priceLivraison":0},{"id":135,"name":"Cookies beurre de cacahuète","category":"Goûter","time":20,"ingredients":[{"name":"beurre de cacahuète","qty":200,"unit":"g"},{"name":"sucre","qty":100,"unit":"g"},{"name":"œufs","qty":1,"unit":"pièce"},{"name":"pépites de chocolat","qty":80,"unit":"g"}],"steps":["C'est la recette de cookies la plus SIMPLE au monde. 4 ingrédients, pas de farine !","Mélange le beurre de cacahuète avec le sucre. Ajoute l'œuf. Mélange bien.","Ajoute les pépites de chocolat et une pincée de sel.","Forme des boules, aplatis légèrement avec une fourchette (le motif croisé classique).","Four 180°C, 10 min. Sortir quand c'est encore mou au centre.","ASTUCE : Ces cookies sont naturellement sans gluten et riches en protéines (~8g par cookie)."],"emoji":"🥜","difficulty":"Facile","cost":"€","servings":10,"tags":["Pâtisserie","Protéiné","Moins de 5 ingrédients","Rapide"],"protein":8,"priceMaison":3,"priceLivraison":0},{"id":136,"name":"Tablette chocolat Dubai","category":"Goûter","time":30,"ingredients":[{"name":"chocolat au lait","qty":200,"unit":"g"},{"name":"crème de pistache","qty":100,"unit":"g"},{"name":"kadaïf (cheveux d'ange)","qty":60,"unit":"g"},{"name":"beurre","qty":30,"unit":"g"},{"name":"pistaches","qty":40,"unit":"g"}],"steps":["KADAÏF CROUSTILLANT : Fais fondre le beurre dans une poêle. Ajoute le kadaïf (cheveux d'ange) émietté. Fais dorer à feu moyen 5-6 min en remuant constamment. Il doit être doré et croustillant. Réserve sur du papier absorbant.","Fais fondre le chocolat au lait au bain-marie ou au micro-ondes (30 sec par 30 sec en remuant). Il doit être lisse et brillant.","Prépare un moule rectangulaire (ou un tupperware) avec du papier cuisson. Verse la MOITIÉ du chocolat fondu. Étale uniformément. Mets au congélateur 5 min.","Sors du congélateur. Étale la crème de pistache par-dessus en couche régulière. Ajoute le kadaïf croustillant en couche épaisse. Parsème de pistaches concassées.","Verse le reste du chocolat fondu par-dessus pour tout recouvrir. Tape le moule pour éliminer les bulles d'air. Lisse le dessus.","Congélateur 1h minimum (2h c'est mieux). Démoule, coupe en barres avec un couteau chaud. Conserve au frigo. C'est EXACTEMENT comme les tablettes virales de Dubai."],"emoji":"🍫","difficulty":"Moyen","cost":"€€","servings":8,"tags":["Pâtisserie","Confort"],"protein":6,"priceMaison":8,"priceLivraison":25},{"id":137,"name":"Cups chocolat Dubai","category":"Goûter","time":20,"ingredients":[{"name":"chocolat au lait","qty":150,"unit":"g"},{"name":"crème de pistache","qty":80,"unit":"g"},{"name":"kadaïf (cheveux d'ange)","qty":40,"unit":"g"},{"name":"beurre","qty":20,"unit":"g"}],"steps":["Fais dorer le kadaïf dans le beurre fondu 5 min. Doit être croustillant.","Fais fondre le chocolat. Avec un pinceau ou une cuillère, tapisse des moules à muffins en silicone avec du chocolat (fond + parois). Congélateur 5 min.","Mets une cuillère de crème de pistache dans chaque cup. Ajoute du kadaïf croustillant.","Recouvre de chocolat fondu. Congélateur 30 min.","Démoule délicatement. Le croustillant + le fondant + la pistache = la folie de Dubai en cup."],"emoji":"🍫","difficulty":"Facile","cost":"€€","servings":6,"tags":["Pâtisserie","Confort"],"protein":4,"priceMaison":6,"priceLivraison":20},{"id":138,"name":"Bricks viande hachée fromage","category":"Repas du soir","time":20,"ingredients":[{"name":"feuilles de brick","qty":6,"unit":"pièces"},{"name":"bœuf haché","qty":300,"unit":"g"},{"name":"fromag const simpleHash=(s)=>{let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return(h>>>0).toString(16);};
const normalize=(s)=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();
const fuzzyMatch=(q,t)=>{const nq=normalize(q),nt=normalize(t);if(nt.includes(nq))return true;if(nq.length<2)return false;let qi=0;for(let ti=0;ti<nt.length&&qi<nq.length;ti++){if(nt[ti]===nq[qi])qi++;}return qi>=nq.length*0.8;};

let _timers={};
function startTimer(sec,label){
  const tid=uid();
  const upd=()=>{_timers[tid].remaining--;renderTimerUI();
    if(_timers[tid].remaining<=0){clearInterval(_timers[tid].interval);delete _timers[tid];renderTimerUI();timerAlarm(label);}};
  _timers[tid]={remaining:sec,interval:setInterval(upd,1000),label};renderTimerUI();toast('⏱️ Timer: '+label);
}
function stopTimer(tid){if(_timers[tid]){clearInterval(_timers[tid].interval);delete _timers[tid];renderTimerUI();}}
function timerAlarm(label){
  toast('⏰ '+label+' — C\'est prêt !');
  try{navigator.vibrate?.([300,100,300]);}catch(e){}
  try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();o.type='sine';o.frequency.value=880;o.connect(c.destination);o.start();o.stop(c.currentTime+0.5);}catch(e){}
}
function renderTimerUI(){
  let el=document.getElementById('timerFloat');const a=Object.entries(_timers);
  if(!a.length){if(el)el.style.display='none';return;}
  if(!el){el=document.createElement('div');el.id='timerFloat';el.style.cssText='position:fixed;top:60px;right:8px;z-index:40;display:flex;flex-direction:column;gap:6px';document.body.appendChild(el);}
  el.style.display='flex';
  el.innerHTML=a.map(([tid,t])=>{const m=Math.floor(t.remaining/60),s=t.remaining%60;
    return '<div style="background:var(--panel2);border:1px solid var(--gold-border);border-radius:14px;padding:8px 12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);font-size:13px"><span>⏱️</span><span style="font-weight:700">'+m+':'+String(s).padStart(2,'0')+'</span><span class="small">'+esc(t.label)+'</span><button onclick="stopTimer(\''+tid+'\')" style="background:none;border:none;color:var(--red);cursor:pointer">✕</button></div>';}).join('');
}

function allRecipes(){const p=current();if(!p)return[...RECIPES];const all=[...RECIPES,...(p.customRecipes||[])];const dl=(p.dislikes||[]).map(normalize),al=(p.allergies||[]).map(normalize);return all.filter(r=>!r.ingredients.some(i=>{const n=normalize(i.name);return dl.some(d=>n.includes(d))||al.some(a=>n.includes(a));}));}
function allProducts(){const p=current();const custom=p?(p.customProducts||[]):[];const base=Object.entries(PRODUCTS).flatMap(([cat,items])=>items.map(n=>({id:'p-'+normalize(n+cat).replace(/\s/g,''),name:n,category:cat,custom:false})));const all=[...custom,...base];const seen=new Set();const uniq=[];all.forEach(p=>{const k=normalize(p.name+'|'+p.category);if(!seen.has(k)){seen.add(k);uniq.push(p);}});return uniq;}
function findProduct(id){return allProducts().find(p=>p.id===id);}
function faisableRecipes(){const p=current();if(!p)return[];const pn=(p.provisions||[]).filter(x=>x.qty>0).map(x=>normalize(x.name));return allRecipes().filter(r=>{const m=r.ingredients.filter(i=>pn.includes(normalize(i.name)));return m.length>=Math.ceil(r.ingredients.length*0.6);});}
function shoppingQty(pid){return current()?.shopping?.find(x=>x.productId===pid)?.qty||0;}
function weekBudget(){const p=current();if(!p)return 0;const ids=[...new Set(p.weekPlan.flatMap(d=>Object.values(d.slots).filter(Boolean)))];return ids.reduce((s,id)=>{const r=allRecipes().find(x=>x.id===id);return s+(r?budgetValue(r.cost):0);},0);}
function weekCookTime(){const p=current();if(!p)return 0;const ids=[...new Set(p.weekPlan.flatMap(d=>Object.values(d.slots).filter(Boolean)))];return ids.reduce((s,id)=>{const r=allRecipes().find(x=>x.id===id);return s+(r?r.time:0);},0);}

function toggleDraftArr(k,v){const a=_draft[k]||[];const i=a.indexOf(v);if(i>-1)a.splice(i,1);else a.push(v);_draft[k]=a;render();}

function homeScreen(){
  const p=current(),fp=currentFixed();if(!p)return profilesScreen();
  const planCount=p.weekPlan.reduce((n,d)=>n+Object.values(d.slots).filter(Boolean).length,0);
  const listCount=p.shopping.length,provCount=p.provisions.filter(i=>i.qty>0).length;
  const faisable=faisableRecipes(),suggestion=getSuggestionRecipe(),season=currentSeason();
  const goalPct=p.goals.target>0?Math.min(100,Math.round((p.goals.done||0)/p.goals.target*100)):0;
  const cooked=p.stats.recipesCooked||0;
  const copieRecipes=allRecipes().filter(r=>(r.tags||[]).includes('Copie ta commande'));
  const airFryerRecipes=allRecipes().filter(r=>(r.tags||[]).includes('Air Fryer'));
  const flemmeRecipes=allRecipes().filter(r=>r.time<=15);
  const postTraining=allRecipes().filter(r=>(r.tags||[]).includes('Post-training')||(r.tags||[]).includes('Protéiné'));
  
  // Calculate savings from cooking history
  const savings=p.cookingHistory.reduce((s,h)=>{const r=allRecipes().find(x=>x.id===h.recipeId);if(r&&r.priceLivraison>0)return s+(r.priceLivraison-r.priceMaison);return s;},0);
  
  // Badges
  const badges=[];
  if(cooked>=1)badges.push('🥚 Premier plat');
  if(cooked>=5)badges.push('🍳 Apprenti');
  if(cooked>=15)badges.push('👨‍🍳 Cuistot');
  if(cooked>=30)badges.push('⭐ Chef');
  if(cooked>=50)badges.push('👑 Master Chef');
  if(savings>=50)badges.push('💰 Économe');
  if(savings>=200)badges.push('🏦 Banquier');
  if(p.cookingHistory.length>=7){const last7=p.cookingHistory.slice(0,7).every(h=>h.date>Date.now()-7*86400000);if(last7)badges.push('🔥 7 jours streak');}

  return appHeader()+'<div class="screen">'+
    '<div class="hero"><h2>Salut '+esc(fp.name)+' 👋</h2><p>'+esc(p.objective)+' · '+esc(p.style)+' · '+esc(p.cookTime)+'</p>'+
    '<div class="kpis"><div class="kpi"><div class="n">'+planCount+'</div><div class="l">planifiés</div></div>'+
    '<div class="kpi"><div class="n">'+listCount+'</div><div class="l">en liste</div></div>'+
    '<div class="kpi"><div class="n">'+cooked+'</div><div class="l">cuisinés</div></div></div></div>'+

    // Savings banner
    (savings>0?'<div class="mini-card mt" style="background:var(--green-bg);border-color:var(--green-border)"><div class="row"><div style="font-size:24px">💰</div><div class="item-meta"><b style="color:var(--green)">'+Math.round(savings)+'€ économisés vs livraison</b><small>En cuisinant toi-même !</small></div></div></div>':'')+

    // Badges
    (badges.length?'<div class="mini-card mt"><b>🏆 Badges</b><div class="chips mt">'+badges.map(b=>'<span class="badge gold">'+b+'</span>').join('')+'</div></div>':'')+

    // Astuce du jour
    '<div class="mini-card mt"><div class="small bold text-gold">💡 Astuce du jour</div><div class="small mt">'+esc(todayTip())+'</div></div>'+

    // Objectif hebdo
    '<div class="mini-card mt"><div class="row"><div class="item-meta"><b>🎯 '+p.goals.target+' repas maison / semaine</b><small>'+(p.goals.done||0)+'/'+p.goals.target+'</small></div></div><div class="progress-bar mt"><div class="fill" style="width:'+goalPct+'%"></div></div></div>'+

    // === BIG BUTTONS ===
    '<div class="shortcuts mt">'+
    '<div class="shortcut" style="background:linear-gradient(135deg,rgba(232,97,110,0.15),rgba(232,179,58,0.08));border-color:var(--red-border)" onclick="showFlemme()"><div class="ico" style="background:var(--red-bg)">😴</div><div><b>J\'ai la flemme</b><div class="small">≤15 min, ultra facile</div></div></div>'+
    '<div class="shortcut" style="background:var(--gold-bg);border-color:var(--gold-border)" onclick="quickMealTonight()"><div class="ico" style="background:var(--gold-bg)">✨</div><div><b>Repas ce soir</b><div class="small">Le coach propose</div></div></div>'+
    '<div class="shortcut" onclick="showCopieCommande()"><div class="ico">🏠</div><div><b>Copie ta commande</b><div class="small">'+copieRecipes.length+' recettes resto</div></div></div>'+
    '<div class="shortcut" onclick="showAirFryer()"><div class="ico">🍟</div><div><b>Air Fryer</b><div class="small">'+airFryerRecipes.length+' recettes</div></div></div>'+
    '</div>'+

    // Post-training shortcut
    '<div class="shortcut mt" style="background:var(--blue-bg);border-color:var(--blue-border)" onclick="showPostTraining()"><div class="ico" style="background:var(--blue-bg)">💪</div><div><b>Repas post-training</b><div class="small">Protéiné, rapide, parfait après le sport</div></div></div>'+

    // Navigation shortcuts
    '<div class="shortcuts mt">'+
    [['catalogue','📦','Catalogue'],['shopping','🛒','Ma liste'],['week','🗓️','Semaine'],['recipes','🍝','Recettes']].map(([k,i,t])=>'<div class="shortcut" onclick="setView({page:\''+k+'\'})"><div class="ico">'+i+'</div><div><b>'+t+'</b><div class="small">Ouvrir</div></div></div>').join('')+'</div>'+

    // Saison
    '<div class="mini-card mt"><b>'+season.emoji+' De saison ('+season.name+')</b><div class="chips mt">'+season.produce.slice(0,8).map(p=>'<span class="badge">'+esc(p)+'</span>').join('')+'</div></div>'+

    // Faisable maintenant
    (faisable.length>0?'<div class="section-title"><h3>🏠 Faisable maintenant</h3><span>'+faisable.length+'</span></div><div class="card-list">'+faisable.slice(0,3).map(r=>'<div class="item-row" style="cursor:pointer" onclick="openRecipe('+r.id+')"><div class="item-emoji">'+r.emoji+'</div><div class="item-meta"><b>'+esc(r.name)+'</b><small>'+r.time+' min · '+(r.protein||'?')+'g prot.'+(r.priceLivraison>0?' · <span style="color:var(--green)">'+r.priceMaison+'€ vs '+r.priceLivraison+'€</span>':'')+'</small></div></div>').join('')+'</div>':'')+

    // Suggestion
    (suggestion?'<div class="section-title"><h3>Suggestion du jour</h3></div><div class="mini-card"><div class="row"><div style="font-size:36px">'+suggestion.emoji+'</div><div class="item-meta"><b>'+esc(suggestion.name)+'</b><small>'+suggestion.time+' min · '+(suggestion.protein||'?')+'g prot.'+(suggestion.priceLivraison>0?' · '+suggestion.priceMaison+'€ vs '+suggestion.priceLivraison+'€':'')+'</small></div></div>'+starsHtml(p.ratings[suggestion.id]||0,suggestion.id)+'<div class="row mt"><button class="btn primary sm" onclick="openRecipe('+suggestion.id+')">Voir</button><button class="btn secondary sm" onclick="addRecipeMissing('+suggestion.id+')">+ Liste</button><button class="btn secondary sm" onclick="markCooked('+suggestion.id+')">🍳 Cuisiné</button></div></div>':'')+

    (DB.config.messageGlobal?'<div class="mini-card mt"><b>📢</b> <span class="small">'+esc(DB.config.messageGlobal)+'</span></div>':'')+
    '</div>';
}

// Themed weeks
function showThemedWeeks(){openSheet('<div class="section-title"><h3>🌍 Semaines thématiques</h3></div><div class="card-list">'+[['🇮🇳 Semaine indienne','Indien'],['🇲🇽 Semaine mexicaine','Mexicain'],['🍔 Semaine américaine','Confort'],['🇯🇵 Semaine japonaise','Japonais'],['🇹🇭 Semaine thaï','Thaï'],['💪 Semaine protéinée','Protéiné'],['😴 Semaine flemme','Rapide']].map(([label,tag])=>'<div class="item-row" style="cursor:pointer" onclick="fillThemedWeek('+js(tag)+')"><div class="item-meta"><b>'+label+'</b><small>Planning auto + liste de courses</small></div></div>').join('')+'</div>');}

function fillThemedWeek(tag){
  const recipes=allRecipes().filter(r=>(r.tags||[]).includes(tag));
  if(recipes.length<4){toast('Pas assez de recettes pour ce thème');return;}
  const p=current();
  const shuffled=[...recipes].sort(()=>Math.random()-0.5);
  p.weekPlan.forEach((d,i)=>{
    d.slots['Dîner']=shuffled[i%shuffled.length].id;
  });
  save();closeSheet();render();toast('Semaine '+tag+' remplie ✓');
}

function getSuggestionRecipe(){const a=allRecipes();return a[Math.floor((Date.now()/86400000)%a.length)]||a[0];}
function quickMealTonight(){setView({page:'coach'});setTimeout(()=>coachAsk("Propose-moi un repas rapide et simple pour ce soir avec ce que j'ai dans mes provisions"),200);}
function emergencyMeal(){const f=faisableRecipes().filter(r=>r.time<=15);if(f.length){openSheet('<div class="section-title"><h3>🚨 Repas d\'urgence</h3><span>≤15 min + provisions</span></div><div class="card-list">'+f.map(r=>'<div class="item-row" style="cursor:pointer" onclick="closeSheet();openRecipe('+r.id+')"><div class="item-emoji">'+r.emoji+'</div><div class="item-meta"><b>'+esc(r.name)+'</b><small>'+r.time+' min</small></div></div>').join('')+'</div>');}else toast('Aucune recette ≤15 min avec tes provisions');}

/* ===== CATALOGUE ===== */
function catalogueScreen(){
  let list=allProducts();const tab=VIEW.productTab;
  if(tab!=='Tout'){if(tab==='Perso')list=list.filter(p=>p.custom);else list=list.filter(p=>p.category===tab);}
